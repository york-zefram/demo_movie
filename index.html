<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Layout Debug)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --disabled-color: #444;
            --panel-bg: rgba(10, 10, 10, 0.85);
            --ad-height: 50px;
            
            /* デバッグ用カラー変数 */
            --debug-side: #333333;   /* 左右サイドバー：グレー */
            --debug-bottom: #000033; /* ボトムバー：濃紺 */
            --debug-main: #002200;   /* メイン背景：深緑 */
        }
        
        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        /* 広告領域 */
        #ad-container {
            width: 100%; height: var(--ad-height);
            background: #222; z-index: 3000;
            display: flex; align-items: center; justify-content: center;
        }

        /* メインレイアウト：左右サイドバーと中央エリアの横並び */
        #layout-wrapper {
            display: flex;
            flex: 1;
            width: 100vw;
            overflow: hidden;
        }

        /* 左右サイドバー：10vw */
        .sidebar {
            width: 10vw;
            height: 100%;
            background: var(--debug-side);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 20px;
        }

        /* 中央メインコンテナ：上下に分割 */
        #center-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--debug-main);
        }

        /* 動画表示エリア：アスペクト比維持 */
        #video-viewport { 
            flex: 1;
            width: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        
        #yt-player, #local-video { 
            width: 100%; height: 100%; 
            max-width: 100%; max-height: 100%;
            object-fit: contain; /* アスペクト比を厳守 */
        }

        /* ボトム操作バー：15vh */
        #bottom-bar {
            height: 15vh;
            width: 100%;
            background: var(--debug-bottom);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* --- 既存UI要素の調整 --- */
        #home-overlay {
            display: none; /* 新レイアウト確認のため一時非表示 */
        }

        header {
            position: absolute; top: var(--ad-height); left: 50%; transform: translateX(-50%);
            width: auto; height: 30px; display: flex; align-items: center;
            font-size: 10px; z-index: 2500; pointer-events: none;
            color: rgba(255,255,255,0.5);
        }

        #local-video { display: none; background: #000; }
    </style>
</head>
<body>

<div id="ad-container">
    <div style="font-size: 9px; color: #555; letter-spacing: 2px;">ADVERTISEMENT AREA (50PX)</div>
</div>

<header id="ui-header">ZEFRAM VIDEO PLAYER - LAYOUT DEBUG</header>

<div id="layout-wrapper">
    <div class="sidebar" id="left-sidebar">
        <div style="font-size:8px; color:#666;">LEFT (10vw)</div>
    </div>

    <div id="center-container">
        <div id="video-viewport">
            <div id="yt-player"></div>
            <video id="local-video" playsinline></video>
        </div>

        <div id="bottom-bar">
            <div style="font-size:8px; color:#666; margin-bottom:10px;">BOTTOM BAR (15vh)</div>
            <div style="width:100%; height:4px; background:rgba(255,255,255,0.2); border-radius:2px;">
                <div style="width:30%; height:100%; background:var(--neon-blue); box-shadow:var(--neon-glow);"></div>
            </div>
        </div>
    </div>

    <div class="sidebar" id="right-sidebar">
        <div style="font-size:8px; color:#666;">RIGHT (10vw)</div>
    </div>
</div>

<script>
    const state = {
        player: null, localVid: null, isYoutube: true,
        isLoop: false, isMirror: false, currentMode: 'seek',
        startT: 0, endT: 0, activeDrag: null
    };

    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    
    window.onYouTubeIframeAPIReady = () => {
        state.player = new YT.Player('yt-player', {
            videoId: 'ScXNbe_5Y0o',
            playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
            events: { 'onReady': () => { console.log("Layout Ready"); } }
        });
    };
</script>
</body>
</html>
