<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM VIDEO PLAYER - NEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 22vw; 
            --center-ratio: 16 / 9;
            --icon-max: 75px; 
            --fs-status-h: 10vh;
            --disabled-color: #333;
            --ad-h: 40px;
            --track-gray: #222;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 11px; letter-spacing: 0.2em;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #050505; z-index: 50; overflow: hidden;
            justify-content: center;
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000; z-index: 100;
            display: flex; align-items: center; border-top: 1px solid #333;
        }

        #video-main {
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; height: 100%; position: relative;
        }

        #video-viewport-wrapper {
            width: 100%; height: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            max-height: 100%;
            aspect-ratio: var(--center-ratio);
            background: #000;
            transition: transform 0.3s ease;
            position: relative;
        }

        #yt-player, #local-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #local-video { display: none; object-fit: contain; }

        #video-splash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.4s ease;
        }
        #video-splash img { width: 45%; max-width: 280px; height: auto; }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1.5vh; /* 隙間を高さ基準に */
            padding: 2vh 10px; /* 上下余白を高さ基準に */
            box-sizing: border-box; z-index: 200;
            align-items: center;
            justify-items: center;
        }

        #orientation-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 5000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #orientation-overlay img { width: 60%; max-width: 300px; height: auto; }

        @media (orientation: portrait) {
            #center-area:not(:fullscreen) ~ #orientation-overlay { display: flex; }
            #center-area:not(:fullscreen) ~ #top-container, 
            #center-area:not(:fullscreen) ~ #bottom-container, 
            #center-area:not(:fullscreen) .side-lane { display: none !important; }
            #center-area:not(:fullscreen) #video-main { display: none; }
        }

        #center-area:fullscreen #video-main { display: flex; width: 100%; height: 100%; }
        #center-area:fullscreen #video-viewport-wrapper { 
            max-width: 100vw; 
            max-height: 100vh;
            width: 100vw;
            height: auto;
            aspect-ratio: var(--center-ratio);
        }

        /* ボタンサイズの可変ロジック修正 */
        .grid-icon-box {
            width: 100%; 
            /* 画面の高さから上下のUI分を引き、3等分した高さを上限とする */
            height: calc((100vh - var(--top-h) - var(--bottom-h) - 8vh) / 3);
            max-width: var(--icon-max); 
            max-height: var(--icon-max);
            aspect-ratio: 1/1;
            background: none; border: 1px solid var(--neon-blue); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 11px; transition: 0.2s;
            user-select: none; -webkit-user-select: none;
        }
        .grid-icon-box.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }
        .grid-icon-box.blank { border: 1px solid #222; cursor: default; color: #444; }
        .grid-icon-box.locked { border-color: var(--disabled-color); color: var(--disabled-color); cursor: default; pointer-events: none; box-shadow: none; }

        @keyframes breathe {
            0% { opacity: 0.3; box-shadow: none; }
            50% { opacity: 1; box-shadow: var(--neon-glow); }
            100% { opacity: 0.3; box-shadow: none; }
        }
        .breathe { animation: breathe 2s infinite ease-in-out; }

        #dynamic-slot {
            flex: 1; height: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center;
        }

        .mode-panel { display: none; width: 100%; flex-direction: column; gap: 5px; }
        .mode-panel.active { display: flex; }

        #list-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; flex-direction: column;
        }
        #list-overlay.active { display: flex; }

        #list-ad-area { height: var(--ad-h); width: 100%; background: #000; flex-shrink: 0; }
        
        #list-header {
            padding: 1.2vh 4vw; border-bottom: 1px solid #333;
            display: flex; flex-direction: column; gap: 0.2vh; flex-shrink: 0;
        }
        .list-top-row { display: flex; justify-content: space-between; align-items: center; }
        .list-title { font-size: clamp(13px, 4vmin, 16px); letter-spacing: 0.1em; color: var(--neon-blue); }
        .list-close { font-size: clamp(13px, 4vmin, 16px); cursor: pointer; color: var(--neon-blue); padding: 5px; }
        .list-breadcrumb { font-size: 9px; color: var(--neon-blue); opacity: 0.8; letter-spacing: 0.1em; }

        #list-content { flex: 1; overflow-y: auto; padding: 0; }

        .list-item {
            display: flex; align-items: center; padding: 0.8vh 4vw; border-bottom: 1px solid #111; cursor: pointer; 
            gap: 3vw; position: relative; font-family: sans-serif; text-transform: none;
        }
        .list-item:hover { background: #0a0a0a; }
        
        .list-thumb {
            width: clamp(65px, 16vmin, 100px); aspect-ratio: 16/9; background: #222; 
            border: 1px solid #333; flex-shrink: 0; overflow: hidden;
        }
        .list-thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .list-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.1vh; }
        
        .list-item-title { color: #fff; font-weight: bold; font-size: clamp(11px, 3.2vmin, 13px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-channel { color: var(--neon-blue); font-size: clamp(9px, 2.5vmin, 10px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.7; }
        
        .list-meta { display: flex; align-items: center; gap: 2vw; flex-shrink: 0; }
        .list-item-time { color: #fff; font-size: clamp(9px, 2.5vmin, 11px); opacity: 0.9; }
        .list-item-del { color: #444; font-size: clamp(18px, 4.5vmin, 22px); padding: 0 1vw; cursor: pointer; }
        
        .bar-track { width: 100%; height: 12px; background: var(--track-gray); position: relative; cursor: pointer; border-radius: 6px; }
        .bar-fill { height: 100%; background: var(--track-gray); width: 0%; position: absolute; border-radius: 6px; pointer-events: none; z-index: 2; }
        #ab-range { height: 100%; background: var(--neon-blue); position: absolute; display: none; z-index: 1; box-shadow: var(--neon-glow); border-radius: 6px; pointer-events: none; }
        .knob-ab {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; background: #000; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); display: none; align-items: center; justify-content: center;
            font-size: 10px; border-radius: 4px; z-index: 10; cursor: pointer;
        }
        #now-knob, #speed-knob {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff; z-index: 5; pointer-events: none;
        }

        .speed-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--neon-blue); margin-bottom: 4px; opacity: 0.7; }
        .speed-display { text-align: center; font-size: 16px; margin-top: 8px; letter-spacing: 0.1em; }
        .time-display { display: flex; justify-content: space-between; font-size: 14px; margin-top: 5px; }

        .input-box { display: flex; gap: 10px; width: 100%; }
        input[type=text] { 
            flex: 1; background: #111; border: 1px solid var(--neon-blue); color: #fff; 
            padding: 12px; font-family: 'Michroma', sans-serif; font-size: 12px; outline: none; border-radius: 4px;
        }
        .btn-go { background: var(--neon-blue); color: #000; border: none; padding: 0 15px; font-family: 'Michroma', sans-serif; font-size: 12px; cursor: pointer; border-radius: 4px; }

        #fs-status-bar {
            display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: var(--fs-status-h);
            background: #000; border-top: 1px solid #333; z-index: 999;
            align-items: center; justify-content: space-evenly;
        }
        #center-area:fullscreen #fs-status-bar { display: flex; }
        #center-area:fullscreen #video-main { height: calc(100vh - var(--fs-status-h)); align-items: flex-start; }
        
        #center-area:fullscreen #video-viewport-wrapper { 
            max-width: 100vw; 
            max-height: calc(100vh - var(--fs-status-h)); 
        }

        .fs-btn { flex: 1; height: 60%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; color: var(--neon-blue); text-align: center; }
        .fs-sep { width: 1px; height: 40%; background: #333; }
        .fs-btn.dim { color: #444; }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <img src="5.webp" alt="ROTATE DEVICE">
    </div>

    <div id="top-container">ZEFRAM VIDEO PLAYER - NEO</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="grid-icon-box locked" id="btn-spd">SPD</div>
            <div class="grid-icon-box locked" id="btn-lop">LOP</div>
            <div class="grid-icon-box locked" id="btn-mir">MIR</div>
            <div class="grid-icon-box locked" id="btn-hom">HOM</div>
            <div class="grid-icon-box locked" id="btn-a">A</div>
            <div class="grid-icon-box locked" id="btn-top">TOP</div>
        </div>

        <div id="video-main">
            <div id="video-viewport-wrapper">
                <div id="yt-player"></div>
                <video id="local-video" playsinline></video>
                <div id="video-splash">
                    <img src="z_icon.svg" alt="ZEFRAM PLAYER">
                </div>
            </div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="grid-icon-box locked" id="btn-lst">LST</div>
            <div class="grid-icon-box blank">BAG</div>
            <div class="grid-icon-box breathe" id="btn-web">WEB</div>
            <div class="grid-icon-box breathe" id="btn-fil">FIL</div>
            <div class="grid-icon-box locked" id="btn-b">B</div>
            <div class="grid-icon-box locked" id="btn-rst">RST</div>
        </div>

        <div id="fs-status-bar">
            <div class="fs-btn" id="fs-btn-time">00:00 / 00:00</div>
            <div class="fs-sep"></div>
            <div class="fs-btn" id="fs-btn-speed">0%</div>
            <div class="fs-sep"></div>
            <div class="fs-btn" id="fs-btn-loop">LOOP: OFF</div>
            <div class="fs-sep"></div>
            <div class="fs-btn" id="fs-btn-mir">MIR: OFF</div>
            <div class="fs-sep"></div>
            <div class="fs-btn" id="fs-btn-exit" style="color:#fff;">EXIT</div>
        </div>
    </div>

    <div id="list-overlay">
        <div id="list-ad-area"></div>
        <div id="list-header">
            <div class="list-top-row">
                <div class="list-title">PLAYLIST</div>
                <div class="list-close" id="list-btn-close">CLOSE</div>
            </div>
            <div class="list-breadcrumb">ROOT / </div>
        </div>
        <div id="list-content"></div>
    </div>

    <div id="bottom-container">
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box locked" id="btn-play-pause" style="border-radius: 50%; width: 60px; height: 60px; font-size: 20px;">▶</div>
        </div>

        <div id="dynamic-slot">
            <div id="panel-home" class="mode-panel">
                <div class="bar-track" id="main-track">
                    <div id="ab-range"></div>
                    <div class="bar-fill" id="main-fill"></div>
                    <div id="now-knob"></div>
                    <div class="knob-ab" id="knob-a">A</div>
                    <div class="knob-ab" id="knob-b">B</div>
                </div>
                <div class="time-display">
                    <span id="txt-cur">00:00</span>
                    <span id="txt-total">00:00</span>
                </div>
            </div>

            <div id="panel-speed" class="mode-panel">
                <div class="speed-labels"><span>-50%</span><span>0%</span><span>+50%</span></div>
                <div class="bar-track" id="speed-track">
                    <div id="speed-knob" style="left: 50%;"></div>
                </div>
                <div class="speed-display" id="txt-speed">0%</div>
            </div>

            <div id="panel-web" class="mode-panel">
                <div class="input-box">
                    <input type="text" id="input-url" placeholder="YOUTUBE URL OR ID...">
                    <button class="btn-go" id="btn-url-go">GO</button>
                    <button class="btn-go locked" id="btn-url-add">ADD</button>
                </div>
            </div>

            <div id="panel-file" class="mode-panel">
                <div class="input-box">
                    <button class="btn-go" style="width:100%; height:45px;" onclick="document.getElementById('file-input').click()">CHOOSE LOCAL FILE</button>
                    <input type="file" id="file-input" accept="video/*,audio/*">
                </div>
            </div>
        </div>

        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box locked" id="btn-full" onclick="enterFull()">FULL</div>
        </div>
    </div>

    <script>
        /* JSロジック（ver3.8/3.9同等）省略なし */
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
              .then(reg => console.log('SW registered.', reg))
              .catch(err => console.log('SW registration failed.', err));
          });
        }

        const state = {
            player: null,
            localVid: null,
            isYoutube: true,
            isInitialized: false,
            currentMode: null,
            lastModeBeforeFull: 'home',
            isMirror: false,
            isLoop: false,
            activeDrag: null,
            playbackRate: 1.0,
            startT: 0,
            endT: 0,
            playlist: JSON.parse(localStorage.getItem('zefram_playlist') || '[]'),
            lopPressTimer: null
        };

        const getT = () => state.isYoutube ? (state.player?.getCurrentTime?.() || 0) : state.localVid.currentTime;
        const getD = () => state.isYoutube ? (state.player?.getDuration?.() || 0) : state.localVid.duration;
        const setT = (t) => state.isYoutube ? state.player.seekTo(t, true) : (state.localVid.currentTime = t);
        const setR = (r) => state.isYoutube ? state.player.setPlaybackRate(r) : (state.localVid.playbackRate = r);

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function hideSplash() {
            const splash = document.getElementById('video-splash');
            splash.style.opacity = "0";
            setTimeout(() => { splash.style.display = "none"; }, 400);
        }

        function lockOrientation() {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("Lock error:", e));
            }
        }

        function wakeUpUI() {
            hideSplash();
            state.isInitialized = true;
            document.querySelectorAll('.grid-icon-box').forEach(el => { el.classList.remove('locked'); el.classList.remove('breathe'); });
            document.getElementById('btn-play-pause').classList.remove('locked');
            document.getElementById('btn-full').classList.remove('locked');
            updateRSTStatus();
            updateLSTButtonState();
            switchMode('home');
            lockOrientation();
        }

        function updateRSTStatus() {
            const rstBtn = document.getElementById('btn-rst');
            if (!state.isInitialized) return;
            const isChanged = (Math.abs(state.playbackRate - 1.0) > 0.01) || state.isMirror || state.isLoop || (state.startT !== 0 || state.endT !== 0);
            if (isChanged) { rstBtn.classList.remove('locked'); rstBtn.classList.add('active'); }
            else { rstBtn.classList.add('locked'); rstBtn.classList.remove('active'); }
        }

        window.onYouTubeIframeAPIReady = () => {
            const wrapper = document.getElementById('video-viewport-wrapper');
            state.player = new YT.Player('yt-player', {
                width: wrapper.clientWidth,
                height: wrapper.clientHeight,
                videoId: '',
                playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1, 'vq': 'highres' },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': (e) => { updatePlayIcon(); }
                }
            });
        };

        function onPlayerReady() {
            state.localVid = document.getElementById('local-video');
            initEvents();
            updateLSTButtonState();
            renderPlaylist();
            render();
        }

        function updateLSTButtonState() {
            const btnLst = document.getElementById('btn-lst');
            if (state.playlist.length > 0) btnLst.classList.remove('locked');
            else btnLst.classList.add('locked');
        }

        function deleteItem(id, e) {
            e.stopPropagation();
            state.playlist = state.playlist.filter(item => item.id !== id);
            localStorage.setItem('zefram_playlist', JSON.stringify(state.playlist));
            updateLSTButtonState();
            renderPlaylist();
        }

        function renderPlaylist() {
            const container = document.getElementById('list-content');
            container.innerHTML = '';
            state.playlist.forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="list-thumb"><img src="https://img.youtube.com/vi/${item.id}/mqdefault.jpg"></div>
                    <div class="list-info">
                        <div class="list-item-title">${item.title}</div>
                        <div class="list-item-channel">${item.author || 'YOUTUBE VIDEO'}</div>
                    </div>
                    <div class="list-meta">
                        <div class="list-item-time">${item.duration || '00:00'}</div>
                        <div class="list-item-del" onclick="deleteItem('${item.id}', event)">×</div>
                    </div>
                `;
                div.onclick = () => {
                    state.player.loadVideoById(item.id);
                    document.getElementById('list-overlay').classList.remove('active');
                    wakeUpUI();
                };
                container.appendChild(div);
            });
        }

        function pausePlayback() {
            if(!state.isInitialized) return;
            if(state.isYoutube) state.player.pauseVideo();
            else state.localVid.pause();
        }

        function updatePlayIcon() {
            const btn = document.getElementById('btn-play-pause');
            const isPlaying = state.isYoutube ? (state.player?.getPlayerState?.() === 1) : !state.localVid.paused;
            btn.innerText = isPlaying ? "Ⅱ" : "▶";
        }

        function formatPercent(rate) {
            const p = Math.round((rate - 1.0) * 100);
            return (p >= 0 ? "+" : "") + p + "%";
        }

        function render() {
            if (!state.isInitialized) { requestAnimationFrame(render); return; }
            const now = getT();
            const dur = getD();
            if (state.isLoop && state.endT > state.startT && (now >= state.endT || now < state.startT - 0.1)) setT(state.startT);
            
            if (dur > 0) {
                const p = (now / dur) * 100;
                if (state.activeDrag !== 'now') {
                    document.getElementById('main-fill').style.width = p + "%";
                    document.getElementById('now-knob').style.left = p + "%";
                    document.getElementById('txt-cur').innerText = formatTime(now);
                }
                document.getElementById('txt-total').innerText = formatTime(dur);
                document.getElementById('fs-btn-time').innerText = `${formatTime(now)} / ${formatTime(dur)}`;
                
                const speedPct = formatPercent(state.playbackRate);
                const fsSpeed = document.getElementById('fs-btn-speed');
                fsSpeed.innerText = speedPct;
                fsSpeed.classList.toggle('dim', Math.abs(state.playbackRate - 1.0) < 0.01);

                const fsLoop = document.getElementById('fs-btn-loop');
                if (state.isLoop) { fsLoop.innerText = `${formatTime(state.startT)} - ${formatTime(state.endT)}`; fsLoop.classList.remove('dim'); }
                else { fsLoop.innerText = "LOOP: OFF"; fsLoop.classList.add('dim'); }
                
                const fsMir = document.getElementById('fs-btn-mir');
                fsMir.innerText = `MIR: ${state.isMirror ? 'ON' : 'OFF'}`;
                fsMir.classList.toggle('dim', !state.isMirror);
                
                const range = document.getElementById('ab-range'), ka = document.getElementById('knob-a'), kb = document.getElementById('knob-b');
                if (state.isLoop) {
                    range.style.display = ka.style.display = kb.style.display = 'flex';
                    const sP = (state.startT / dur) * 100, eP = (state.endT / dur) * 100;
                    ka.style.left = sP + "%"; kb.style.left = eP + "%"; range.style.left = sP + "%"; range.style.width = (eP - sP) + "%";
                } else { range.style.display = ka.style.display = kb.style.display = 'none'; }
            }
            updatePlayIcon();
            requestAnimationFrame(render);
        }

        function formatTime(s) {
            if(!s || isNaN(s)) return "00:00";
            const m = Math.floor(s/60), rs = Math.floor(s%60);
            return `${m<10?'0'+m:m}:${rs<10?'0'+rs:rs}`;
        }

        function initEvents() {
            document.getElementById('btn-play-pause').onclick = () => {
                if(!state.isInitialized) return;
                if(state.isYoutube) state.player.getPlayerState() === 1 ? state.player.pauseVideo() : state.player.playVideo();
                else state.localVid.paused ? state.localVid.play() : state.localVid.pause();
            };

            const toggleMirror = () => {
                if(!state.isInitialized) return;
                state.isMirror = !state.isMirror;
                document.getElementById('btn-mir').classList.toggle('active', state.isMirror);
                document.getElementById('video-viewport-wrapper').style.transform = state.isMirror ? "scaleX(-1)" : "none";
                updateRSTStatus();
            };
            document.getElementById('btn-mir').onclick = toggleMirror;
            document.getElementById('fs-btn-mir').onclick = (e) => { e.stopPropagation(); toggleMirror(); };

            const lopBtn = document.getElementById('btn-lop');
            const clearLOPMemory = () => {
                state.isLoop = false; state.startT = 0; state.endT = 0;
                lopBtn.classList.remove('active');
                updateRSTStatus();
            };

            lopBtn.onmousedown = lopBtn.ontouchstart = (e) => {
                if(!state.isInitialized) return;
                state.lopPressTimer = setTimeout(() => { clearLOPMemory(); state.lopPressTimer = null; }, 1000);
            };

            lopBtn.onmouseup = lopBtn.ontouchend = (e) => {
                if(state.lopPressTimer) {
                    clearTimeout(state.lopPressTimer);
                    state.lopPressTimer = null;
                    state.isLoop = !state.isLoop;
                    if(state.isLoop && state.endT === 0) state.endT = getD();
                    lopBtn.classList.toggle('active', state.isLoop);
                    updateRSTStatus();
                }
            };

            document.getElementById('btn-a').onclick = () => { if(!state.isInitialized) return; state.startT = getT(); if(state.endT === 0) state.endT = getD(); state.isLoop = true; document.getElementById('btn-lop').classList.add('active'); updateRSTStatus(); };
            document.getElementById('btn-b').onclick = () => { if(!state.isInitialized) return; state.endT = getT(); if(state.startT > state.endT) state.startT = 0; state.isLoop = true; document.getElementById('btn-lop').classList.add('active'); updateRSTStatus(); };
            document.getElementById('btn-top').onclick = () => { if(!state.isInitialized) return; setT(state.isLoop ? state.startT : 0); };

            document.getElementById('btn-rst').onclick = () => {
                if (!state.isInitialized) return;
                state.playbackRate = 1.0; setR(1.0);
                document.getElementById('speed-knob').style.left = "50%";
                document.getElementById('txt-speed').innerText = "0%";
                state.isMirror = false;
                document.getElementById('video-viewport-wrapper').style.transform = "none";
                document.getElementById('btn-mir').classList.remove('active');
                clearLOPMemory();
            };

            document.getElementById('btn-hom').onclick = () => switchMode('home');
            document.getElementById('btn-spd').onclick = () => switchMode('speed');
            document.getElementById('btn-web').onclick = () => switchMode('web');
            document.getElementById('btn-fil').onclick = () => switchMode('file');
            
            document.getElementById('btn-lst').onclick = () => { if(state.playlist.length === 0) return; pausePlayback(); renderPlaylist(); document.getElementById('list-overlay').classList.add('active'); };
            document.getElementById('list-btn-close').onclick = () => { document.getElementById('list-overlay').classList.remove('active'); };

            document.getElementById('fs-btn-time').onclick = () => { exitFull(); switchMode('home'); };
            document.getElementById('fs-btn-speed').onclick = () => { exitFull(); switchMode('speed'); };
            document.getElementById('fs-btn-loop').onclick = () => { exitFull(); switchMode('home'); };
            document.getElementById('fs-btn-exit').onclick = () => { exitFull(); switchMode(state.lastModeBeforeFull); };

            const handleInput = (e, type) => {
                if(!state.isInitialized) return;
                const track = document.getElementById(type === 'speed' ? 'speed-track' : 'main-track');
                const rect = track.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                let p = Math.max(0, Math.min(1, x / rect.width));

                if (type === 'now') {
                    const targetTime = p * getD(); setT(targetTime);
                    document.getElementById('main-fill').style.width = (p * 100) + "%";
                    document.getElementById('now-knob').style.left = (p * 100) + "%";
                }
                else if (type === 'a') { state.startT = p * getD(); updateRSTStatus(); }
                else if (type === 'b') { state.endT = p * getD(); updateRSTStatus(); }
                else if (type === 'speed') {
                    if (p > 0.47 && p < 0.53) p = 0.5;
                    state.playbackRate = 0.5 + p; setR(state.playbackRate);
                    document.getElementById('speed-knob').style.left = (p * 100) + "%";
                    document.getElementById('txt-speed').innerText = formatPercent(state.playbackRate);
                    document.getElementById('btn-spd').classList.toggle('active', Math.abs(state.playbackRate - 1.0) > 0.01);
                    updateRSTStatus();
                }
            };

            document.getElementById('main-track').onmousedown = (e) => { state.activeDrag = 'now'; handleInput(e, 'now'); };
            document.getElementById('main-track').ontouchstart = (e) => { state.activeDrag = 'now'; handleInput(e, 'now'); };
            document.getElementById('knob-a').onmousedown = (e) => { e.stopPropagation(); state.activeDrag = 'a'; };
            document.getElementById('knob-a').ontouchstart = (e) => { e.stopPropagation(); state.activeDrag = 'a'; };
            document.getElementById('knob-b').onmousedown = (e) => { e.stopPropagation(); state.activeDrag = 'b'; };
            document.getElementById('knob-b').ontouchstart = (e) => { e.stopPropagation(); state.activeDrag = 'b'; };
            document.getElementById('speed-track').onmousedown = (e) => { state.activeDrag = 'speed'; handleInput(e, 'speed'); };
            document.getElementById('speed-track').ontouchstart = (e) => { state.activeDrag = 'speed'; handleInput(e, 'speed'); };
            window.onmousemove = (e) => { if(state.activeDrag) handleInput(e, state.activeDrag); };
            window.ontouchmove = (e) => { if(state.activeDrag) handleInput(e, state.activeDrag); };
            window.onmouseup = window.ontouchend = () => { state.activeDrag = null; };

            document.getElementById('btn-url-go').onclick = () => {
                const input = document.getElementById('input-url').value.trim();
                const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?|shorts)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                const match = input.match(regex);
                const id = match ? match[1] : (input.length === 11 ? input : null);
                if(id) {
                    state.isYoutube = true;
                    document.getElementById('local-video').style.display = 'none';
                    document.getElementById('yt-player').style.display = 'block';
                    state.player.loadVideoById(id);
                    clearLOPMemory(); wakeUpUI();
                    document.getElementById('btn-url-add').classList.remove('locked');
                } else alert("INVALID URL");
            };

            document.getElementById('btn-url-add').onclick = () => {
                if (!state.isYoutube || !state.player) return;
                const videoData = state.player.getVideoData();
                const videoId = videoData.video_id;
                if (videoId && videoData.title !== "Unknown") {
                    if (!state.playlist.some(item => item.id === videoId)) {
                        state.playlist.push({ id: videoId, title: videoData.title, author: videoData.author, duration: formatTime(getD()) });
                        localStorage.setItem('zefram_playlist', JSON.stringify(state.playlist));
                        updateLSTButtonState(); renderPlaylist();
                    }
                }
            };

            document.getElementById('file-input').onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    state.isYoutube = false;
                    document.getElementById('yt-player').style.display = 'none';
                    document.getElementById('local-video').style.display = 'block';
                    state.player.pauseVideo();
                    state.localVid.src = URL.createObjectURL(file);
                    state.localVid.play();
                    clearLOPMemory(); wakeUpUI();
                }
            };
        }

        function switchMode(mode) {
            state.currentMode = mode;
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('btn-hom').classList.toggle('active', mode === 'home');
            document.getElementById('btn-web').classList.toggle('active', mode === 'web');
            document.getElementById('btn-fil').classList.toggle('active', mode === 'file');
            document.getElementById('btn-spd').classList.toggle('active', (mode === 'speed' || Math.abs(state.playbackRate - 1.0) > 0.01));
            const panel = document.getElementById(`panel-${mode === 'home' ? 'home' : mode === 'speed' ? 'speed' : mode}`);
            if(panel) panel.classList.add('active');
        }

        function enterFull() {
            if(!state.isInitialized) return;
            state.lastModeBeforeFull = state.currentMode;
            const el = document.getElementById('center-area');
            if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

        function exitFull() {
            lockOrientation();
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    </script>
</body>
</html>
