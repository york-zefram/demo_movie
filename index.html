<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Full Integration)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
            --center-ratio: 16 / 9;
            --icon-size: 8vh; 
            --icon-max: 55px;
            --fs-status-h: 10vh;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px; letter-spacing: 0.2em;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #050505; z-index: 50; overflow: hidden;
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000; z-index: 100;
            display: flex; align-items: center; border-top: 1px solid #333;
        }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; position: relative;
        }

        #video-viewport-wrapper {
            width: 100%; height: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            max-height: 100%;
            aspect-ratio: var(--center-ratio);
            background: #000;
            transition: transform 0.3s ease;
        }

        #yt-player, #local-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #local-video { display: none; background: #000; object-fit: contain; }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }

        .grid-icon-box {
            width: var(--icon-size); height: var(--icon-size);
            max-width: var(--icon-max); max-height: var(--icon-max);
            background: none; border: 1px solid var(--neon-blue); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 10px; transition: 0.2s;
        }
        .grid-icon-box.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }
        .grid-icon-box.blank { border: 1px solid #222; cursor: default; color: #444; }
        /* 無効化（消灯）状態のスタイル */
        .grid-icon-box:disabled { border-color: #222; color: #444; cursor: default; box-shadow: none; }

        #dynamic-slot {
            flex: 1; height: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center;
        }

        .mode-panel { display: none; width: 100%; flex-direction: column; gap: 5px; }
        .mode-panel.active { display: flex; }

        /* シークバー構造 */
        .bar-track { width: 100%; height: 12px; background: rgba(255, 255, 255, 0.1); position: relative; cursor: pointer; border-radius: 6px; }
        .bar-fill { height: 100%; background: rgba(0, 243, 255, 0.3); width: 0%; position: absolute; border-radius: 6px; pointer-events: none; z-index: 2; }
        
        /* ABリピート用視覚要素 */
        #ab-range { height: 100%; background: var(--neon-blue); position: absolute; display: none; z-index: 1; box-shadow: var(--neon-glow); border-radius: 6px; pointer-events: none; }
        .knob-ab {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; background: #000; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); display: none; align-items: center; justify-content: center;
            font-size: 8px; border-radius: 4px; z-index: 5; pointer-events: none;
        }

        .speed-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--neon-blue); margin-bottom: 4px; opacity: 0.7; }
        .speed-display { text-align: center; font-size: 16px; margin-top: 8px; letter-spacing: 0.1em; }
        .time-display { display: flex; justify-content: space-between; font-size: 14px; margin-top: 5px; }

        .input-box { display: flex; gap: 10px; width: 100%; }
        input[type=text] { 
            flex: 1; background: #111; border: 1px solid var(--neon-blue); color: #fff; 
            padding: 12px; font-family: 'Michroma', sans-serif; font-size: 12px; outline: none; border-radius: 4px;
        }
        .btn-go { 
            background: var(--neon-blue); color: #000; border: none; padding: 0 20px; 
            font-family: 'Michroma', sans-serif; font-size: 12px; cursor: pointer; border-radius: 4px;
        }
        #file-input { display: none; }

        #center-area:fullscreen #video-main { height: calc(100vh - var(--fs-status-h)); align-items: flex-start; }
        #center-area:fullscreen #video-viewport-wrapper { 
            max-width: calc((100vh - var(--fs-status-h)) * (16 / 9)); 
            max-height: calc(100vh - var(--fs-status-h)); 
        }
        #center-area:fullscreen .side-lane { display: none; }

        #exit-fs {
            display: none; position: absolute; bottom: 0; right: 0; width: var(--lane-w); height: var(--fs-status-h);
            z-index: 9999; align-items: center; justify-content: center; background: rgba(0,0,0,0.5);
        }
        #center-area:fullscreen #exit-fs { display: flex; }
    </style>
</head>
<body>

    <div id="top-container">ZEFRAM VIDEO PLAYER - NEO</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="grid-icon-box" id="btn-spd">SPD</div>
            <div class="grid-icon-box" id="btn-lop">LOP</div>
            <div class="grid-icon-box" id="btn-mir">MIR</div>
            <div class="grid-icon-box active" id="btn-hom">HOM</div>
            <div class="grid-icon-box" id="btn-a" disabled>A</div>
            <div class="grid-icon-box" id="btn-top">TOP</div>
        </div>

        <div id="video-main">
            <div id="video-viewport-wrapper">
                <div id="yt-player"></div>
                <video id="local-video" playsinline></video>
            </div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="grid-icon-box blank">BAG</div>
            <div class="grid-icon-box blank">LST</div>
            <div class="grid-icon-box" id="btn-fil">FIL</div>
            <div class="grid-icon-box" id="btn-web">WEB</div>
            <div class="grid-icon-box" id="btn-b" disabled>B</div>
            <div class="grid-icon-box blank">--</div>
        </div>

        <div id="exit-fs" onclick="exitFull()">
            <div style="color: #fff; font-size: 12px; font-weight: bold; cursor: pointer;">EXIT</div>
        </div>
    </div>

    <div id="bottom-container">
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" id="btn-play-pause" style="border-radius: 50%; width: 60px; height: 60px; font-size: 20px;">▶</div>
        </div>

        <div id="dynamic-slot">
            <div id="panel-home" class="mode-panel active">
                <div class="bar-track" id="main-track">
                    <div id="ab-range"></div>
                    <div class="bar-fill" id="main-fill"></div>
                    <div class="knob-ab" id="knob-a">A</div>
                    <div class="knob-ab" id="knob-b">B</div>
                </div>
                <div class="time-display">
                    <span id="txt-cur">00:00</span>
                    <span id="txt-total">00:00</span>
                </div>
            </div>

            <div id="panel-speed" class="mode-panel">
                <div class="speed-labels"><span>0.5x</span><span>1.0x</span><span>1.5x</span></div>
                <div class="bar-track" id="speed-track">
                    <div class="bar-fill" id="speed-fill" style="width: 50%; background:var(--neon-blue); opacity:1;"></div>
                </div>
                <div class="speed-display" id="txt-speed">1.00x</div>
            </div>

            <div id="panel-web" class="mode-panel">
                <div class="input-box">
                    <input type="text" id="input-url" placeholder="YOUTUBE URL OR ID...">
                    <button class="btn-go" id="btn-url-go">GO</button>
                </div>
            </div>

            <div id="panel-file" class="mode-panel">
                <div class="input-box">
                    <button class="btn-go" style="flex:1;" onclick="document.getElementById('file-input').click()">CHOOSE VIDEO FILE</button>
                    <input type="file" id="file-input" accept="video/*">
                </div>
            </div>
        </div>

        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" id="btn-full" onclick="enterFull()">FULL</div>
        </div>
    </div>

    <script>
        const state = {
            player: null,
            localVid: null,
            isYoutube: true,
            currentMode: 'home',
            isMirror: false,
            isLoop: false,
            isDragging: false,
            activeTrack: null,
            playbackRate: 1.0,
            startT: 0,
            endT: 0
        };

        const getT = () => state.isYoutube ? state.player.getCurrentTime() : state.localVid.currentTime;
        const getD = () => state.isYoutube ? state.player.getDuration() : state.localVid.duration;
        const setT = (t) => state.isYoutube ? state.player.seekTo(t, true) : (state.localVid.currentTime = t);
        const setR = (r) => state.isYoutube ? state.player.setPlaybackRate(r) : (state.localVid.playbackRate = r);

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            const wrapper = document.getElementById('video-viewport-wrapper');
            state.player = new YT.Player('yt-player', {
                width: wrapper.clientWidth,
                height: wrapper.clientHeight,
                videoId: 'ScXNbe_5Y0o',
                playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1, 'vq': 'highres' },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerReady() {
            state.localVid = document.getElementById('local-video');
            if(state.player.setPlaybackQuality) state.player.setPlaybackQuality('hd1080');
            render();
            initEvents();
        }

        function onPlayerStateChange(event) {
            const btn = document.getElementById('btn-play-pause');
            btn.innerText = (event.data === YT.PlayerState.PLAYING) ? "Ⅱ" : "▶";
        }

        function render() {
            const now = getT();
            const dur = getD();

            if (state.isLoop && state.endT > state.startT && (now >= state.endT || now < state.startT - 0.1)) {
                setT(state.startT);
            }

            if (dur > 0) {
                if (!state.isDragging) {
                    const p = (now / dur) * 100;
                    document.getElementById('main-fill').style.width = p + "%";
                    document.getElementById('txt-cur').innerText = formatTime(now);
                    document.getElementById('txt-total').innerText = formatTime(dur);
                }

                const range = document.getElementById('ab-range');
                const ka = document.getElementById('knob-a');
                const kb = document.getElementById('knob-b');
                const btnLop = document.getElementById('btn-lop');

                if (state.isLoop) {
                    range.style.display = ka.style.display = kb.style.display = 'flex';
                    btnLop.classList.add('active');
                    const sP = (state.startT / dur) * 100;
                    const eP = (state.endT / dur) * 100;
                    ka.style.left = sP + "%";
                    kb.style.left = eP + "%";
                    range.style.left = sP + "%";
                    range.style.width = (eP - sP) + "%";
                } else {
                    range.style.display = ka.style.display = kb.style.display = 'none';
                    btnLop.classList.remove('active');
                }
            }
            
            const btnPlay = document.getElementById('btn-play-pause');
            const isPlaying = state.isYoutube ? (state.player && state.player.getPlayerState() === 1) : !state.localVid.paused;
            btnPlay.innerText = isPlaying ? "Ⅱ" : "▶";

            requestAnimationFrame(render);
        }

        function formatTime(s) {
            if(!s || isNaN(s)) return "00:00";
            const m = Math.floor(s/60), rs = Math.floor(s%60);
            return `${m<10?'0'+m:m}:${rs<10?'0'+rs:rs}`;
        }

        function initEvents() {
            document.getElementById('btn-play-pause').onclick = () => {
                if(state.isYoutube) {
                    state.player.getPlayerState() === 1 ? state.player.pauseVideo() : state.player.playVideo();
                } else {
                    state.localVid.paused ? state.localVid.play() : state.localVid.pause();
                }
            };

            document.getElementById('btn-mir').onclick = () => {
                state.isMirror = !state.isMirror;
                document.getElementById('btn-mir').classList.toggle('active', state.isMirror);
                document.getElementById('video-viewport-wrapper').style.transform = state.isMirror ? "scaleX(-1)" : "none";
            };

            // LOOPボタンによる起動とリセット
            document.getElementById('btn-lop').onclick = () => {
                state.isLoop = !state.isLoop;
                const btnA = document.getElementById('btn-a');
                const btnB = document.getElementById('btn-b');
                
                if(state.isLoop) {
                    btnA.disabled = false;
                    btnB.disabled = false;
                    state.startT = 0;
                    state.endT = getD();
                } else {
                    btnA.disabled = true;
                    btnB.disabled = true;
                    btnA.classList.remove('active');
                    btnB.classList.remove('active');
                    state.startT = 0;
                    state.endT = 0;
                }
            };

            document.getElementById('btn-a').onclick = () => {
                if(state.isLoop) {
                    state.startT = getT();
                    document.getElementById('btn-a').classList.add('active');
                }
            };

            document.getElementById('btn-b').onclick = () => {
                if(state.isLoop) {
                    state.endT = getT();
                    document.getElementById('btn-b').classList.add('active');
                }
            };

            document.getElementById('btn-top').onclick = () => {
                setT(state.isLoop ? state.startT : 0);
            };

            document.getElementById('btn-hom').onclick = () => switchMode('home');
            document.getElementById('btn-spd').onclick = () => switchMode('speed');
            document.getElementById('btn-web').onclick = () => switchMode('web');
            document.getElementById('btn-fil').onclick = () => switchMode('file');

            const handleInput = (e, type) => {
                const track = document.getElementById(type === 'speed' ? 'speed-track' : 'main-track');
                const rect = track.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const p = Math.max(0, Math.min(1, x / rect.width));

                if (type === 'seek') {
                    setT(p * getD());
                } else if (type === 'speed') {
                    const rate = 0.5 + p; 
                    state.playbackRate = rate;
                    setR(rate);
                    document.getElementById('speed-fill').style.width = (p * 100) + "%";
                    document.getElementById('txt-speed').innerText = rate.toFixed(2) + "x";
                    document.getElementById('btn-spd').classList.toggle('active', Math.abs(rate - 1.0) > 0.01);
                }
            };

            const setupTrack = (id, type) => {
                const el = document.getElementById(id);
                el.onmousedown = (e) => { state.isDragging = true; state.activeTrack = type; handleInput(e, type); };
                el.ontouchstart = (e) => { state.isDragging = true; state.activeTrack = type; handleInput(e, type); };
            };

            setupTrack('main-track', 'seek');
            setupTrack('speed-track', 'speed');

            window.onmousemove = (e) => { if(state.isDragging) handleInput(e, state.activeTrack); };
            window.ontouchmove = (e) => { if(state.isDragging) handleInput(e, state.activeTrack); };
            window.onmouseup = window.ontouchend = () => { state.isDragging = false; state.activeTrack = null; };

            const resetMedia = () => {
                state.isLoop = false;
                state.startT = 0;
                state.endT = 0;
                document.getElementById('btn-a').disabled = true;
                document.getElementById('btn-b').disabled = true;
                document.getElementById('btn-a').classList.remove('active');
                document.getElementById('btn-b').classList.remove('active');
                switchMode('home');
            };

            document.getElementById('btn-url-go').onclick = () => {
                const v = document.getElementById('input-url').value;
                const id = v.split('v=')[1]?.split('&')[0] || v.split('/').pop();
                if(id) {
                    state.isYoutube = true;
                    state.localVid.style.display = 'none';
                    document.getElementById('yt-player').style.display = 'block';
                    state.player.loadVideoById({'videoId': id, 'suggestedQuality': 'hd1080'});
                    resetMedia();
                }
            };

            document.getElementById('file-input').onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    state.isYoutube = false;
                    document.getElementById('yt-player').style.display = 'none';
                    state.localVid.style.display = 'block';
                    state.player.pauseVideo();
                    state.localVid.src = URL.createObjectURL(file);
                    state.localVid.play();
                    resetMedia();
                }
            };
        }

        function switchMode(mode) {
            state.currentMode = mode;
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('btn-hom').classList.toggle('active', mode === 'home');
            document.getElementById('btn-web').classList.toggle('active', mode === 'web');
            document.getElementById('btn-fil').classList.toggle('active', mode === 'file');
            document.getElementById(`panel-${mode}`).classList.add('active');
        }

        function enterFull() {
            const el = document.getElementById('center-area');
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

        function exitFull() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    </script>
</body>
</html>
