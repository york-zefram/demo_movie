<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Base Sync)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
            --center-ratio: 16 / 9;
            --fs-status-h: 10vh;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #top-container {
            flex: 0 0 var(--top-h); background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #111; z-index: 50; overflow: hidden;
        }

        /* 全画面：赤いベゼル */
        #center-area:fullscreen { background: #ff0000; display: flex; flex-direction: column; }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }
        #left-lane { background: rgba(0, 100, 0, 0.6); }
        #right-lane { background: rgba(139, 69, 19, 0.6); }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%;
        }

        /* 理論値100%の16:9ロジック */
        #yt-player {
            width: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            aspect-ratio: var(--center-ratio);
            background: #000;
        }

        /* 全画面：上寄せ配置 */
        #center-area:fullscreen #video-main {
            height: calc(100vh - var(--fs-status-h));
            align-items: flex-start; flex: none;
        }

        #center-area:fullscreen #yt-player {
            max-width: calc((100vh - var(--fs-status-h)) * (16 / 9));
            max-height: calc(100vh - var(--fs-status-h));
        }

        /* URL入力パネル */
        #url-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); padding: 20px; border: 2px solid var(--neon-blue);
            display: none; flex-direction: column; gap: 15px; z-index: 1000; width: 70%;
        }
        #url-panel.active { display: flex; }
        input[type=text] {
            background: #000; border: 1px solid var(--neon-blue); color: #fff; padding: 12px;
            font-family: 'Michroma', sans-serif; font-size: 12px; outline: none;
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h); background: #000080; z-index: 100;
            display: flex; align-items: center;
        }

        .grid-icon-box {
            width: 8vh; height: 8vh; max-width: 55px; max-height: 55px;
            background: #fff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #000; font-size: 10px; font-weight: bold;
        }

        #exit-fullscreen-btn-sync {
            display: none !important; position: absolute; bottom: 0; right: 0;
            width: var(--lane-w); height: var(--fs-status-h); z-index: 9999;
            align-items: center; justify-content: center;
        }
        #center-area:fullscreen #exit-fullscreen-btn-sync { display: flex !important; }
        #center-area:fullscreen .side-lane { display: none; }
    </style>
</head>
<body>

    <div id="top-container">GOOGLE ADS AREA</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="grid-icon-box">SPD</div><div class="grid-icon-box">LOP</div><div class="grid-icon-box">MIR</div>
            <div class="grid-icon-box">HOM</div><div class="grid-icon-box">A</div><div class="grid-icon-box">TOP</div>
        </div>

        <div id="video-main">
            <div id="yt-player"></div>
            <div id="url-panel">
                <input type="text" id="input-url" placeholder="PASTE YOUTUBE URL...">
                <div class="grid-icon-box" id="btn-url-go" style="width:100%; max-width:none; height:45px;">GO</div>
            </div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="grid-icon-box">BAG</div><div class="grid-icon-box">LST</div><div class="grid-icon-box">FIL</div>
            <div class="grid-icon-box" onclick="toggleUrlPanel()">WEB</div><div class="grid-icon-box">B</div><div class="grid-icon-box">--</div>
        </div>

        <div id="exit-fullscreen-btn-sync" onclick="exitFull()">
            <div style="color: #fff; font-size: 14px; font-weight: bold; cursor: pointer;">EXIT</div>
        </div>
    </div>

    <div id="bottom-container">
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" id="btn-play" onclick="togglePlay()">PLAY</div>
        </div>
        <div style="flex:1; padding:0 20px;"><div style="width:100%; height:4px; background:var(--neon-blue); opacity:0.3;"></div></div>
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" onclick="enterFull()">FULL</div>
        </div>
    </div>

    <script>
        let player;
        const centerArea = document.getElementById('center-area');

        // YouTube API 読み込み
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('yt-player', {
                videoId: 'ScXNbe_5Y0o',
                playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
                events: {
                    'onStateChange': (e) => {
                        document.getElementById('btn-play').innerText = (e.data === 1) ? "PAUSE" : "PLAY";
                    }
                }
            });
        };

        function togglePlay() {
            if(player && player.getPlayerState) {
                player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
            }
        }

        function toggleUrlPanel() {
            document.getElementById('url-panel').classList.toggle('active');
        }

        document.getElementById('btn-url-go').onclick = () => {
            const v = document.getElementById('input-url').value;
            const id = v.split('v=')[1]?.split('&')[0] || v.split('/').pop();
            if(id && player) {
                player.loadVideoById(id);
                toggleUrlPanel();
            }
        };

        function enterFull() {
            if (centerArea.requestFullscreen) centerArea.requestFullscreen();
            else if (centerArea.webkitRequestFullscreen) centerArea.webkitRequestFullscreen();
        }

        function exitFull() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    </script>
</body>
</html>
