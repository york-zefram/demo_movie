<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM VIDEO PLAYER - NEO (Draggable AB)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            
            /* 画面の短い方を基準にサイズを決める「レスポンシブ・ユニット」 */
            --unit: min(1vw, 1.77vh); 
            
            --top-h: calc(var(--unit) * 8);
            --bottom-h: calc(var(--unit) * 22);
            --lane-w: calc(var(--unit) * 15);
            --icon-size: calc(var(--unit) * 10);
            --icon-max: 55px;
            --fs-status-h: 10vh;
            --disabled-color: #333;
            --ad-h: 40px;
        }

        /* BODYは単なる背景。
           ここが縦になっても、中の zefram-screen は動じない。
        */
        body { 
            background: #000; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        #zefram-chassis {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ここが「物理液晶」。
           どんなに外側が縦長になっても、この箱自体が「縦長」になることを許さない設定です。
        */
        #zefram-screen {
            position: relative;
            background: #000;
            color: var(--neon-blue);
            font-family: 'Michroma', sans-serif;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            overflow: hidden;

            /* 16:9の物理サイズを固定 */
            width: calc(var(--unit) * 100);
            height: calc(var(--unit) * 56.25);
            
            /* 縦画面時に中央に浮くように見えるための影 */
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            border: 1px solid #111;
        }

        /* 全画面時は制限を解除 */
        #zefram-chassis:fullscreen #zefram-screen,
        #zefram-chassis:webkit-full-screen #zefram-screen {
            width: 100vw !important;
            height: 100vh !important;
            border: none;
        }

        /* 内部要素の高さ・幅を固定値(unit)ベースに変更 */
        #top-container {
            height: var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: calc(var(--unit) * 1.5); letter-spacing: 0.2em;
            flex-shrink: 0;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #050505; z-index: 50; overflow: hidden;
        }

        #bottom-container {
            height: var(--bottom-h);
            background: #000; z-index: 100;
            display: flex; align-items: center; border-top: 1px solid #333;
            flex-shrink: 0;
        }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; position: relative;
            background: #000;
        }

        #video-viewport-wrapper {
            width: 100%; height: 100%;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        #yt-player, #local-video { width: 100%; height: 100%; object-fit: contain; }
        #local-video { display: none; }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 10px 0; box-sizing: border-box; z-index: 200;
        }

        .grid-icon-box {
            width: var(--icon-size); 
            height: var(--icon-size);
            max-width: var(--icon-max); 
            max-height: var(--icon-max);
            background: none; border: 1px solid var(--neon-blue); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: calc(var(--unit) * 1.8); transition: 0.2s;
            flex-shrink: 0;
        }
        
        /* 選曲ボタンの指定反映 */
        #btn-lst { font-size: calc(var(--unit) * 1.4); } 

        .grid-icon-box.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }
        .grid-icon-box.blank { border: 1px solid #222; cursor: default; color: #444; }
        .grid-icon-box.locked { border-color: var(--disabled-color); color: var(--disabled-color); cursor: default; pointer-events: none; }

        #dynamic-slot {
            flex: 1; height: 100%; padding: 0 15px; display: flex; align-items: center; justify-content: center;
        }

        .mode-panel { display: none; width: 100%; flex-direction: column; gap: 5px; }
        .mode-panel.active { display: flex; }

        /* リストオーバーレイ */
        #list-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column;
        }
        #list-overlay.active { display: flex; }

        #list-header { padding: 10px 20px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .list-top-row { display: flex; justify-content: space-between; align-items: center; }
        .list-title { font-size: 16px; color: var(--neon-blue); }
        .list-close { font-size: 14px; cursor: pointer; color: var(--neon-blue); }

        #list-content { flex: 1; overflow-y: auto; }
        .list-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #111; cursor: pointer; gap: 15px; }
        .list-thumb { width: 80px; aspect-ratio: 16/9; background: #222; flex-shrink: 0; }
        .list-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .list-info { flex: 1; min-width: 0; }
        .list-item-title { color: #fff; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* シークバー周り */
        .bar-track { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.1); position: relative; cursor: pointer; border-radius: 5px; }
        .bar-fill { height: 100%; background: rgba(0, 243, 255, 0.3); width: 0%; position: absolute; border-radius: 5px; pointer-events: none; }
        #ab-range { height: 100%; background: var(--neon-blue); position: absolute; display: none; border-radius: 5px; }
        .knob-ab { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; background: #000; border: 1px solid var(--neon-blue); color: var(--neon-blue); display: none; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; z-index: 10; }
        #now-knob { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: #fff; border-radius: 50%; z-index: 5; }

        .time-display { display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px; }
        .input-box { display: flex; gap: 8px; width: 100%; }
        input[type=text] { flex: 1; background: #111; border: 1px solid var(--neon-blue); color: #fff; padding: 8px; font-family: 'Michroma', sans-serif; font-size: 10px; outline: none; }
        .btn-go { background: var(--neon-blue); color: #000; border: none; padding: 0 10px; font-family: 'Michroma', sans-serif; font-size: 10px; cursor: pointer; }

        #fs-status-bar { display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: var(--fs-status-h); background: #000; border-top: 1px solid #333; z-index: 999; align-items: center; justify-content: space-evenly; }
        #zefram-chassis:fullscreen #fs-status-bar, #zefram-chassis:webkit-full-screen #fs-status-bar { display: flex; }
        
        .fs-btn { flex: 1; height: 60%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; color: var(--neon-blue); }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="zefram-chassis">
        <div id="zefram-screen">

            <div id="top-container">ZEFRAM VIDEO PLAYER - NEO</div>

            <div id="center-area">
                <div id="left-lane" class="side-lane">
                    <div class="grid-icon-box locked" id="btn-spd">SPD</div>
                    <div class="grid-icon-box locked" id="btn-lop">LOP</div>
                    <div class="grid-icon-box locked" id="btn-mir">MIR</div>
                    <div class="grid-icon-box locked" id="btn-hom">HOM</div>
                    <div class="grid-icon-box locked" id="btn-a">A</div>
                    <div class="grid-icon-box locked" id="btn-top">TOP</div>
                </div>

                <div id="video-main">
                    <div id="video-viewport-wrapper">
                        <div id="yt-player"></div>
                        <video id="local-video" playsinline></video>
                    </div>
                </div>

                <div id="right-lane" class="side-lane">
                    <div class="grid-icon-box blank">BAG</div>
                    <div class="grid-icon-box locked" id="btn-lst">選 曲</div>
                    <div class="grid-icon-box breathe" id="btn-fil">FIL</div>
                    <div class="grid-icon-box breathe" id="btn-web">WEB</div>
                    <div class="grid-icon-box locked" id="btn-b">B</div>
                    <div class="grid-icon-box blank">--</div>
                </div>

                <div id="fs-status-bar">
                    <div class="fs-btn" id="fs-btn-time">00:00 / 00:00</div>
                    <div class="fs-btn" id="fs-btn-exit">EXIT</div>
                </div>
            </div>

            <div id="bottom-container">
                <div style="width:var(--lane-w); display:flex; justify-content:center;">
                    <div class="grid-icon-box locked" id="btn-play-pause" style="border-radius: 50%; width: calc(var(--unit)*12); height: calc(var(--unit)*12); font-size: 18px;">▶</div>
                </div>

                <div id="dynamic-slot">
                    <div id="panel-home" class="mode-panel">
                        <div class="bar-track" id="main-track">
                            <div id="ab-range"></div>
                            <div class="bar-fill" id="main-fill"></div>
                            <div id="now-knob"></div>
                            <div class="knob-ab" id="knob-a">A</div>
                            <div class="knob-ab" id="knob-b">B</div>
                        </div>
                        <div class="time-display">
                            <span id="txt-cur">00:00</span>
                            <span id="txt-total">00:00</span>
                        </div>
                    </div>

                    <div id="panel-speed" class="mode-panel">
                        <div class="bar-track" id="speed-track">
                            <div class="bar-fill" id="speed-fill" style="width: 50%; background:var(--neon-blue); opacity:1;"></div>
                        </div>
                        <div class="speed-display" id="txt-speed" style="text-align:center; margin-top:5px;">1.00X</div>
                    </div>

                    <div id="panel-web" class="mode-panel active">
                        <div class="input-box">
                            <input type="text" id="input-url" placeholder="URL OR ID...">
                            <button class="btn-go" id="btn-url-go">GO</button>
                        </div>
                    </div>

                    <div id="panel-file" class="mode-panel">
                        <div class="input-box">
                            <button class="btn-go" style="width:100%; height:35px;" onclick="document.getElementById('file-input').click()">LOCAL FILE</button>
                            <input type="file" id="file-input" accept="video/*">
                        </div>
                    </div>
                </div>

                <div style="width:var(--lane-w); display:flex; justify-content:center;">
                    <div class="grid-icon-box locked" id="btn-full" onclick="enterFull()">FULL</div>
                </div>
            </div>
        </div>
    </div>

    <div id="list-overlay">
        <div id="list-header">
            <div class="list-top-row">
                <div class="list-title">PLAYLIST</div>
                <div class="list-close" id="list-btn-close">CLOSE</div>
            </div>
        </div>
        <div id="list-content"></div>
    </div>

    <script>
        // [ロジック部分は以前のものを継承し、正常に動作するように維持]
        const state = {
            player: null, localVid: null, isYoutube: true, isInitialized: false,
            currentMode: 'web', lastModeBeforeFull: 'home', isMirror: false, isLoop: false,
            activeDrag: null, playbackRate: 1.0, startT: 0, endT: 0,
            playlist: JSON.parse(localStorage.getItem('zefram_playlist') || '[]')
        };

        const getT = () => state.isYoutube ? (state.player?.getCurrentTime?.() || 0) : state.localVid.currentTime;
        const getD = () => state.isYoutube ? (state.player?.getDuration?.() || 0) : state.localVid.duration;
        const setT = (t) => state.isYoutube ? state.player.seekTo(t, true) : (state.localVid.currentTime = t);
        const setR = (r) => state.isYoutube ? state.player.setPlaybackRate(r) : (state.localVid.playbackRate = r);

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            state.player = new YT.Player('yt-player', {
                width: '100%', height: '100%', videoId: '',
                playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
                events: { 'onReady': onPlayerReady, 'onStateChange': () => updatePlayIcon() }
            });
        };

        function onPlayerReady() {
            state.localVid = document.getElementById('local-video');
            initEvents();
            updateLSTButtonState();
            render();
        }

        function activateApp() {
            if (state.isInitialized) return;
            state.isInitialized = true;
            document.querySelectorAll('.grid-icon-box').forEach(el => { el.classList.remove('locked'); el.classList.remove('breathe'); });
            switchMode('home');
        }

        function updateLSTButtonState() {
            const btnLst = document.getElementById('btn-lst');
            if (state.playlist.length > 0) btnLst.classList.remove('locked');
            else btnLst.classList.add('locked');
        }

        function render() {
            if (!state.isInitialized) { requestAnimationFrame(render); return; }
            const now = getT();
            const dur = getD();
            if (state.isLoop && state.endT > state.startT && (now >= state.endT || now < state.startT - 0.1)) setT(state.startT);
            if (dur > 0) {
                const p = (now / dur) * 100;
                if (state.activeDrag !== 'now') {
                    document.getElementById('main-fill').style.width = p + "%";
                    document.getElementById('now-knob').style.left = p + "%";
                    document.getElementById('txt-cur').innerText = formatTime(now);
                }
                document.getElementById('txt-total').innerText = formatTime(dur);
                document.getElementById('fs-btn-time').innerText = `${formatTime(now)} / ${formatTime(dur)}`;
                
                if (state.isLoop) {
                    const sP = (state.startT / dur) * 100, eP = (state.endT / dur) * 100;
                    document.getElementById('ab-range').style.display = 'block';
                    document.getElementById('ab-range').style.left = sP + "%";
                    document.getElementById('ab-range').style.width = (eP - sP) + "%";
                    document.getElementById('knob-a').style.display = document.getElementById('knob-b').style.display = 'flex';
                    document.getElementById('knob-a').style.left = sP + "%";
                    document.getElementById('knob-b').style.left = eP + "%";
                } else {
                    document.getElementById('ab-range').style.display = 'none';
                    document.getElementById('knob-a').style.display = document.getElementById('knob-b').style.display = 'none';
                }
            }
            updatePlayIcon();
            requestAnimationFrame(render);
        }

        function formatTime(s) {
            const m = Math.floor(s/60), rs = Math.floor(s%60);
            return `${m<10?'0'+m:m}:${rs<10?'0'+rs:rs}`;
        }

        function initEvents() {
            document.getElementById('btn-play-pause').onclick = () => {
                if(state.isYoutube) state.player.getPlayerState() === 1 ? state.player.pauseVideo() : state.player.playVideo();
                else state.localVid.paused ? state.localVid.play() : state.localVid.pause();
            };
            document.getElementById('btn-mir').onclick = () => {
                state.isMirror = !state.isMirror;
                document.getElementById('btn-mir').classList.toggle('active', state.isMirror);
                document.getElementById('video-viewport-wrapper').style.transform = state.isMirror ? "scaleX(-1)" : "none";
            };
            document.getElementById('btn-lop').onclick = () => {
                state.isLoop = !state.isLoop; if(state.isLoop && state.endT === 0) state.endT = getD();
                document.getElementById('btn-lop').classList.toggle('active', state.isLoop);
            };
            document.getElementById('btn-a').onclick = () => { state.startT = getT(); state.isLoop = true; document.getElementById('btn-lop').classList.add('active'); };
            document.getElementById('btn-b').onclick = () => { state.endT = getT(); state.isLoop = true; document.getElementById('btn-lop').classList.add('active'); };
            document.getElementById('btn-top').onclick = () => setT(state.isLoop ? state.startT : 0);
            
            document.getElementById('btn-hom').onclick = () => switchMode('home');
            document.getElementById('btn-spd').onclick = () => switchMode('speed');
            document.getElementById('btn-web').onclick = () => switchMode('web');
            document.getElementById('btn-fil').onclick = () => switchMode('file');

            document.getElementById('btn-url-go').onclick = () => {
                const v = document.getElementById('input-url').value;
                const id = v.split('v=')[1]?.split('&')[0] || v.split('/').pop();
                if(id) {
                    state.isYoutube = true;
                    document.getElementById('local-video').style.display = 'none';
                    document.getElementById('yt-player').style.display = 'block';
                    state.player.loadVideoById(id);
                    activateApp();
                }
            };

            document.getElementById('file-input').onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    state.isYoutube = false;
                    document.getElementById('yt-player').style.display = 'none';
                    document.getElementById('local-video').style.display = 'block';
                    state.localVid.src = URL.createObjectURL(file);
                    state.localVid.play();
                    activateApp();
                }
            };
        }

        function switchMode(mode) {
            state.currentMode = mode;
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${mode}`).classList.add('active');
            document.querySelectorAll('.side-lane .grid-icon-box').forEach(el => el.classList.remove('active'));
            const btn = document.getElementById(`btn-${mode.substring(0,3)}`);
            if(btn) btn.classList.add('active');
        }

        function updatePlayIcon() {
            const btn = document.getElementById('btn-play-pause');
            const isPlaying = state.isYoutube ? (state.player?.getPlayerState?.() === 1) : !state.localVid.paused;
            btn.innerText = isPlaying ? "Ⅱ" : "▶";
        }

        function enterFull() {
            const el = document.getElementById('zefram-chassis');
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
