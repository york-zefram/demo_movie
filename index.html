<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM PLAYER NEO - MINIMAL EDITION</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); }
        body { background: #000; color: var(--neon-blue); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; text-transform: uppercase; }

        /* 映像層：全画面 */
        #player-wrapper { position: relative; width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; }
        #yt-player { width: 100vw; aspect-ratio: 16/9; pointer-events: auto; }

        /* 統合されたHOMEメニュー（66%ライン） */
        #home-overlay {
            position: absolute; top: 66%; left: 50%; transform: translate(-50%, -30%);
            width: 90%; background: rgba(10, 10, 10, 0.9); border-radius: 12px;
            padding: 20px; z-index: 1000; transition: opacity 0.4s ease;
            display: flex; flex-direction: column; gap: 15px; border: 1px solid #333;
        }

        .nav-row { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
        #play-btn {
            width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent;
            border-left: 25px solid var(--neon-blue); cursor: pointer; filter: drop-shadow(var(--neon-glow));
        }

        .btn-nav {
            flex: 1; padding: 10px 0; background: none; border: 1px solid var(--neon-blue);
            color: #fff; font-size: 11px; cursor: pointer; border-radius: 4px; transition: 0.2s;
            text-align: center;
        }
        .btn-nav.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }

        #dynamic-content { min-height: 60px; display: flex; align-items: center; }
        .mode-panel { display: none; width: 100%; }
        .mode-panel.active { display: flex; flex-direction: column; }

        /* シークバー・AB点 */
        .bar-track { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.15); position: relative; cursor: pointer; }
        .bar-fill { height: 100%; background: var(--neon-blue); width: 0%; pointer-events: none; }
        .knob-now {
            position: absolute; top: 50%; width: 16px; height: 16px; background: #fff;
            border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff;
            z-index: 150; pointer-events: none;
        }
        .knob-ab {
            position: absolute; top: 50%; width: 34px; height: 34px;
            border: 2px solid var(--neon-blue); background: rgba(0,0,0,0.9);
            color: var(--neon-blue); border-radius: 50%; transform: translate(-50%, -50%);
            display: none; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; cursor: pointer; z-index: 140;
        }
        .knob-ab.active { display: flex; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="yt-player"></div>

    <div id="home-overlay">
        <div class="nav-row">
            <div id="play-btn"></div>
            <button class="btn-nav active" data-mode="seek">HOME</button>
            <button class="btn-nav" data-mode="url">URL</button>
            <button class="btn-nav" id="nav-mirror">MIRROR</button>
            <button class="btn-nav" id="nav-loop">LOOP</button>
            <button class="btn-nav" data-mode="speed">SPEED</button>
            <button class="btn-nav" data-mode="list">LIST</button>
        </div>

        <div id="dynamic-content">
            <div id="panel-seek" class="mode-panel active">
                <div class="bar-track" id="main-track">
                    <div class="bar-fill" id="main-fill"></div>
                    <div class="knob-now" id="main-knob" style="left: 0%;"></div>
                    <div class="knob-ab" id="knob-a" style="left: 0%;">A</div>
                    <div class="knob-ab" id="knob-b" style="left: 100%;">B</div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:10px; margin-top:12px; color: #888;">
                    <span id="txt-cur">00:00</span><span id="txt-total">00:00</span>
                </div>
            </div>
            <div id="panel-url" class="mode-panel">
                <div style="display:flex; gap:10px; width:100%;">
                    <input type="text" id="input-url" style="flex:1; background:#111; border:1px solid #444; color:#fff; padding:8px;" placeholder="YOUTUBE URL OR ID...">
                    <button class="btn-nav" id="btn-url-go" style="flex:none; width:60px;">GO</button>
                </div>
            </div>
            <div id="panel-speed" class="mode-panel">
                <div style="display:flex; justify-content:center; align-items:center; gap:30px;">
                    <button class="btn-nav" id="btn-speed-down" style="width:40px;">-</button>
                    <span id="txt-speed" style="font-size:20px; min-width:60px; text-align:center;">1.00x</span>
                    <button class="btn-nav" id="btn-speed-up" style="width:40px;">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        player: null,
        isLoop: false,
        isMirror: false,
        currentMode: 'seek',
        startT: 0,
        endT: 0,
        activeDrag: null,
        uiTimer: null
    };

    const fmt = (s) => {
        const m = Math.floor(s/60), rs = Math.floor(s%60);
        return `${m<10?'0'+m:m}:${rs<10?'0'+rs:rs}`;
    };

    function update() {
        if (!state.player || !state.player.getCurrentTime || state.activeDrag) return;
        const now = state.player.getCurrentTime(), dur = state.player.getDuration();
        if (state.isLoop && now >= (state.endT - 0.2)) state.player.seekTo(state.startT, true);
        if (dur > 0) {
            const p = (now / dur) * 100;
            document.getElementById('main-knob').style.left = p + "%";
            document.getElementById('main-fill').style.width = p + "%";
            document.getElementById('txt-cur').innerText = fmt(now);
            document.getElementById('txt-total').innerText = fmt(dur);
        }
    }

    function toggleLoop() {
        state.isLoop = !state.isLoop;
        const dur = state.player.getDuration();
        if (state.endT === 0 || state.endT > dur) state.endT = dur;
        ['nav-loop', 'knob-a', 'knob-b'].forEach(id => document.getElementById(id).classList.toggle('active', state.isLoop));
        if (state.isLoop) { switchMode('seek'); state.player.seekTo(state.startT, true); }
    }

    function toggleMirror() {
        state.isMirror = !state.isMirror;
        document.getElementById('yt-player').style.transform = state.isMirror ? "scaleX(-1)" : "scaleX(1)";
        document.getElementById('nav-mirror').classList.toggle('active', state.isMirror);
    }

    function switchMode(m) {
        state.currentMode = m;
        document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
        const targetPanel = (m === 'loop') ? 'seek' : m;
        const panel = document.getElementById(`panel-${targetPanel}`);
        if(panel) panel.classList.add('active');
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
        wakeUI();
    }

    function initEvents() {
        document.getElementById('play-btn').onclick = () => {
            state.player.getPlayerState() === 1 ? state.player.pauseVideo() : state.player.playVideo();
        };
        document.querySelectorAll('.btn-nav[data-mode]').forEach(btn => btn.onclick = () => switchMode(btn.dataset.mode));
        document.getElementById('nav-loop').onclick = toggleLoop;
        document.getElementById('nav-mirror').onclick = toggleMirror;
        document.getElementById('btn-url-go').onclick = () => {
            const val = document.getElementById('input-url').value;
            const id = val.split('v=')[1]?.split('&')[0] || val.split('/').pop();
            if(id) { state.player.loadVideoById(id); switchMode('seek'); }
        };

        const setSpeed = (v) => {
            const s = Math.max(0.5, Math.min(1.5, v));
            state.player.setPlaybackRate(s);
            document.getElementById('txt-speed').innerText = s.toFixed(2) + "x";
        };
        document.getElementById('btn-speed-up').onclick = () => setSpeed(state.player.getPlaybackRate() + 0.05);
        document.getElementById('btn-speed-down').onclick = () => setSpeed(state.player.getPlaybackRate() - 0.05);

        const track = document.getElementById('main-track');
        const handleDrag = (e) => {
            if (!state.activeDrag) return;
            const rect = track.getBoundingClientRect();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const p = Math.max(0, Math.min(100, ((x - rect.left) / rect.width) * 100));
            const d = state.player.getDuration() || 0;
            if (state.activeDrag === 'now') state.player.seekTo((p/100) * d, true);
            else {
                document.getElementById('knob-' + state.activeDrag).style.left = p + "%";
                state.startT = (parseFloat(document.getElementById('knob-a').style.left)/100)*d;
                state.endT = (parseFloat(document.getElementById('knob-b').style.left)/100)*d;
            }
        };

        track.onmousedown = (e) => { if(e.target.id === 'main-track') { state.activeDrag = 'now'; handleDrag(e); } };
        document.getElementById('knob-a').onmousedown = (e) => { if(state.isLoop) { state.activeDrag = 'a'; e.stopPropagation(); } };
        document.getElementById('knob-b').onmousedown = (e) => { if(state.isLoop) { state.activeDrag = 'b'; e.stopPropagation(); } };
        window.onmousemove = handleDrag;
        window.onmouseup = () => state.activeDrag = null;
    }

    function wakeUI() {
        const o = document.getElementById('home-overlay');
        o.style.opacity = "1";
        clearTimeout(state.uiTimer);
        state.uiTimer = setTimeout(() => {
            if (!state.isLoop && state.currentMode === 'seek' && !state.activeDrag) o.style.opacity = "0";
        }, 5000);
    }

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
        state.player = new YT.Player('yt-player', {
            videoId: 'ScXNbe_5Y0o',
            playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
            events: { 'onReady': () => { initEvents(); setInterval(update, 50); wakeUI(); } }
        });
    };
</script>
</body>
</html>
