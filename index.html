<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --disabled-color: #444;
        }
        
        body { 
            background: #000; 
            color: var(--neon-blue); 
            font-family: 'Michroma', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            text-transform: uppercase;
        }

        header {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            letter-spacing: 0.15em; font-size: 14px; z-index: 2000; pointer-events: none;
        }

        #main-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center; background: #000;
        }

        #yt-player { width: 100%; height: 100%; pointer-events: none; }

        #home-overlay {
            position: absolute; top: 66%; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(10, 10, 10, 0.85); border-radius: 12px;
            padding: 20px 20px 60px 20px; z-index: 1000; 
            display: flex; flex-direction: column; gap: 40px; border: 1px solid #333;
        }

        .nav-row { display: flex; justify-content: space-between; gap: 8px; }
        .btn-nav {
            flex: 1; padding: 10px 0; background: none; border: 1px solid var(--neon-blue);
            color: #fff; font-family: 'Michroma', sans-serif; font-size: 10px; 
            cursor: pointer; border-radius: 4px; transition: 0.2s;
        }
        .btn-nav.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }

        /* シークバー */
        .bar-track { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.15); position: relative; cursor: pointer; border-radius: 3px; }
        .bar-fill { height: 100%; background: rgba(0, 243, 255, 0.3); width: 0%; position: absolute; z-index: 1; pointer-events: none; }
        #ab-range { height: 100%; background: var(--neon-blue); position: absolute; display: none; z-index: 2; box-shadow: var(--neon-glow); pointer-events: none; }
        
        .knob { position: absolute; top: 50%; transform: translate(-50%, -50%); border-radius: 50%; cursor: pointer; }
        #main-knob { width: 14px; height: 14px; background: #fff; box-shadow: 0 0 10px #fff; z-index: 10; }
        .knob-ab {
            width: 34px; height: 34px; border: 2px solid var(--neon-blue); background: rgba(0,0,0,0.9);
            color: var(--neon-blue); display: none; align-items: center; justify-content: center;
            font-size: 12px; z-index: 15; box-shadow: var(--neon-glow);
        }

        .time-display { display: flex; justify-content: space-between; margin-top: 24px; font-size: 18px; filter: drop-shadow(var(--neon-glow)); }

        /* トランスポートエリア */
        .transport-container { display: flex; justify-content: center; align-items: center; gap: 20px; width: 100%; }
        .btn-circle {
            background: none; border: 2px solid var(--neon-blue); color: var(--neon-blue);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-family: 'Michroma', sans-serif; transition: 0.2s; box-shadow: var(--neon-glow);
        }
        .btn-circle:disabled { border-color: var(--disabled-color); color: var(--disabled-color); box-shadow: none; cursor: default; }
        .btn-circle.active { background: var(--neon-blue); color: #000; }
        .btn-ab-ctrl { width: 45px; height: 45px; font-size: 14px; }
        .btn-main-ctrl { width: 65px; height: 65px; font-size: 20px; }

        .url-box { display: flex; gap: 10px; width: 100%; }
        input[type=text] { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 10px; font-family: 'Michroma', sans-serif; font-size: 10px; outline: none; }
    </style>
</head>
<body>

<header>ZEFRAM VIDEO PLAYER</header>

<div id="main-container">
    <div id="yt-player"></div>
    <div id="home-overlay">
        <div class="nav-row">
            <button class="btn-nav active" data-mode="seek">HOME</button>
            <button class="btn-nav" data-mode="url">URL</button>
            <button class="btn-nav" id="nav-mirror">MIRROR</button>
            <button class="btn-nav" id="nav-loop">LOOP</button>
            <button class="btn-nav" data-mode="speed">SPEED</button>
            <button class="btn-nav" data-mode="list">LIST</button>
        </div>

        <div id="dynamic-content">
            <div id="panel-seek" class="mode-panel active">
                <div class="bar-track" id="main-track">
                    <div class="bar-fill" id="main-fill"></div>
                    <div id="ab-range"></div>
                    <div class="knob" id="main-knob" style="left: 0%;"></div>
                    <div class="knob knob-ab" id="knob-a" style="left: 0%;">A</div>
                    <div class="knob knob-ab" id="knob-b" style="left: 100%;">B</div>
                </div>
                <div class="time-display">
                    <span id="txt-cur">00:00</span><span id="txt-total">00:00</span>
                </div>
            </div>
            <div id="panel-url" class="mode-panel">
                <div class="url-box">
                    <input type="text" id="input-url" placeholder="YOUTUBE URL OR ID...">
                    <button class="btn-nav" id="btn-url-go" style="flex:none; width:80px;">GO</button>
                </div>
            </div>
        </div>

        <div class="transport-container">
            <button class="btn-circle btn-ab-ctrl" id="btn-set-a" disabled>A</button>
            <button class="btn-circle btn-main-ctrl" id="btn-prev">|◀</button>
            <button class="btn-circle btn-main-ctrl" id="btn-play">▶||</button>
            <button class="btn-circle btn-ab-ctrl" id="btn-set-b" disabled>B</button>
        </div>
    </div>
</div>

<script>
    const state = {
        player: null, isLoop: false, isMirror: false, currentMode: 'seek',
        startT: 0, endT: 0, activeDrag: null
    };

    const fmt = (s) => {
        const m = Math.floor(s/60), rs = Math.floor(s%60);
        return `${m<10?'0'+m:m}:${rs<10?'0'+rs:rs}`;
    };

    function update() {
        if (!state.player || !state.player.getCurrentTime) return;
        const now = state.player.getCurrentTime(), dur = state.player.getDuration();
        
        if (state.isLoop && state.endT > state.startT) {
            if (now >= state.endT || now < state.startT - 0.5) state.player.seekTo(state.startT, true);
        }

        if (dur > 0) {
            const p = (now / dur) * 100;
            document.getElementById('main-fill').style.width = p + "%";
            document.getElementById('main-knob').style.left = p + "%";
            document.getElementById('txt-cur').innerText = fmt(now);
            document.getElementById('txt-total').innerText = fmt(dur);

            const range = document.getElementById('ab-range'), ka = document.getElementById('knob-a'), kb = document.getElementById('knob-b');
            const btnA = document.getElementById('btn-set-a'), btnB = document.getElementById('btn-set-b');

            if (state.isLoop) {
                ka.style.display = kb.style.display = range.style.display = 'flex';
                btnA.disabled = btnB.disabled = false;
                const sP = (state.startT / dur) * 100, eP = (state.endT || dur) / dur * 100;
                ka.style.left = sP + "%";
                kb.style.left = eP + "%";
                range.style.left = sP + "%";
                range.style.width = (eP - sP) + "%";
                range.style.display = 'block';
            } else {
                ka.style.display = kb.style.display = range.style.display = 'none';
                btnA.disabled = btnB.disabled = true;
            }
        }
    }

    function initEvents() {
        document.getElementById('btn-play').onclick = () => {
            state.player.getPlayerState() === 1 ? state.player.pauseVideo() : state.player.playVideo();
        };

        document.getElementById('nav-loop').onclick = () => {
            state.isLoop = !state.isLoop;
            document.getElementById('nav-loop').classList.toggle('active', state.isLoop);
            if(state.isLoop && state.endT === 0) state.endT = state.player.getDuration();
        };

        document.getElementById('btn-set-a').onclick = () => { if(state.isLoop) state.startT = state.player.getCurrentTime(); };
        document.getElementById('btn-set-b').onclick = () => { if(state.isLoop) state.endT = state.player.getCurrentTime(); };
        document.getElementById('btn-prev').onclick = () => state.player.seekTo(state.startT, true);

        const handleDrag = (e) => {
            if (!state.activeDrag) return;
            const rect = document.getElementById('main-track').getBoundingClientRect();
            const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            const time = p * state.player.getDuration();
            if (state.activeDrag === 'now') state.player.seekTo(time, true);
            else if (state.activeDrag === 'a') state.startT = Math.min(time, state.endT - 0.1);
            else if (state.activeDrag === 'b') state.endT = Math.max(time, state.startT + 0.1);
        };

        document.getElementById('main-knob').onmousedown = () => state.activeDrag = 'now';
        document.getElementById('knob-a').onmousedown = () => { if(state.isLoop) state.activeDrag = 'a'; };
        document.getElementById('knob-b').onmousedown = () => { if(state.isLoop) state.activeDrag = 'b'; };
        window.onmousemove = handleDrag;
        window.onmouseup = () => state.activeDrag = null;

        document.querySelectorAll('.btn-nav[data-mode]').forEach(b => b.onclick = () => {
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${b.dataset.mode}`).classList.add('active');
            document.querySelectorAll('.btn-nav[data-mode]').forEach(btn => btn.classList.toggle('active', btn === b));
        });
        
        document.getElementById('btn-url-go').onclick = () => {
            const v = document.getElementById('input-url').value;
            const id = v.split('v=')[1]?.split('&')[0] || v.split('/').pop();
            if(id) state.player.loadVideoById(id);
        };
    }

    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
        state.player = new YT.Player('yt-player', {
            videoId: 'ScXNbe_5Y0o',
            playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
            events: { 'onReady': () => { initEvents(); setInterval(update, 100); } }
        });
    };
</script>
</body>
</html>
