<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM PLAYER NEO - STABLE STEALTH</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); }
        body { background: #000; color: var(--neon-blue); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; text-transform: uppercase; }

        #player-wrapper { position: relative; width: 100vw; aspect-ratio: 16/9; background: #000; }
        #yt-player { width: 100%; height: 100%; pointer-events: auto; }

        #seekbar-container {
            position: absolute; top: 66%; left: 5%; width: 90%; height: 2px;
            z-index: 100; background: rgba(255, 255, 255, 0.2);
        }
        #seekbar-progress { height: 100%; background: var(--neon-blue); box-shadow: var(--neon-glow); width: 0%; pointer-events: none; }
        
        .ab-point {
            position: absolute; top: 50%; width: 34px; height: 34px;
            border: 2px solid var(--neon-blue); background: rgba(0,0,0,0.9);
            color: var(--neon-blue); border-radius: 50%;
            transform: translate(-50%, -50%); display: none; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: var(--neon-glow); z-index: 120;
        }
        .ab-point.active { display: flex; }

        #seekbar-knob {
            position: absolute; top: 50%; width: 14px; height: 14px;
            background: #fff; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #fff; cursor: pointer; z-index: 110;
        }

        .neo-panel {
            padding: 10px 20px; background: #000; border-top: 1px solid #222;
            display: grid; grid-template-columns: 1fr 2fr 1.5fr; align-items: center; gap: 20px;
        }

        .speed-ctrl { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-circle {
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid var(--neon-blue); background: none;
            color: var(--neon-blue); cursor: pointer; font-size: 18px;
            box-shadow: var(--neon-glow);
        }

        .meta-ctrl { display: flex; flex-direction: column; gap: 8px; }
        .url-box { background: #111; border: 1px solid #333; color: var(--neon-blue); padding: 8px; font-size: 12px; }
        .action-btns { display: flex; gap: 5px; }
        .btn-rect {
            flex: 1; background: none; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 8px; cursor: pointer; font-size: 11px;
            box-shadow: var(--neon-glow); text-align: center;
        }
        .btn-rect.active { background: var(--neon-blue); color: #000; }

        .playlist { height: 80px; overflow-y: auto; font-size: 11px; border-left: 1px solid #222; padding-left: 10px; color: #666; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="yt-player"></div>
    <div id="seekbar-container">
        <div id="seekbar-progress"></div>
        <div id="seekbar-knob" style="left: 0%;"></div>
        <div id="point-a" class="ab-point" style="left: 0%;">A</div>
        <div id="point-b" class="ab-point" style="left: 100%;">B</div>
    </div>
</div>

<div class="neo-panel">
    <div class="speed-ctrl">
        <input type="range" id="speed-slider" min="0.5" max="1.5" step="0.05" value="1.0">
        <div class="speed-buttons">
            <button class="btn-circle" id="speed-down">−</button>
            <button class="btn-circle" id="speed-reset">○</button>
            <button class="btn-circle" id="speed-up">＋</button>
        </div>
    </div>

    <div class="meta-ctrl">
        <input type="text" id="url-input" class="url-box" placeholder="YOUTUBE URL...">
        <div class="action-btns">
            <button class="btn-rect" onclick="addTrack()">SELECT TRACK</button>
            <button class="btn-rect" id="mirror-btn" onclick="toggleMirror()">MIRROR</button>
            <button class="btn-rect" id="loop-btn" onclick="toggleLoopMode()">A-B LOOP</button>
        </div>
    </div>

    <div id="playlist" class="playlist">READY.</div>
</div>

<script>
    let player, isLoopActive = false, isMirror = false;
    let startT = 0, endT = 0, activeDrag = null;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            videoId: 'ScXNbe_5Y0o',
            playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
            events: { 
                'onReady': (e) => {
                    setInterval(update, 50);
                    initDragEvents();
                },
                'onStateChange': (e) => {
                    if (e.data === YT.PlayerState.PLAYING && endT === 0) {
                        endT = player.getDuration(); // 初期化時に動画の長さをセット
                    }
                }
            }
        });
    }

    function toggleLoopMode() {
        isLoopActive = !isLoopActive;
        document.getElementById('loop-btn').classList.toggle('active', isLoopActive);
        document.getElementById('point-a').classList.toggle('active', isLoopActive);
        document.getElementById('point-b').classList.toggle('active', isLoopActive);
        if (isLoopActive) player.seekTo(startT, true);
    }

    function update() {
        if (!player || !player.getCurrentTime || activeDrag) return;
        const now = player.getCurrentTime(), dur = player.getDuration();
        
        if (isLoopActive && now >= (endT - 0.2)) {
            player.seekTo(startT, true);
        }

        if (dur > 0) {
            const p = (now / dur) * 100;
            document.getElementById('seekbar-knob').style.left = p + "%";
            document.getElementById('seekbar-progress').style.width = p + "%";
        }
    }

    function initDragEvents() {
        const container = document.getElementById('seekbar-container');
        const elements = {
            'knob': document.getElementById('seekbar-knob'),
            'a': document.getElementById('point-a'),
            'b': document.getElementById('point-b')
        };

        const start = (type) => (e) => {
            if ((type === 'a' || type === 'b') && !isLoopActive) return;
            activeDrag = type;
            e.preventDefault();
        };

        elements.knob.addEventListener('mousedown', start('knob'));
        elements.knob.addEventListener('touchstart', start('knob'));
        elements.a.addEventListener('mousedown', start('a'));
        elements.a.addEventListener('touchstart', start('a'));
        elements.b.addEventListener('mousedown', start('b'));
        elements.b.addEventListener('touchstart', start('b'));

        const move = (e) => {
            if (!activeDrag) return;
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let p = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
            
            elements[activeDrag].style.left = p + "%";
            const d = player.getDuration() || 0;

            if (activeDrag === 'knob') {
                player.seekTo((p/100) * d, true);
            } else {
                startT = (parseFloat(elements.a.style.left)/100)*d;
                endT = (parseFloat(elements.b.style.left)/100)*d;
            }
        };

        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', () => activeDrag = null);
        window.addEventListener('touchend', () => activeDrag = null);
    }

    // 速度調整
    const slider = document.getElementById('speed-slider');
    slider.oninput = () => player.setPlaybackRate(parseFloat(slider.value));
    document.getElementById('speed-reset').onclick = () => { slider.value = 1.0; player.setPlaybackRate(1.0); };
    document.getElementById('speed-down').onclick = () => { slider.value = Math.max(0.5, parseFloat(slider.value) - 0.05); player.setPlaybackRate(slider.value); };
    document.getElementById('speed-up').onclick = () => { slider.value = Math.min(1.5, parseFloat(slider.value) + 0.05); player.setPlaybackRate(slider.value); };

    function toggleMirror() { 
        isMirror = !isMirror; 
        document.getElementById('yt-player').style.transform = isMirror?"scaleX(-1)":"scaleX(1)"; 
        document.getElementById('mirror-btn').classList.toggle('active', isMirror);
    }

    function addTrack() {
        const val = document.getElementById('url-input').value;
        const id = val.split('v=')[1]?.split('&')[0] || val.split('/').pop();
        if(id) player.loadVideoById(id);
    }
</script>
</body>
</html>
