<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (HD Sync)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
            --center-ratio: 16 / 9;
            --icon-size: 8vh; 
            --icon-max: 55px;
            --fs-status-h: 10vh;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px; letter-spacing: 0.2em;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #050505; z-index: 50; overflow: hidden;
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000; z-index: 100;
            display: flex; align-items: center; border-top: 1px solid #333;
        }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; position: relative;
        }

        #video-viewport-wrapper {
            width: 100%;
            height: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            max-height: 100%;
            aspect-ratio: var(--center-ratio);
            background: #000;
            transition: transform 0.3s ease;
        }

        #yt-player {
            width: 100%;
            height: 100%;
        }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }

        .grid-icon-box {
            width: var(--icon-size); height: var(--icon-size);
            max-width: var(--icon-max); max-height: var(--icon-max);
            background: none; border: 1px solid var(--neon-blue); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 10px; transition: 0.2s;
        }
        .grid-icon-box.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }
        .grid-icon-box.blank { border: 1px solid #222; cursor: default; color: #444; }

        #dynamic-slot {
            flex: 1; height: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center;
        }

        .mode-panel { display: none; width: 100%; flex-direction: column; gap: 10px; }
        .mode-panel.active { display: flex; }

        .bar-track { width: 100%; height: 12px; background: rgba(255, 255, 255, 0.1); position: relative; cursor: pointer; border-radius: 6px; }
        .bar-fill { height: 100%; background: var(--neon-blue); width: 0%; position: absolute; border-radius: 6px; box-shadow: var(--neon-glow); pointer-events: none; }
        .time-display { display: flex; justify-content: space-between; font-size: 14px; margin-top: 5px; }

        .input-box { display: flex; gap: 10px; width: 100%; }
        input[type=text] { 
            flex: 1; background: #111; border: 1px solid var(--neon-blue); color: #fff; 
            padding: 12px; font-family: 'Michroma', sans-serif; font-size: 12px; outline: none; border-radius: 4px;
        }
        .btn-go { 
            background: var(--neon-blue); color: #000; border: none; padding: 0 20px; 
            font-family: 'Michroma', sans-serif; font-size: 12px; cursor: pointer; border-radius: 4px;
        }

        #center-area:fullscreen #video-main { height: calc(100vh - var(--fs-status-h)); align-items: flex-start; }
        #center-area:fullscreen #video-viewport-wrapper { 
            max-width: calc((100vh - var(--fs-status-h)) * (16 / 9)); 
            max-height: calc(100vh - var(--fs-status-h)); 
        }
        #center-area:fullscreen .side-lane { display: none; }

        #exit-fs {
            display: none; position: absolute; bottom: 0; right: 0; width: var(--lane-w); height: var(--fs-status-h);
            z-index: 9999; align-items: center; justify-content: center; background: rgba(0,0,0,0.5);
        }
        #center-area:fullscreen #exit-fs { display: flex; }
    </style>
</head>
<body>

    <div id="top-container">ZEFRAM VIDEO PLAYER - NEO</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="grid-icon-box blank">SPD</div>
            <div class="grid-icon-box blank">LOP</div>
            <div class="grid-icon-box" id="btn-mir">MIR</div>
            <div class="grid-icon-box active" id="btn-hom">HOM</div>
            <div class="grid-icon-box blank">A</div>
            <div class="grid-icon-box blank">TOP</div>
        </div>

        <div id="video-main">
            <div id="video-viewport-wrapper">
                <div id="yt-player"></div>
            </div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="grid-icon-box blank">BAG</div>
            <div class="grid-icon-box blank">LST</div>
            <div class="grid-icon-box blank">FIL</div>
            <div class="grid-icon-box" id="btn-web">WEB</div>
            <div class="grid-icon-box blank">B</div>
            <div class="grid-icon-box blank">--</div>
        </div>

        <div id="exit-fs" onclick="exitFull()">
            <div style="color: #fff; font-size: 12px; font-weight: bold; cursor: pointer;">EXIT</div>
        </div>
    </div>

    <div id="bottom-container">
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" id="btn-play-pause" style="border-radius: 50%; width: 60px; height: 60px; font-size: 20px;">▶</div>
        </div>

        <div id="dynamic-slot">
            <div id="panel-home" class="mode-panel active">
                <div class="bar-track" id="main-track">
                    <div class="bar-fill" id="main-fill"></div>
                </div>
                <div class="time-display">
                    <span id="txt-cur">00:00</span>
                    <span id="txt-total">00:00</span>
                </div>
            </div>

            <div id="panel-web" class="mode-panel">
                <div class="input-box">
                    <input type="text" id="input-url" placeholder="YOUTUBE URL OR ID...">
                    <button class="btn-go" id="btn-url-go">GO</button>
                </div>
            </div>
        </div>

        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" id="btn-full" onclick="enterFull()">FULL</div>
        </div>
    </div>

    <script>
        const state = {
            player: null,
            currentMode: 'home',
            isMirror: false,
            isDragging: false
        };

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            // 画質低下を防ぐため、生成時に親要素のサイズを明示的に取得
            const wrapper = document.getElementById('video-viewport-wrapper');
            const w = wrapper.clientWidth;
            const h = wrapper.clientHeight;

            state.player = new YT.Player('yt-player', {
                width: w,
                height: h,
                videoId: 'ScXNbe_5Y0o',
                playerVars: { 
                    'rel': 0, 
                    'controls': 0, 
                    'modestbranding': 1, 
                    'playsinline': 1,
                    'vq': 'highres' // 高解像度を優先的に要求
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerReady(event) {
            // API経由で可能な最高画質を設定（強制力はYouTube側に依存）
            if(state.player.setPlaybackQuality) {
                state.player.setPlaybackQuality('hd1080');
            }
            render();
            initEvents();
        }

        function onPlayerStateChange(event) {
            const btn = document.getElementById('btn-play-pause');
            btn.innerText = (event.data === YT.PlayerState.PLAYING) ? "Ⅱ" : "▶";
            
            // 再生開始時にも改めて高画質設定を試行
            if (event.data === YT.PlayerState.PLAYING) {
                if(state.player.setPlaybackQuality) {
                    state.player.setPlaybackQuality('hd1080');
                }
            }
        }

        function render() {
            if (state.player && state.player.getCurrentTime) {
                const now = state.player.getCurrentTime();
                const dur = state.player.getDuration();
                if (dur > 0 && !state.isDragging) {
                    const p = (now / dur) * 100;
                    document.getElementById('main-fill').style.width = p + "%";
                    document.getElementById('txt-cur').innerText = formatTime(now);
                    document.getElementById('txt-total').innerText = formatTime(dur);
                }
            }
            requestAnimationFrame(render);
        }

        function formatTime(s) {
            const m = Math.floor(s/60), rs = Math.floor(s%60);
            return `${m<10?'0'+m:m}:${rs<10?'0'+rs:rs}`;
        }

        function initEvents() {
            document.getElementById('btn-play-pause').onclick = () => {
                const s = state.player.getPlayerState();
                s === YT.PlayerState.PLAYING ? state.player.pauseVideo() : state.player.playVideo();
            };

            document.getElementById('btn-mir').onclick = () => {
                state.isMirror = !state.isMirror;
                const wrapper = document.getElementById('video-viewport-wrapper');
                const btn = document.getElementById('btn-mir');
                wrapper.style.transform = state.isMirror ? "scaleX(-1)" : "none";
                btn.classList.toggle('active', state.isMirror);
            };

            document.getElementById('btn-hom').onclick = () => switchMode('home');
            document.getElementById('btn-web').onclick = () => switchMode('web');

            const track = document.getElementById('main-track');
            const handleSeek = (e) => {
                const rect = track.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const p = Math.max(0, Math.min(1, x / rect.width));
                state.player.seekTo(p * state.player.getDuration(), true);
            };

            track.onmousedown = (e) => { state.isDragging = true; handleSeek(e); };
            window.onmousemove = (e) => { if(state.isDragging) handleSeek(e); };
            window.onmouseup = () => { state.isDragging = false; };
            track.ontouchstart = (e) => { state.isDragging = true; handleSeek(e); };
            window.ontouchend = () => { state.isDragging = false; };

            document.getElementById('btn-url-go').onclick = () => {
                const v = document.getElementById('input-url').value;
                const id = v.split('v=')[1]?.split('&')[0] || v.split('/').pop();
                if(id) {
                    state.player.loadVideoById({'videoId': id, 'suggestedQuality': 'hd1080'});
                    switchMode('home');
                }
            };
        }

        function switchMode(mode) {
            state.currentMode = mode;
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('btn-hom').classList.toggle('active', mode === 'home');
            document.getElementById('btn-web').classList.toggle('active', mode === 'web');
            if(mode === 'home') document.getElementById('panel-home').classList.add('active');
            else if(mode === 'web') document.getElementById('panel-web').classList.add('active');
        }

        function enterFull() {
            const el = document.getElementById('center-area');
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

        function exitFull() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    </script>
</body>
</html>
