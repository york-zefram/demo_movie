<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Draggable AB)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
            --center-ratio: 16 / 9;
            --icon-size: 8vh; 
            --icon-max: 55px;
            --fs-status-h: 10vh;
            --disabled-color: #333;
            --ad-h: 50px;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px; letter-spacing: 0.2em;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #050505; z-index: 50; overflow: hidden;
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000; z-index: 100;
            display: flex; align-items: center; border-top: 1px solid #333;
        }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; position: relative;
        }

        #video-viewport-wrapper {
            width: 100%; height: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            max-height: 100%;
            aspect-ratio: var(--center-ratio);
            background: #000;
            transition: transform 0.3s ease;
            position: relative;
        }

        #yt-player, #local-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #local-video { display: none; object-fit: contain; }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }

        .grid-icon-box {
            width: var(--icon-size); height: var(--icon-size);
            max-width: var(--icon-max); max-height: var(--icon-max);
            background: none; border: 1px solid var(--neon-blue); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 10px; transition: 0.2s;
        }
        .grid-icon-box.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }
        .grid-icon-box.blank { border: 1px solid #222; cursor: default; color: #444; }
        .grid-icon-box.locked { border-color: var(--disabled-color); color: var(--disabled-color); cursor: default; pointer-events: none; }

        #dynamic-slot {
            flex: 1; height: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center;
        }

        .mode-panel { display: none; width: 100%; flex-direction: column; gap: 5px; }
        .mode-panel.active { display: flex; }

        /* Full Screen Title List Overlay */
        #list-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; flex-direction: column;
        }
        #list-overlay.active { display: flex; }

        #list-ad-area { height: var(--ad-h); width: 100%; background: #000; flex-shrink: 0; }
        
        #list-header {
            padding: 15px 20px; border-bottom: 1px solid #333;
            display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
        }
        .list-top-row { display: flex; justify-content: space-between; align-items: center; }
        .list-title { font-size: 16px; letter-spacing: 0.1em; color: var(--neon-blue); }
        .list-close { font-size: 16px; cursor: pointer; color: var(--neon-blue); padding: 5px; }
        .list-breadcrumb { font-size: 11px; color: var(--neon-blue); opacity: 0.8; letter-spacing: 0.1em; }

        #list-content { flex: 1; overflow-y: auto; padding: 0; }

        /* List Item Styling */
        .list-item {
            display: flex; align-items: center; padding: 10px 20px; border-bottom: 1px solid #1a1a1a;
            cursor: pointer; gap: 15px;
        }
        .list-item:active { background: #111; }
        .list-thumb { width: 80px; aspect-ratio: 16/9; background: #222; border-radius: 2px; object-fit: cover; }
        .list-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 2px; }
        .list-name { font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-channel { font-size: 10px; color: var(--neon-blue); opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-meta { display: flex; align-items: center; gap: 15px; }
        .list-duration { font-size: 12px; color: #888; font-family: sans-serif; }
        .list-actions { display: flex; gap: 10px; }
        .list-action-btn { width: 30px; height: 30px; border: 1px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--neon-blue); }

        /* QR Popup */
        #qr-popup {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; gap: 20px;
        }
        #qr-container { width: 250px; height: 250px; background: #fff; padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 10px; text-align: center; }

        /* Controls */
        .bar-track { width: 100%; height: 12px; background: rgba(255, 255, 255, 0.1); position: relative; cursor: pointer; border-radius: 6px; }
        .bar-fill { height: 100%; background: rgba(0, 243, 255, 0.3); width: 0%; position: absolute; border-radius: 6px; pointer-events: none; z-index: 2; }
        #ab-range { height: 100%; background: var(--neon-blue); position: absolute; display: none; z-index: 1; box-shadow: var(--neon-glow); border-radius: 6px; pointer-events: none; }
        .knob-ab { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; background: #000; border: 1px solid var(--neon-blue); color: var(--neon-blue); display: none; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; z-index: 10; cursor: pointer; }
        #now-knob { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; z-index: 5; pointer-events: none; }

        .time-display { display: flex; justify-content: space-between; font-size: 14px; margin-top: 5px; }
        .input-box { display: flex; gap: 10px; width: 100%; }
        input[type=text] { flex: 1; background: #111; border: 1px solid var(--neon-blue); color: #fff; padding: 12px; font-family: 'Michroma', sans-serif; font-size: 12px; outline: none; border-radius: 4px; }
        .btn-go { background: var(--neon-blue); color: #000; border: none; padding: 0 15px; font-family: 'Michroma', sans-serif; font-size: 12px; cursor: pointer; border-radius: 4px; }

        #fs-status-bar { display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: var(--fs-status-h); background: #000; border-top: 1px solid #333; z-index: 999; align-items: center; justify-content: space-evenly; }
        #center-area:fullscreen #fs-status-bar { display: flex; }
    </style>
</head>
<body>

    <div id="top-container">ZEFRAM VIDEO PLAYER - NEO</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="grid-icon-box locked" id="btn-spd">SPD</div>
            <div class="grid-icon-box locked" id="btn-lop">LOP</div>
            <div class="grid-icon-box locked" id="btn-mir">MIR</div>
            <div class="grid-icon-box locked" id="btn-hom">HOM</div>
            <div class="grid-icon-box locked" id="btn-a">A</div>
            <div class="grid-icon-box locked" id="btn-top">TOP</div>
        </div>

        <div id="video-main">
            <div id="video-viewport-wrapper">
                <div id="yt-player"></div>
                <video id="local-video" playsinline></video>
            </div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="grid-icon-box blank">BAG</div>
            <div class="grid-icon-box locked" id="btn-lst">LST</div>
            <div class="grid-icon-box breathe" id="btn-fil">FIL</div>
            <div class="grid-icon-box breathe" id="btn-web">WEB</div>
            <div class="grid-icon-box locked" id="btn-b">B</div>
            <div class="grid-icon-box blank">--</div>
        </div>

        <div id="fs-status-bar">
            <div class="fs-btn" id="fs-btn-exit" style="color:#fff;">EXIT</div>
        </div>
    </div>

    <div id="list-overlay">
        <div id="list-ad-area"></div>
        <div id="list-header">
            <div class="list-top-row">
                <div class="list-title">MUSIC PLAYLIST</div>
                <div class="list-close" id="list-btn-close">CLOSE</div>
            </div>
            <div class="list-breadcrumb">ROOT / </div>
        </div>
        <div id="list-content"></div>
    </div>

    <div id="qr-popup" onclick="this.style.display='none'">
        <div id="qr-container">QR CODE AREA<br>(URL TARGET)</div>
        <div style="font-size:12px;">CLOSE</div>
    </div>

    <div id="bottom-container">
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box locked" id="btn-play-pause" style="border-radius: 50%; width: 60px; height: 60px; font-size: 20px;">▶</div>
        </div>

        <div id="dynamic-slot">
            <div id="panel-home" class="mode-panel">
                <div class="bar-track" id="main-track">
                    <div id="ab-range"></div>
                    <div class="bar-fill" id="main-fill"></div>
                    <div id="now-knob"></div>
                    <div class="knob-ab" id="knob-a">A</div>
                    <div class="knob-ab" id="knob-b">B</div>
                </div>
                <div class="time-display">
                    <span id="txt-cur">00:00</span>
                    <span id="txt-total">00:00</span>
                </div>
            </div>

            <div id="panel-web" class="mode-panel active">
                <div class="input-box">
                    <input type="text" id="input-url" placeholder="YOUTUBE URL OR ID...">
                    <button class="btn-go" id="btn-url-go">GO</button>
                    <button class="btn-go locked" id="btn-url-add">ADD</button>
                </div>
            </div>
        </div>

        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box locked" id="btn-full" onclick="enterFull()">FULL</div>
        </div>
    </div>

    <script>
        const state = {
            player: null,
            localVid: null,
            isYoutube: true,
            isInitialized: false,
            currentMode: 'web',
            playlist: JSON.parse(localStorage.getItem('zefram_playlist') || '[]')
        };

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            state.player = new YT.Player('yt-player', {
                width: '100%', height: '100%', videoId: '',
                playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
                events: { 'onReady': onPlayerReady }
            });
        };

        function onPlayerReady() {
            state.localVid = document.getElementById('local-video');
            initEvents();
            refreshPlaylistUI();
        }

        function activateApp() {
            if (state.isInitialized) return;
            state.isInitialized = true;
            document.querySelectorAll('.grid-icon-box').forEach(el => el.classList.remove('locked'));
            switchMode('home');
        }

        function initEvents() {
            // GO Button
            document.getElementById('btn-url-go').onclick = () => {
                const url = document.getElementById('input-url').value;
                const id = extractId(url);
                if(id) {
                    state.player.loadVideoById(id);
                    activateApp();
                    document.getElementById('btn-url-add').classList.remove('locked');
                }
            };

            // ADD Button
            document.getElementById('btn-url-add').onclick = () => {
                const data = state.player.getVideoData();
                const dur = state.player.getDuration();
                const videoId = data.video_id;
                
                const newItem = {
                    id: videoId,
                    title: data.title || "Unknown Title",
                    author: data.author || "Unknown Artist",
                    duration: formatTime(dur),
                    thumb: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`
                };

                // Avoid duplicates
                state.playlist = state.playlist.filter(item => item.id !== videoId);
                state.playlist.unshift(newItem);
                localStorage.setItem('zefram_playlist', JSON.stringify(state.playlist));
                
                refreshPlaylistUI();
                alert("ADDED TO LIST");
            };

            // LST Button
            document.getElementById('btn-lst').onclick = () => {
                state.player.pauseVideo();
                document.getElementById('list-overlay').classList.add('active');
            };

            document.getElementById('list-btn-close').onclick = () => {
                document.getElementById('list-overlay').classList.remove('active');
            };
        }

        function extractId(url) {
            return url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
        }

        function formatTime(s) {
            const m = Math.floor(s/60), rs = Math.floor(s%60);
            return `${m<10?'0'+m:m}:${rs<10?'0'+rs:rs}`;
        }

        function refreshPlaylistUI() {
            const container = document.getElementById('list-content');
            container.innerHTML = '';
            
            state.playlist.forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <img src="${item.thumb}" class="list-thumb">
                    <div class="list-info">
                        <div class="list-name">${item.title}</div>
                        <div class="list-channel">${item.author}</div>
                    </div>
                    <div class="list-meta">
                        <div class="list-duration">${item.duration}</div>
                        <div class="list-actions">
                            <div class="list-action-btn" onclick="copyUrl(event, '${item.id}')">🔗</div>
                            <div class="list-action-btn" onclick="showQR(event, '${item.id}')">QR</div>
                        </div>
                    </div>
                `;
                div.onclick = () => {
                    state.player.loadVideoById(item.id);
                    document.getElementById('list-overlay').classList.remove('active');
                };
                container.appendChild(div);
            });
        }

        window.copyUrl = (e, id) => {
            e.stopPropagation();
            const url = `https://www.youtube.com/watch?v=${id}`;
            navigator.clipboard.writeText(url).then(() => alert("URL COPIED"));
        };

        window.showQR = (e, id) => {
            e.stopPropagation();
            const url = `https://www.youtube.com/watch?v=${id}`;
            document.getElementById('qr-container').innerText = `QR FOR:\n${url}`;
            document.getElementById('qr-popup').style.display = 'flex';
        };

        function switchMode(mode) {
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            const panel = document.getElementById(`panel-${mode}`);
            if(panel) panel.classList.add('active');
        }

        function enterFull() {
            const el = document.getElementById('center-area');
            if (el.requestFullscreen) el.requestFullscreen();
        }
    </script>
</body>
</html>
