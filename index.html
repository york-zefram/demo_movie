<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --panel-bg: rgba(10, 10, 10, 0.85);
            
            /* レイアウト定義数値 */
            --top-h: 50px;
            --bottom-w-ratio: 20vw;
            --center-ratio: 16 / 9;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
        }

        /* 1. TOPコンテナ (黒) */
        #top-container {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--top-h);
            background: #000; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            letter-spacing: 0.15em; font-size: 14px; border-bottom: 1px solid #333;
        }

        /* 2. BOTTOMコンテナ (紺) */
        #bottom-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: var(--bottom-w-ratio);
            background: #000080; z-index: 100; /* 左右よりは下のレイヤー */
        }

        /* 3. CENTERコンテナ (16:9固定 / UI一時集約) */
        #center-container {
            position: absolute;
            top: var(--top-h);
            left: 50%;
            transform: translateX(-50%);
            /* 上下制約の中で16:9を維持する最大幅を計算 */
            height: calc(100vh - var(--top-h) - var(--bottom-w-ratio));
            aspect-ratio: var(--center-ratio);
            background: #111; /* 映像読み込み前 */
            z-index: 50; /* 最背面 */
            overflow: hidden;
        }

        /* 4. LEFTコンテナ (濃い緑) */
        #left-container {
            position: fixed; top: var(--top-h); bottom: 0; left: 0;
            /* 画面左端からCenterの左端までをカバー */
            width: calc((100vw - (calc(100vh - var(--top-h) - var(--bottom-w-ratio)) * 16 / 9)) / 2);
            background: #006400; z-index: 200; /* 最前面 */
        }

        /* 5. RIGHTコンテナ (濃いオレンジ) */
        #right-container {
            position: fixed; top: var(--top-h); bottom: 0; right: 0;
            /* 画面右端からCenterの右端までをカバー */
            width: calc((100vw - (calc(100vh - var(--top-h) - var(--bottom-w-ratio)) * 16 / 9)) / 2);
            background: #8B4513; z-index: 200; /* 最前面 */
        }

        /* 既存機能のCenter内配置用（いじらない） */
        #video-wrapper { width: 100%; height: 100%; position: relative; }
        iframe, video { width: 100%; height: 100%; border: none; }

        /* 前スレッドで60%に変更された既存UIのラッパー */
        #home-overlay {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
            width: 60%; /* 指示通り60%に設定 */
            z-index: 1000; display: flex; flex-direction: column; gap: 30px; 
            pointer-events: none; transition: opacity 0.5s ease;
        }
        
        /* ボタン等の既存スタイル（省略せず維持） */
        .nav-row, .transport-container, .btn-nav, .btn-transport { pointer-events: auto; }
        /* ...その他の既存スタイルはそのまま継続... */
    </style>
</head>
<body>

    <div id="top-container">AD AREA (50px FIXED)</div>

    <div id="left-container"></div>
    <div id="right-container"></div>

    <div id="center-container">
        <div id="video-wrapper">
            <div id="yt-player"></div>
            <video id="local-video" style="display:none;" controls></video>
        </div>

        <div id="home-overlay">
            <div class="nav-row">
                <button class="btn-nav" data-mode="list">LIST</button>
                <button class="btn-nav active" data-mode="loop">LOOP</button>
                <button class="btn-nav" data-mode="setting">SETTING</button>
            </div>

            <div id="dynamic-content">
                </div>

            <div class="transport-container">
                </div>
        </div>
    </div>

    <div id="bottom-container"></div>

    <script>
        /* 既存の再生ロジック・A/Bループ・ミラー処理（そのまま維持） */
    </script>
</body>
</html>
