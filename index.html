<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Logic Integration Phase 1)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
            --center-ratio: 16 / 9;
            --sync-height: calc(var(--bottom-h) / 2);
            --icon-size: 8vh; 
            --icon-max: 55px;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #111; z-index: 50; overflow: hidden;
        }

        #center-area:fullscreen { background: #000; }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }
        #left-lane { background: rgba(0, 100, 0, 0.2); }
        #right-lane { background: rgba(139, 69, 19, 0.2); }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%;
        }
        
        /* YouTube IFrameコンテナ */
        #yt-player {
            width: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            aspect-ratio: var(--center-ratio);
            background: #000;
        }
        #center-area:fullscreen #yt-player {
            max-width: calc(100vh * (16 / 9));
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000080; z-index: 100;
            display: flex; align-items: center;
        }

        .bottom-lane-sync { 
            width: var(--lane-w); height: 100%; 
            display: flex; justify-content: center; align-items: center; 
        }

        .seekbar-area { flex: 1; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

        /* URL入力用簡易フォーム（シークバーエリアに暫定配置） */
        .url-input-wrap { display: flex; gap: 5px; width: 100%; }
        #input-url { 
            flex: 1; background: #111; border: 1px solid var(--neon-blue); color: #fff; 
            padding: 5px; font-family: 'Michroma'; font-size: 10px;
        }

        .grid-icon-box {
            width: var(--icon-size); height: var(--icon-size);
            max-width: var(--icon-max); max-height: var(--icon-max);
            background: #fff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #000; font-size: 10px; font-weight: bold;
            text-align: center;
        }

        #exit-fullscreen-btn-sync {
            display: none; position: absolute; bottom: var(--sync-height); right: 0;
            transform: translateY(50%); z-index: 9999;
        }
        #center-area:fullscreen #exit-fullscreen-btn-sync { display: block; }
        #center-area:fullscreen .side-lane { display: none; }
    </style>
</head>
<body>

    <div id="top-container">ZEFRAM PLAYER NEO</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="grid-icon-box">SPD</div><div class="grid-icon-box">LOP</div><div class="grid-icon-box">MIR</div>
            <div class="grid-icon-box">HOM</div><div class="grid-icon-box">A</div><div class="grid-icon-box">TOP</div>
        </div>

        <div id="video-main">
            <div id="yt-player"></div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="grid-icon-box">BAG</div><div class="grid-icon-box">LST</div><div class="grid-icon-box">FIL</div>
            <div class="grid-icon-box" onclick="document.getElementById('input-url').focus()">WEB</div>
            <div class="grid-icon-box">B</div><div class="grid-icon-box">--</div>
        </div>

        <div id="exit-fullscreen-btn-sync" onclick="exitFull()">
            <div class="grid-icon-box" style="background: var(--neon-blue);">EXIT</div>
        </div>
    </div>

    <div id="bottom-container">
        <div class="bottom-lane-sync">
            <div class="grid-icon-box" id="btn-play-sync" onclick="togglePlay()">PLAY</div>
        </div>

        <div class="seekbar-area">
            <div class="url-input-wrap">
                <input type="text" id="input-url" placeholder="PASTE YOUTUBE URL...">
                <div class="grid-icon-box" style="width:40px; height:30px;" onclick="loadVideo()">GO</div>
            </div>
            <div id="progress-container" style="width:100%; height:4px; background:rgba(0, 243, 255, 0.2);">
                <div id="progress-fill" style="width:0%; height:100%; background:var(--neon-blue);"></div>
            </div>
        </div>

        <div class="bottom-lane-sync">
            <div class="grid-icon-box" onclick="enterFull()">FULL</div>
        </div>
    </div>

    <script>
        // --- Logic State (from index6.html) ---
        let player;
        const centerArea = document.getElementById('center-area');
        const exitBtn = document.getElementById('exit-fullscreen-btn-sync');

        // YouTube API初期化
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('yt-player', {
                videoId: 'ScXNbe_5Y0o',
                playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerReady(event) {
            updateProgress();
        }

        function onPlayerStateChange(event) {
            const btn = document.getElementById('btn-play-sync');
            btn.innerText = (event.data === YT.PlayerState.PLAYING) ? "PAUSE" : "PLAY";
        }

        // 再生・一時停止トグル
        function togglePlay() {
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        // URL読み込み（GO）
        function loadVideo() {
            const v = document.getElementById('input-url').value;
            const id = v.split('v=')[1]?.split('&')[0] || v.split('/').pop();
            if(id) {
                player.loadVideoById(id);
            }
        }

        // 進捗バーの更新（簡易版）
        function updateProgress() {
            if (player && player.getCurrentTime) {
                const dur = player.getDuration();
                if (dur > 0) {
                    const p = (player.getCurrentTime() / dur) * 100;
                    document.getElementById('progress-fill').style.width = p + "%";
                }
            }
            requestAnimationFrame(updateProgress);
        }

        // 全画面制御と位置計算
        function updateExitButtonPosition() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) return;
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            const videoW = screenH * (16 / 9);
            const marginW = (screenW - videoW) / 2;
            if (marginW > 0) {
                exitBtn.style.right = (marginW / 2) + "px";
                exitBtn.style.transform = "translate(50%, 50%)"; 
            }
        }

        function enterFull() {
            if (centerArea.requestFullscreen) centerArea.requestFullscreen().then(updateExitButtonPosition);
        }
        function exitFull() {
            if (document.exitFullscreen) document.exitFullscreen();
        }

        window.addEventListener('resize', updateExitButtonPosition);
        document.addEventListener('fullscreenchange', updateExitButtonPosition);
    </script>
</body>
</html>
