<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Full Screen Demo)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 12vw;
            --center-ratio: 16 / 9;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        /* 1. TOPコンテナ */
        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px;
        }

        /* 2. CENTERエリア（全画面化の対象はこのコンテナ） */
        #center-area {
            flex: 1;
            position: relative;
            display: flex;
            background: #111;
            z-index: 50;
            overflow: hidden;
            transition: background 0.3s;
        }

        /* 全画面時のデモ用赤背景 */
        #center-area:fullscreen {
            background: #ff0000; /* デモ用：全画面時の余白を赤にする */
        }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }
        #left-lane { background: rgba(0, 100, 0, 0.6); }
        #right-lane { background: rgba(139, 69, 19, 0.6); }

        /* 全画面時はサイドレーンを隠す設定（必要に応じて） */
        #center-area:fullscreen .side-lane { display: none; }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%;
        }
        #video-viewport-mock {
            width: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            aspect-ratio: var(--center-ratio);
            background: #222;
            position: relative;
        }
        /* 全画面時の動画サイズ計算 */
        #center-area:fullscreen #video-viewport-mock {
            max-width: calc(100vh * (16 / 9));
        }

        /* 3. BOTTOMコンテナ */
        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000080; z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .bottom-controls { display: flex; width: 100%; height: 60%; align-items: center; }
        .bottom-lane-sync { width: var(--lane-w); display: flex; justify-content: center; align-items: center; }
        .dummy-seekbar-container { flex: 1; padding: 0 10px; }
        .dummy-seekbar { width: 100%; height: 6px; background: var(--neon-blue); border-radius: 3px; position: relative; }

        /* アイコン */
        .dummy-icon {
            width: 6vh; height: 6vh; max-width: 44px; max-height: 44px;
            background: #fff; border-radius: 4px; opacity: 0.9; cursor: pointer;
        }
        .circle-icon { border-radius: 50%; }

        /* 全画面復帰用ホームアイコン（通常は隠す） */
        #exit-fullscreen-btn {
            display: none;
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }
        #center-area:fullscreen #exit-fullscreen-btn {
            display: block; /* 全画面時のみ表示 */
        }

        .time-row { display: flex; justify-content: space-between; width: 100%; font-size: 12px; padding: 0 var(--lane-w); box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="top-container">GOOGLE ADS AREA</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="dummy-icon"></div><div class="dummy-icon"></div><div class="dummy-icon"></div>
            <div class="dummy-icon"></div><div class="dummy-icon circle-icon"></div><div class="dummy-icon"></div>
        </div>

        <div id="video-main">
            <div id="video-viewport-mock">
                </div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="dummy-icon"></div><div class="dummy-icon"></div><div class="dummy-icon"></div>
            <div class="dummy-icon"></div><div class="dummy-icon circle-icon"></div>
        </div>

        <div id="exit-fullscreen-btn" onclick="exitFull()">
            <div class="dummy-icon circle-icon" style="background: #fff; border: 2px solid var(--neon-blue);"></div>
        </div>
    </div>

    <div id="bottom-container">
        <div class="bottom-controls">
            <div class="bottom-lane-sync"><div class="dummy-icon circle-icon"></div></div>
            <div class="dummy-seekbar-container"><div class="dummy-seekbar"></div></div>
            <div class="bottom-lane-sync">
                <div class="dummy-icon" onclick="enterFull()" style="border: 2px solid #fff; background: none;"></div>
            </div>
        </div>
        <div class="time-row"><span>01:00</span><span>03:00</span></div>
    </div>

    <script>
        const centerArea = document.getElementById('center-area');

        function enterFull() {
            if (centerArea.requestFullscreen) {
                centerArea.requestFullscreen();
            } else if (centerArea.webkitRequestFullscreen) {
                centerArea.webkitRequestFullscreen();
            }
        }

        function exitFull() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        }
    </script>
</body>
</html>
