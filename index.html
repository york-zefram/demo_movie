<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM PLAYER NEO - Fixed Bezel</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
            --status-h: 10vh;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        /* --- HOME LAYOUT (Stable) --- */
        #top-container {
            flex: 0 0 var(--top-h); background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #111; z-index: 50; overflow: hidden;
        }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%;
        }
        
        #yt-player {
            background: #000;
            width: 100%; height: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            aspect-ratio: 16 / 9;
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h); background: #000080; z-index: 100;
            display: flex; align-items: center;
        }

        /* --- FULLSCREEN SYSTEM --- */
        #center-area:fullscreen {
            background: #ff0000 !important;
            width: 100vw; height: 100vh;
        }

        /* 全画面時の映像コンテナを上寄せ */
        #center-area:fullscreen #video-main {
            align-items: flex-start;
            height: calc(100vh - var(--status-h));
        }

        /* 全画面時の映像サイズ固定（左右ベゼル確保） */
        #center-area:fullscreen #yt-player {
            width: 90vw; /* 左右に5vwずつのベゼル */
            height: auto;
            max-height: calc(100vh - var(--status-h));
            aspect-ratio: 16 / 9;
            margin-top: 0;
        }

        /* 10vh ステータスエリア */
        #fs-status-bar {
            display: none;
            position: absolute; bottom: 0; left: 0;
            width: 100vw; height: var(--status-h);
            background: #ff0000;
            z-index: 9999;
            align-items: center;
            padding: 0 5vw;
            box-sizing: border-box;
        }

        #center-area:fullscreen #fs-status-bar {
            display: flex;
            justify-content: flex-end; /* EXITを右端へ */
        }

        .fs-exit-txt {
            color: #fff; font-size: 4vw; cursor: pointer;
            font-weight: bold; letter-spacing: 1px;
        }

        .grid-icon-box {
            width: 8vh; height: 8vh; max-width: 55px; max-height: 55px;
            background: #fff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #000; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="top-container">ZEFRAM PLAYER NEO</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="grid-icon-box">SPD</div><div class="grid-icon-box">LOP</div><div class="grid-icon-box">MIR</div>
        </div>
        
        <div id="video-main">
            <div id="yt-player"></div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="grid-icon-box">FIL</div><div class="grid-icon-box">WEB</div><div class="grid-icon-box">--</div>
        </div>

        <div id="fs-status-bar">
            <div class="fs-exit-txt" onclick="exitFull()">EXIT</div>
        </div>
    </div>

    <div id="bottom-container">
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" id="btn-play-sync" onclick="togglePlay()">PLAY</div>
        </div>
        <div style="flex:1; padding:0 20px;">
            <div style="width:100%; height:4px; background:rgba(0, 243, 255, 0.2);">
                <div id="progress-fill" style="width:0%; height:100%; background:var(--neon-blue);"></div>
            </div>
        </div>
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" onclick="enterFull()">FULL</div>
        </div>
    </div>

    <script>
        let player;
        const centerArea = document.getElementById('center-area');

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('yt-player', {
                videoId: 'ScXNbe_5Y0o',
                playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
                events: { 'onStateChange': (e) => {
                    document.getElementById('btn-play-sync').innerText = (e.data === 1) ? "PAUSE" : "PLAY";
                }}
            });
        };

        function togglePlay() { 
            if(player && player.getPlayerState) {
                player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); 
            }
        }

        function enterFull() { centerArea.requestFullscreen(); }
        function exitFull() { document.exitFullscreen(); }

        function tick() {
            if(player && player.getCurrentTime) {
                const p = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('progress-fill').style.width = (p || 0) + "%";
            }
            requestAnimationFrame(tick);
        }
        tick();
    </script>
</body>
</html>
