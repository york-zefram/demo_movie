<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Grid Fixed)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw; /* タッチエリアを考慮し少し広めに設定 */
            --center-ratio: 16 / 9;
            --sync-height: calc(var(--bottom-h) / 2);
            /* アイコン枠の共通サイズ */
            --icon-size: 8vh; 
            --icon-max: 55px;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #111; z-index: 50; overflow: hidden;
        }

        #center-area:fullscreen { background: #ff0000; }

        /* 垂直レーンのグリッド固定 */
        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }
        #left-lane { background: rgba(0, 100, 0, 0.6); }
        #right-lane { background: rgba(139, 69, 19, 0.6); }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%;
        }
        #video-viewport-mock {
            width: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            aspect-ratio: var(--center-ratio);
            background: #222;
        }
        #center-area:fullscreen #video-viewport-mock {
            max-width: calc(100vh * (16 / 9));
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000080; z-index: 100;
            display: flex; align-items: center;
        }

        /* ボトムの左右ボタンをレーンの軸に合わせる */
        .bottom-lane-sync { 
            width: var(--lane-w); height: 100%; 
            display: flex; justify-content: center; align-items: center; 
        }

        .seekbar-area { flex: 1; padding: 0 20px; }

        /* 統一された角丸正方形（将来の透明タッチエリア） */
        .grid-icon-box {
            width: var(--icon-size); height: var(--icon-size);
            max-width: var(--icon-max); max-height: var(--icon-max);
            background: #fff; border-radius: 12px; /* 角丸固定 */
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.2s;
            color: #000; font-size: 10px; font-weight: bold;
        }

        /* 全画面復帰ボタン（右下ボタンと高さを同期） */
        #exit-fullscreen-btn-sync {
            display: none;
            position: absolute;
            bottom: var(--sync-height);
            right: calc(var(--lane-w) / 2);
            transform: translate(50%, 50%);
            z-index: 9999;
        }
        #center-area:fullscreen #exit-fullscreen-btn-sync { display: block; }
        #center-area:fullscreen .side-lane { display: none; }
    </style>
</head>
<body>

    <div id="top-container">GOOGLE ADS AREA</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="grid-icon-box">SPD</div>
            <div class="grid-icon-box">LOP</div>
            <div class="grid-icon-box">MIR</div>
            <div class="grid-icon-box">HOM</div>
            <div class="grid-icon-box">A</div>
            <div class="grid-icon-box">TOP</div>
        </div>

        <div id="video-main">
            <div id="video-viewport-mock"></div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="grid-icon-box">BAG</div>
            <div class="grid-icon-box">LST</div>
            <div class="grid-icon-box">FIL</div>
            <div class="grid-icon-box">WEB</div>
            <div class="grid-icon-box">B</div>
            <div class="grid-icon-box">--</div>
        </div>

        <div id="exit-fullscreen-btn-sync" onclick="exitFull()">
            <div class="grid-icon-box" style="background: var(--neon-blue);">EXIT</div>
        </div>
    </div>

    <div id="bottom-container">
        <div class="bottom-lane-sync">
            <div class="grid-icon-box">PLAY</div>
        </div>

        <div class="seekbar-area">
            <div style="width:100%; height:4px; background:var(--neon-blue); opacity:0.3;"></div>
        </div>

        <div class="bottom-lane-sync">
            <div class="grid-icon-box" onclick="enterFull()">FULL</div>
        </div>
    </div>

    <script>
        const centerArea = document.getElementById('center-area');
        function enterFull() {
            if (centerArea.requestFullscreen) centerArea.requestFullscreen();
            else if (centerArea.webkitRequestFullscreen) centerArea.webkitRequestFullscreen();
        }
        function exitFull() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    </script>
</body>
</html>
