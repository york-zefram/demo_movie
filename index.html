<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM PLAYER NEO - Recovery Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
        }

        /* 基本リセット：崩れの原因を排除 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
            text-transform: uppercase;
        }

        /* --- HOME LAYOUT --- */
        #top-container {
            flex: 0 0 var(--top-h); display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px; z-index: 10;
        }

        #center-area {
            flex: 1; display: flex; position: relative; background: #111; overflow: hidden;
        }

        .side-lane {
            width: var(--lane-w); height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: space-around; z-index: 5;
        }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center;
        }
        
        #yt-player {
            width: 100%; height: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            aspect-ratio: 16 / 9; background: #000;
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h); background: #000080; display: flex; align-items: center; z-index: 10;
        }

        /* --- FULLSCREEN SYSTEM (Fixed & Robust) --- */
        #center-area:fullscreen {
            background: #ff0000 !important; display: flex; flex-direction: column;
        }

        /* 全画面時：映像を90vhのエリアで上寄せ */
        #center-area:fullscreen #video-main {
            height: 90vh; flex: none; align-items: flex-start; padding: 0 5vw;
        }

        #center-area:fullscreen #yt-player {
            width: 100%; height: auto; max-height: 90vh; aspect-ratio: 16 / 9;
        }

        /* 全画面時：下部10vhの赤ベゼル */
        #fs-status-bar {
            display: none; height: 10vh; width: 100%; background: #ff0000;
            align-items: center; justify-content: flex-end; padding: 0 5vw;
        }

        #center-area:fullscreen #fs-status-bar { display: flex; }
        #center-area:fullscreen .side-lane { display: none; }

        .fs-exit-txt {
            color: #fff; font-size: 5vw; cursor: pointer; font-weight: bold; z-index: 9999;
        }

        /* UI Components */
        .grid-icon-box {
            width: 8vh; height: 8vh; max-width: 55px; max-height: 55px;
            background: #fff; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            color: #000; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="top-container">ZEFRAM PLAYER NEO</div>

    <div id="center-area">
        <div class="side-lane" style="background:rgba(0,100,0,0.1)">
            <div class="grid-icon-box">SPD</div><div class="grid-icon-box">LOP</div><div class="grid-icon-box">MIR</div>
        </div>
        
        <div id="video-main">
            <div id="yt-player"></div>
        </div>

        <div class="side-lane" style="background:rgba(139,69,19,0.1)">
            <div class="grid-icon-box">FIL</div><div class="grid-icon-box">WEB</div><div class="grid-icon-box">--</div>
        </div>

        <div id="fs-status-bar">
            <div class="fs-exit-txt" onclick="exitFull()">EXIT</div>
        </div>
    </div>

    <div id="bottom-container">
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" id="btn-play-sync" onclick="togglePlay()">PLAY</div>
        </div>
        <div style="flex:1; padding:0 20px;">
            <div style="width:100%; height:4px; background:rgba(0, 243, 255, 0.2);">
                <div id="progress-fill" style="width:0%; height:100%; background:var(--neon-blue);"></div>
            </div>
        </div>
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box" onclick="enterFull()">FULL</div>
        </div>
    </div>

    <script>
        let player;
        const centerArea = document.getElementById('center-area');

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('yt-player', {
                videoId: 'ScXNbe_5Y0o',
                playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
                events: { 'onStateChange': (e) => {
                    document.getElementById('btn-play-sync').innerText = (e.data === 1) ? "PAUSE" : "PLAY";
                }}
            });
        };

        function togglePlay() { 
            if(player && player.getPlayerState) {
                player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); 
            }
        }

        function enterFull() { centerArea.requestFullscreen(); }
        function exitFull() { document.exitFullscreen(); }

        function tick() {
            if(player && player.getCurrentTime) {
                const p = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('progress-fill').style.width = (p || 0) + "%";
            }
            requestAnimationFrame(tick);
        }
        tick();
    </script>
</body>
</html>
