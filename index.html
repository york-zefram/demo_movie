<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Draggable AB)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
            --center-ratio: 16 / 9;
            --icon-size: 8vh; 
            --icon-max: 55px;
            --fs-status-h: 10vh;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            letter-spacing: 0.2em; font-size: 14px;
        }

        #center-area {
            flex: 1;
            position: relative;
            background: #050505;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        #yt-player { width: 100%; height: 100%; pointer-events: none; }

        /* 追加: ローカルビデオ要素 (index6より継承) */
        #local-video {
            display: none; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            position: absolute; 
            top: 0; 
            left: 0;
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000;
            display: flex; flex-direction: column;
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            z-index: 300;
        }

        /* AB Lane */
        .ab-lane {
            flex: 1; position: relative;
            background: rgba(0, 243, 255, 0.05);
            margin: 5px 10px; border-radius: 4px;
            overflow: hidden;
        }
        .ab-bar {
            position: absolute; top: 0; height: 100%;
            background: rgba(0, 243, 255, 0.3);
            border-left: 2px solid var(--neon-blue);
            border-right: 2px solid var(--neon-blue);
            box-shadow: var(--neon-glow);
        }
        .handle {
            position: absolute; top: 0; width: 30px; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 243, 255, 0.1); touch-action: none;
        }
        .handle::after {
            content: ''; width: 2px; height: 60%; background: var(--neon-blue);
        }

        /* Nav Rows */
        .nav-row {
            flex: 1.5; display: flex; align-items: center; justify-content: space-around;
        }
        .nav-btn {
            width: var(--lane-w); height: 80%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--neon-blue); cursor: pointer; transition: 0.2s;
        }
        .nav-btn.active { background: rgba(0, 243, 255, 0.2); box-shadow: inset var(--neon-glow); }
        .nav-icon { font-size: 18px; font-weight: bold; margin-bottom: 2px; }
        .nav-label { font-size: 8px; letter-spacing: 0.1em; opacity: 0.8; }

        /* Panels */
        .mode-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 400;
        }
        .mode-panel.active { display: flex; }

        input[type="text"] {
            background: #000; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 10px; width: 80%;
            font-family: 'Michroma', sans-serif; margin-bottom: 20px; outline: none;
            box-shadow: var(--neon-glow);
        }
        .action-btn {
            border: 1px solid var(--neon-blue); padding: 10px 30px;
            background: transparent; color: var(--neon-blue);
            font-family: 'Michroma', sans-serif; cursor: pointer;
        }

    </style>
</head>
<body>

    <div id="top-container">ZEFRAM VIDEO PLAYER</div>

    <div id="center-area">
        <div id="yt-player"></div>
        <video id="local-video" playsinline></video>
        
        <div id="panel-web" class="mode-panel">
            <input type="text" id="input-url" placeholder="PASTE YOUTUBE URL...">
            <button class="action-btn" id="btn-url-go">LOAD VIDEO</button>
        </div>
        <div id="panel-home" class="mode-panel">
            <p>ZEFRAM NEO SYSTEM ACTIVE</p>
        </div>
    </div>

    <div id="bottom-container">
        <div class="ab-lane" id="ab-lane">
            <div class="ab-bar" id="ab-bar"></div>
            <div class="handle" id="handle-a"></div>
            <div class="handle" id="handle-b"></div>
        </div>

        <div class="nav-row">
            <div class="nav-btn" id="btn-hom">
                <div class="nav-icon">HOM</div>
                <div class="nav-label">HOME</div>
            </div>
            <div class="nav-btn" id="btn-web">
                <div class="nav-icon">WEB</div>
                <div class="nav-label">ONLINE</div>
            </div>
            <div class="nav-btn" id="btn-fil">
                <div class="nav-icon">FIL</div>
                <div class="nav-label">LOCAL</div>
            </div>
            <div class="nav-btn" id="btn-fps">
                <div class="nav-icon">SPD</div>
                <div class="nav-label">SPEED</div>
            </div>
            <div class="nav-btn">
                <div class="nav-icon">FUL</div>
                <div class="nav-label">SCREEN</div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept="video/*" style="display: none;">

    <script>
        // 状態管理
        const state = {
            player: null,
            currentMode: 'home',
            startT: 0,
            endT: 0,
            isLoop: false,
            activeDrag: null,
            // 以下の要素をスクリプトから制御するために取得します
            localVid: document.getElementById('local-video')
        };

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            state.player = new YT.Player('yt-player', {
                videoId: 'ScXNbe_5Y0o',
                playerVars: { 
                    'rel': 0, 'controls': 0, 'modestbranding': 1, 'iv_load_policy': 3,
                    'playsinline': 1, 'disablekb': 1, 'fs': 0
                },
                events: { 'onReady': onPlayerReady }
            });
        };

        function onPlayerReady() {
            // UIイベント初期化
            document.getElementById('btn-hom').onclick = () => switchMode('home');
            document.getElementById('btn-web').onclick = () => switchMode('web');
            
            // AB Lane Logic (ドラッグ等の既存ロジック...)
            const lane = document.getElementById('ab-lane');
            const bar = document.getElementById('ab-bar');
            const ha = document.getElementById('handle-a');
            const hb = document.getElementById('handle-b');

            // --- 既存のドラッグイベント等は維持 ---
            
            document.getElementById('btn-url-go').onclick = () => {
                const v = document.getElementById('input-url').value;
                const id = v.split('v=')[1]?.split('&')[0] || v.split('/').pop();
                if(id) {
                    state.player.loadVideoById({'videoId': id, 'suggestedQuality': 'hd1080'});
                    state.startT = 0; state.endT = 0; state.isLoop = false;
                    switchMode('home');
                }
            };
        }

        function switchMode(mode) {
            state.currentMode = mode;
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('btn-hom').classList.toggle('active', mode === 'home');
            document.getElementById('btn-web').classList.toggle('active', mode === 'web');
            document.getElementById(`panel-${mode}`).classList.add('active');
        }

        // --- 全画面制御等は維持 ---
    </script>
</body>
</html>
