<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Layout Alpha)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --top-h: 50px;
            --bottom-h-ratio: 20vw; /* 下部コンテナの高さ */
            --center-ratio: 16 / 9;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
        }

        /* 1. TOPコンテナ (黒) */
        #top-container {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px;
        }

        /* 2. BOTTOMコンテナ (紺) */
        #bottom-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: var(--bottom-h-ratio);
            background: #000080; z-index: 100;
            display: flex; align-items: center; padding: 0 2vw; box-sizing: border-box;
        }

        /* 3. CENTERコンテナ (16:9固定) */
        #center-container {
            position: absolute;
            top: var(--top-h);
            left: 50%;
            transform: translateX(-50%);
            height: calc(100vh - var(--top-h) - var(--bottom-h-ratio));
            aspect-ratio: var(--center-ratio);
            background: #111;
            z-index: 50;
        }

        /* 4. LEFTコンテナ (濃い緑) */
        #left-container {
            position: fixed; top: var(--top-h); bottom: 0; left: 0;
            width: calc((100vw - (calc(100vh - var(--top-h) - var(--bottom-h-ratio)) * 16 / 9)) / 2);
            background: #006400; z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box;
        }

        /* 5. RIGHTコンテナ (濃いオレンジ) */
        #right-container {
            position: fixed; top: var(--top-h); bottom: 0; right: 0;
            width: calc((100vw - (calc(100vh - var(--top-h) - var(--bottom-h-ratio)) * 16 / 9)) / 2);
            background: #8B4513; z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box;
        }

        /* 白いアイコン（プレースホルダー）の共通スタイル */
        .dummy-icon {
            width: 6vw; height: 6vw; max-width: 50px; max-height: 50px;
            background: #fff; border-radius: 10%; /* 任意で四角に近い形 */
            opacity: 0.8;
        }
        .circle-icon { border-radius: 50%; } /* 再生ボタン等は丸 */

        /* 下部シークバーのプレースホルダー */
        .dummy-seekbar {
            flex: 1; height: 10px; background: #fff; margin: 0 2vw; border-radius: 5px;
        }

        /* 既存機能の仮置きエリア（index6.htmlの移植先） */
        #home-overlay-temporary {
            position: absolute; width: 100%; height: 100%; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="top-container">GOOGLE ADS AREA</div>

    <div id="left-container">
        <div class="dummy-icon"></div> <div class="dummy-icon"></div> <div class="dummy-icon"></div> <div class="dummy-icon"></div> <div class="dummy-icon circle-icon"></div> <div class="dummy-icon"></div> </div>

    <div id="right-container">
        <div class="dummy-icon"></div> <div class="dummy-icon"></div> <div class="dummy-icon"></div> <div class="dummy-icon"></div> <div class="dummy-icon circle-icon"></div> </div>

    <div id="center-container">
        <div id="home-overlay-temporary"></div>
    </div>

    <div id="bottom-container">
        <div class="dummy-icon circle-icon" style="width:8vw; height:8vw;"></div> <div class="dummy-seekbar"></div> <div class="dummy-icon"></div> </div>

</body>
</html>
