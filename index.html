<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM VIDEO PLAYER - NEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
            --center-ratio: 16 / 9;
            --icon-size: 8vh; 
            --icon-max: 55px;
            --fs-status-h: 10vh;
            --disabled-color: #333;
            --track-gray: #222;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 11px; letter-spacing: 0.2em;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #050505; z-index: 50; overflow: hidden;
            justify-content: center;
        }

        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000; z-index: 100;
            display: flex; align-items: center; border-top: 1px solid #333;
        }

        #video-main {
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; height: 100%; position: relative;
        }

        #video-viewport-wrapper {
            width: 100%; height: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            aspect-ratio: var(--center-ratio);
            background: #000;
            transition: transform 0.3s ease;
            position: relative;
        }

        #yt-player, #local-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #local-video { display: none; object-fit: contain; }

        #video-splash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.6s ease;
        }
        #video-splash img { width: 45%; max-width: 280px; height: auto; }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }

        @media (orientation: portrait) {
            #orientation-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
            #orientation-overlay img { width: 60%; max-width: 300px; height: auto; }
            #top-container, #bottom-container, .side-lane { display: none !important; }
        }

        .grid-icon-box {
            width: var(--icon-size); height: var(--icon-size);
            max-width: var(--icon-max); max-height: var(--icon-max);
            background: none; border: 1px solid var(--neon-blue); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 10px; transition: 0.2s;
            user-select: none; -webkit-user-select: none; text-align: center;
        }
        .grid-icon-box.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }
        .grid-icon-box.locked { border-color: var(--disabled-color); color: var(--disabled-color); pointer-events: none; opacity: 0.5; }

        #dynamic-slot { flex: 1; height: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center; }
        .mode-panel { display: none; width: 100%; flex-direction: column; gap: 5px; }
        .mode-panel.active { display: flex; }

        #list-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; flex-direction: column; }
        #list-overlay.active { display: flex; }
        #list-header { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }

        .bar-track { width: 100%; height: 12px; background: var(--track-gray); position: relative; cursor: pointer; border-radius: 6px; }
        .bar-fill { height: 100%; background: var(--track-gray); width: 0%; position: absolute; border-radius: 6px; pointer-events: none; z-index: 2; }
        #ab-range { height: 100%; background: var(--neon-blue); position: absolute; display: none; z-index: 1; box-shadow: var(--neon-glow); }
        .knob-ab { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; background: #000; border: 1px solid var(--neon-blue); color: var(--neon-blue); display: none; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; z-index: 10; cursor: pointer; }
        #now-knob, #speed-knob { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; z-index: 15; pointer-events: none; }

        #fs-status-bar {
            display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: var(--fs-status-h);
            background: rgba(0,0,0,0.8); border-top: 1px solid #333; z-index: 999; align-items: center; justify-content: space-evenly;
        }
        #center-area:fullscreen #fs-status-bar { display: flex; }
        .fs-btn { flex: 1; color: var(--neon-blue); text-align: center; cursor: pointer; font-size: 11px; }

        input[type=text] { flex: 1; background: #111; border: 1px solid var(--neon-blue); color: #fff; padding: 12px; font-family: 'Michroma', sans-serif; border-radius: 4px; outline: none; }
        .btn-go { background: var(--neon-blue); color: #000; border: none; padding: 0 15px; font-family: 'Michroma', sans-serif; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="orientation-overlay"><img src="5.webp" alt="ROTATE DEVICE"></div>
    <div id="top-container">ZEFRAM VIDEO PLAYER - NEO</div>

    <div id="center-area">
        <div class="side-lane">
            <div class="grid-icon-box locked" id="btn-spd">SPD</div>
            <div class="grid-icon-box locked" id="btn-lop">LOP</div>
            <div class="grid-icon-box locked" id="btn-mir">MIR</div>
            <div class="grid-icon-box locked" id="btn-hom">HOM</div>
            <div class="grid-icon-box locked" id="btn-a">A</div>
            <div class="grid-icon-box locked" id="btn-top">TOP</div>
        </div>

        <div id="video-main">
            <div id="video-viewport-wrapper">
                <div id="yt-player"></div>
                <video id="local-video" playsinline></video>
                <div id="video-splash"><img src="z_icon.svg" alt="ZEFRAM PLAYER"></div>
            </div>
        </div>

        <div class="side-lane">
            <div class="grid-icon-box" style="border-color:#222; color:#444;">BAG</div>
            <div class="grid-icon-box locked" id="btn-lst">選 曲</div>
            <div class="grid-icon-box locked" id="btn-fil">FIL</div>
            <div class="grid-icon-box locked" id="btn-web">WEB</div>
            <div class="grid-icon-box locked" id="btn-b">B</div>
            <div class="grid-icon-box locked" id="btn-rst">RST</div>
        </div>

        <div id="fs-status-bar">
            <div class="fs-btn" id="fs-time">00:00 / 00:00</div>
            <div class="fs-btn" id="fs-spd-val">SPD: 0%</div>
            <div class="fs-btn" id="fs-exit">EXIT</div>
        </div>
    </div>

    <div id="list-overlay">
        <div id="list-header"><div>PLAYLIST</div><div id="list-close" style="cursor:pointer; color:var(--neon-blue);">CLOSE</div></div>
        <div id="list-content"></div>
    </div>

    <div id="bottom-container">
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box locked" id="btn-play-pause" style="border-radius:50%; width:60px; height:60px; font-size:20px;">▶</div>
        </div>
        <div id="dynamic-slot">
            <div id="panel-home" class="mode-panel active">
                <div class="bar-track" id="main-track"><div id="ab-range"></div><div class="bar-fill" id="main-fill"></div><div id="now-knob"></div><div class="knob-ab" id="knob-a">A</div><div class="knob-ab" id="knob-b">B</div></div>
                <div style="display:flex; justify-content:space-between; font-size:14px; margin-top:5px;"><span id="txt-cur">00:00</span><span id="txt-total">00:00</span></div>
            </div>
            <div id="panel-speed" class="mode-panel">
                <div class="bar-track" id="speed-track"><div id="speed-knob" style="left:50%;"></div></div>
                <div style="text-align:center; margin-top:8px;" id="txt-speed">0%</div>
            </div>
            <div id="panel-web" class="mode-panel">
                <div class="input-box"><input type="text" id="input-url" placeholder="YOUTUBE URL..."><button class="btn-go" id="btn-url-go">GO</button></div>
            </div>
            <div id="panel-file" class="mode-panel">
                <button class="btn-go" style="width:100%; height:45px;" onclick="document.getElementById('file-input').click()">CHOOSE LOCAL FILE</button>
                <input type="file" id="file-input" accept="video/*" style="display:none;">
            </div>
        </div>
        <div style="width:var(--lane-w); display:flex; justify-content:center;">
            <div class="grid-icon-box locked" id="btn-full">FULL</div>
        </div>
    </div>

    <script>
        const state = {
            player: null, vid: null, isYT: true, init: false, mode: 'home',
            mir: false, lop: false, activeDrag: null, rate: 1.0, startT: 0, endT: 0
        };

        const getT = () => state.isYT ? (state.player?.getCurrentTime?.() || 0) : (state.vid?.currentTime || 0);
        const getD = () => state.isYT ? (state.player?.getDuration?.() || 0) : (state.vid?.duration || 0);
        const setT = (t) => state.isYT ? state.player?.seekTo?.(t, true) : (state.vid && (state.vid.currentTime = t));
        const setR = (r) => state.isYT ? state.player?.setPlaybackRate?.(r) : (state.vid && (state.vid.playbackRate = r));

        function wakeUpUI() {
            if(state.init) return;
            state.init = true;
            document.getElementById('video-splash').style.display = 'none';
            document.querySelectorAll('.grid-icon-box').forEach(el => el.classList.remove('locked'));
            render();
        }

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            const origin = location.protocol === 'file:' ? 'http://localhost' : location.origin;
            state.player = new YT.Player('yt-player', {
                videoId: '', playerVars: { 'rel': 0, 'controls': 0, 'playsinline': 1, 'enablejsapi': 1, 'origin': origin },
                events: { 'onReady': wakeUpUI, 'onStateChange': (e) => { document.getElementById('btn-play-pause').innerText = (e.data === 1) ? "Ⅱ" : "▶"; } }
            });
        };

        function render() {
            const now = getT(), dur = getD();
            if (state.lop && state.endT > state.startT && (now >= state.endT || now < state.startT - 0.1)) setT(state.startT);
            if (dur > 0) {
                const p = (now / dur) * 100;
                if (state.activeDrag !== 'now') {
                    document.getElementById('main-fill').style.width = p + "%";
                    document.getElementById('now-knob').style.left = p + "%";
                    document.getElementById('txt-cur').innerText = formatTime(now);
                    document.getElementById('fs-time').innerText = formatTime(now) + " / " + formatTime(dur);
                }
                document.getElementById('txt-total').innerText = formatTime(dur);
            }
            const range = document.getElementById('ab-range'), ka = document.getElementById('knob-a'), kb = document.getElementById('knob-b');
            if (state.lop) {
                range.style.display = ka.style.display = kb.style.display = 'flex';
                const sP = (state.startT / dur) * 100, eP = (state.endT / dur) * 100;
                ka.style.left = sP + "%"; kb.style.left = eP + "%"; range.style.left = sP + "%"; range.style.width = (eP - sP) + "%";
            } else {
                range.style.display = ka.style.display = kb.style.display = 'none';
            }
            requestAnimationFrame(render);
        }

        function formatTime(s) {
            const m = Math.floor(s/60), rs = Math.floor(s%60);
            return `${m<10?'0'+m:m}:${rs<10?'0'+rs:rs}`;
        }

        function switchMode(m) {
            state.mode = m;
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${m}`).classList.add('active');
            document.querySelectorAll('.grid-icon-box').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(m === 'file' ? 'btn-fil' : m === 'speed' ? 'btn-spd' : `btn-${m.substring(0,3)}`);
            if(btn) btn.classList.add('active');
        }

        function handleDrag(e, type) {
            const track = document.getElementById(type === 'speed' ? 'speed-track' : 'main-track');
            const rect = track.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            let p = Math.max(0, Math.min(1, x / rect.width));
            if (type === 'now') setT(p * getD());
            else if (type === 'a') state.startT = p * getD();
            else if (type === 'b') state.endT = p * getD();
            else if (type === 'speed') {
                state.rate = 0.5 + p; setR(state.rate);
                document.getElementById('speed-knob').style.left = (p * 100) + "%";
                const val = Math.round((state.rate - 1)*100) + "%";
                document.getElementById('txt-speed').innerText = val;
                document.getElementById('fs-spd-val').innerText = "SPD: " + val;
            }
        }

        document.getElementById('btn-play-pause').onclick = () => {
            if(state.isYT) state.player.getPlayerState() === 1 ? state.player.pauseVideo() : state.player.playVideo();
            else state.vid.paused ? state.vid.play() : state.vid.pause();
        };
        document.getElementById('btn-web').onclick = () => switchMode('web');
        document.getElementById('btn-fil').onclick = () => switchMode('file');
        document.getElementById('btn-spd').onclick = () => switchMode('speed');
        document.getElementById('btn-hom').onclick = () => switchMode('home');
        document.getElementById('btn-lst').onclick = () => document.getElementById('list-overlay').classList.add('active');
        document.getElementById('list-close').onclick = () => document.getElementById('list-overlay').classList.remove('active');
        
        document.getElementById('btn-mir').onclick = () => {
            state.mir = !state.mir;
            document.getElementById('btn-mir').classList.toggle('active', state.mir);
            document.getElementById('video-viewport-wrapper').style.transform = state.mir ? "scaleX(-1)" : "none";
        };
        document.getElementById('btn-lop').onclick = () => {
            state.lop = !state.lop;
            if(state.lop && state.endT === 0) state.endT = getD();
            document.getElementById('btn-lop').classList.toggle('active', state.lop);
        };
        document.getElementById('btn-a').onclick = () => { state.startT = getT(); state.lop = true; document.getElementById('btn-lop').classList.add('active'); };
        document.getElementById('btn-b').onclick = () => { state.endT = getT(); state.lop = true; document.getElementById('btn-lop').classList.add('active'); };
        document.getElementById('btn-top').onclick = () => setT(state.lop ? state.startT : 0);
        document.getElementById('btn-rst').onclick = () => {
            state.rate = 1.0; setR(1.0); state.mir = false; state.lop = false; state.startT = 0; state.endT = 0;
            document.getElementById('video-viewport-wrapper').style.transform = "none";
            document.querySelectorAll('.grid-icon-box').forEach(b => b.classList.remove('active'));
            document.getElementById('speed-knob').style.left = "50%"; document.getElementById('txt-speed').innerText = "0%";
            setT(0);
        };

        document.getElementById('btn-url-go').onclick = () => {
            const v = document.getElementById('input-url').value;
            const id = v.split('v=')[1]?.split('&')[0] || v.split('/').pop();
            if(id && state.player?.loadVideoById) {
                state.isYT = true; document.getElementById('local-video').style.display = 'none'; document.getElementById('yt-player').style.display = 'block';
                state.player.loadVideoById(id); switchMode('home');
            }
        };

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                state.isYT = false; document.getElementById('yt-player').style.display = 'none'; document.getElementById('local-video').style.display = 'block';
                state.vid.src = URL.createObjectURL(file); state.vid.play(); switchMode('home');
            }
        };

        document.getElementById('btn-full').onclick = () => {
            const el = document.getElementById('center-area');
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        };
        document.getElementById('fs-exit').onclick = () => {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        };

        const tracks = ['main-track', 'speed-track', 'knob-a', 'knob-b'];
        tracks.forEach(id => {
            const el = document.getElementById(id);
            const type = id.includes('knob-') ? id.split('-')[1] : (id === 'speed-track' ? 'speed' : 'now');
            el.onmousedown = el.ontouchstart = (e) => { if(id.includes('knob')) e.stopPropagation(); state.activeDrag = type; handleDrag(e, type); };
        });
        window.onmousemove = window.ontouchmove = (e) => { if(state.activeDrag) handleDrag(e, state.activeDrag); };
        window.onmouseup = window.ontouchend = () => { state.activeDrag = null; };

        document.addEventListener('DOMContentLoaded', () => { state.vid = document.getElementById('local-video'); setTimeout(wakeUpUI, 3000); });
    </script>
</body>
</html>
