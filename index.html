<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEFRAM VIDEO ENGINE Demo</title>
    <style>
        body { background: #000; color: #00f3ff; font-family: monospace; margin: 0; overflow: hidden; }
        #player-wrapper { position: relative; width: 100vw; aspect-ratio: 16/9; background: #111; }
        #yt-player { width: 100%; height: 100%; transition: transform 0.3s; }
        
        #zefram-curtain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; opacity: 0; transition: opacity 0.5s;
            pointer-events: none; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
        #zefram-curtain.active { opacity: 1; }

        #seekbar-container {
            position: absolute;
            top: 66.6%;
            left: 5%;
            width: 90%;
            height: 40px;
            z-index: 20;
            display: flex;
            align-items: center;
        }
        #seekbar-bg {
            width: 100%;
            height: 4px;
            background: rgba(0, 243, 255, 0.2);
            position: relative;
        }
        #seekbar-progress {
            height: 100%;
            background: #00f3ff;
            width: 0%;
            box-shadow: 0 0 10px #00f3ff;
        }
        
        #seekbar-knob {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #fff;
            pointer-events: none;
            z-index: 5;
        }

        .ab-point {
            position: absolute;
            top: 50%;
            width: 32px;
            height: 32px;
            border: 2px solid #00f3ff;
            background: #000;
            color: #00f3ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
            z-index: 10;
            user-select: none;
        }
        #point-a { left: 0%; }
        #point-b { left: 100%; }

        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, button { background: #222; color: #00f3ff; border: 1px solid #00f3ff; padding: 10px; font-size: 14px; }
        .playlist { height: 150px; overflow-y: auto; border: 1px solid #333; margin-top: 10px; padding: 5px; }
        .track-item { padding: 5px; cursor: pointer; border-bottom: 1px solid #222; }
        .track-item:hover { background: #00f3ff33; }
        .active-track { color: #fff; background: #004444; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="yt-player"></div>
    <div id="zefram-curtain"><span>SYSTEM: TRANSITIONING...</span></div>
    
    <div id="seekbar-container">
        <div id="seekbar-bg">
            <div id="seekbar-progress"></div>
            <div id="seekbar-knob"></div>
            <div id="point-a" class="ab-point">A</div>
            <div id="point-b" class="ab-point">B</div>
        </div>
    </div>
</div>

<div class="controls">
    <input type="text" id="url-input" placeholder="YouTube URLを貼り付け">
    <button onclick="addTrack()">選 曲</button>
    <button onclick="toggleMirror()">MIRROR (反転)</button>
    <button onclick="setABLoop()">A-B LOOP (ON/OFF)</button>
</div>

<div id="playlist" class="playlist"></div>

<script>
    let player;
    let playlist = [];
    let currentIndex = 0;
    let isMirror = false;
    let isABMode = false;
    
    const C_POINT = 1.0;

    const seekbarContainer = document.getElementById('seekbar-container');
    const seekbarProgress = document.getElementById('seekbar-progress');
    const seekbarKnob = document.getElementById('seekbar-knob');
    const pointA = document.getElementById('point-a');
    const pointB = document.getElementById('point-b');
    
    let isDraggingSeek = false;
    let activeAB = null;
    let animationId = null;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1, 'rel': 0 },
            events: {
                'onReady': () => {
                    initSeekBar();
                    initABControls();
                    startGlobalMonitor();
                }
            }
        });
    }

    function startGlobalMonitor() {
        const loop = () => {
            if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                const now = player.getCurrentTime();
                const duration = player.getDuration();
                const currentPosPercent = (now / duration) * 100;

                // 1. 位置ベースのA-Bループ判定
                if (isABMode) {
                    const bPosPercent = parseFloat(pointB.style.left) || 100;
                    const aPosPercent = parseFloat(pointA.style.left) || 0;

                    // 白丸の位置がB点を超えたか判定
                    if (currentPosPercent >= bPosPercent) {
                        const targetTime = (aPosPercent / 100) * duration;
                        player.seekTo(targetTime, true);
                    }
                }

                // 2. シークバー更新
                if (!isDraggingSeek) {
                    seekbarProgress.style.width = currentPosPercent + "%";
                    seekbarKnob.style.left = currentPosPercent + "%";
                }

                // 3. 次曲遷移
                if (!isABMode && now >= (duration - 1.0) && !isTransitioning) {
                    executeNextTrack();
                }
            }
            animationId = requestAnimationFrame(loop);
        };
        animationId = requestAnimationFrame(loop);
    }

    function initSeekBar() {
        const handleSeek = (e) => {
            const rect = seekbarContainer.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const x = clientX - rect.left;
            let percent = Math.max(0, Math.min(100, (x / rect.width) * 100));
            if (player && player.getDuration) {
                const time = (percent / 100) * player.getDuration();
                player.seekTo(time, true);
            }
        };
        seekbarContainer.addEventListener('mousedown', (e) => {
            if(e.target.classList.contains('ab-point')) return;
            isDraggingSeek = true; handleSeek(e); 
        });
        window.addEventListener('mousemove', (e) => { if (isDraggingSeek) handleSeek(e); });
        window.addEventListener('mouseup', () => { isDraggingSeek = false; });
    }

    function initABControls() {
        const handleABMove = (e) => {
            if (!activeAB) return;
            const rect = seekbarContainer.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const x = clientX - rect.left;
            let percent = Math.max(0, Math.min(100, (x / rect.width) * 100));
            activeAB.style.left = percent + "%";
        };
        [pointA, pointB].forEach(el => {
            el.addEventListener('mousedown', (e) => { activeAB = el; e.stopPropagation(); });
            el.addEventListener('touchstart', (e) => { activeAB = el; e.stopPropagation(); });
        });
        window.addEventListener('mousemove', handleABMove);
        window.addEventListener('touchmove', handleABMove);
        window.addEventListener('mouseup', () => { activeAB = null; });
        window.addEventListener('touchend', () => { activeAB = null; });
    }

    function addTrack() {
        const url = document.getElementById('url-input').value;
        const videoId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
        if (videoId) {
            playlist.push({ id: videoId, title: "Track " + (playlist.length + 1) });
            updatePlaylistUI();
            document.getElementById('url-input').value = "";
            if (playlist.length === 1) playTrack(0);
        }
    }

    function updatePlaylistUI() {
        const container = document.getElementById('playlist');
        container.innerHTML = playlist.map((t, i) => 
            `<div class="track-item ${i===currentIndex?'active-track':''}" onclick="playTrack(${i})">${t.title} [${t.id}]</div>`
        ).join('');
    }

    function playTrack(index) {
        currentIndex = index;
        updatePlaylistUI();
        isTransitioning = false;
        player.loadVideoById({ videoId: playlist[index].id, startSeconds: 0 });
    }

    let isTransitioning = false;
    function executeNextTrack() {
        if (playlist.length <= currentIndex + 1) return;
        isTransitioning = true;
        const curtain = document.getElementById('zefram-curtain');
        curtain.classList.add('active');
        setTimeout(() => {
            currentIndex++;
            player.mute();
            player.loadVideoById({ videoId: playlist[currentIndex].id, startSeconds: 0 });
            updatePlaylistUI();
            setTimeout(() => {
                player.seekTo(C_POINT);
                player.unMute();
                curtain.classList.remove('active');
                isTransitioning = false;
            }, 1500);
        }, 500);
    }

    function toggleMirror() {
        isMirror = !isMirror;
        document.getElementById('yt-player').style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
    }

    function setABLoop() {
        isABMode = !isABMode;
    }
</script>
</body>
</html>
