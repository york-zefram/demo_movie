<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 15px rgba(0, 243, 255, 0.7); 
            --header-h: 50px;
        }
        
        body { 
            background: #000; 
            color: var(--neon-blue); 
            font-family: 'Michroma', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            text-transform: uppercase;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            letter-spacing: 0.15em;
            font-size: 14px;
            z-index: 2000;
            pointer-events: none;
        }

        #main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #yt-player {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 3段構造のメインオーバーレイ */
        #home-overlay {
            position: absolute; 
            top: 66%; 
            left: 50%; 
            transform: translateX(-50%);
            width: 92%; 
            background: rgba(5, 5, 5, 0.9); 
            border-radius: 20px;
            padding: 30px 20px 60px 20px; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            gap: 45px; 
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* 1段目：ナビゲーション */
        .nav-row { display: flex; justify-content: space-between; gap: 8px; }
        .btn-nav {
            flex: 1; padding: 12px 0; background: none; border: 1px solid var(--neon-blue);
            color: #fff; font-family: 'Michroma', sans-serif; font-size: 9px; 
            cursor: pointer; border-radius: 4px; transition: 0.3s;
        }
        .btn-nav.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }

        /* 2段目：情報・シークエリア */
        #dynamic-content { width: 100%; }
        .bar-track { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); position: relative; cursor: pointer; }
        .bar-fill { height: 100%; background: var(--neon-blue); width: 0%; box-shadow: var(--neon-glow); }
        .time-display {
            display: flex; justify-content: space-between; margin-top: 25px; 
            font-size: 18px; letter-spacing: 0.1em; filter: drop-shadow(var(--neon-glow));
        }

        /* 3段目：トランスポート・コンテナ（4連ボタン） */
        .transport-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
        }

        .btn-circle {
            background: none;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: 'Michroma', sans-serif;
            transition: 0.2s;
            box-shadow: var(--neon-glow);
        }

        /* A点・B点ボタン（小） */
        .btn-ab { width: 50px; height: 50px; font-size: 16px; }
        .btn-ab.set { background: var(--neon-blue); color: #000; }

        /* 戻る・再生ボタン（大） */
        .btn-main-ctrl { width: 75px; height: 75px; font-size: 24px; }
        
        .btn-circle:active { transform: scale(0.9); opacity: 0.7; }

        .mode-panel { display: none; width: 100%; }
        .mode-panel.active { display: flex; flex-direction: column; }
        input[type=text] { 
            width: 100%; background:#111; border:1px solid #444; color:#fff; padding:12px; 
            font-family: 'Michroma', sans-serif; font-size: 12px; outline: none; box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>ZEFRAM VIDEO PLAYER</header>

<div id="main-container">
    <div id="yt-player"></div>

    <div id="home-overlay">
        <div class="nav-row">
            <button class="btn-nav active" data-mode="seek">HOME</button>
            <button class="btn-nav" data-mode="url">URL</button>
            <button class="btn-nav" id="nav-mirror">MIRROR</button>
            <button class="btn-nav" id="nav-loop">LOOP</button>
            <button class="btn-nav" data-mode="speed">SPEED</button>
            <button class="btn-nav" data-mode="list">LIST</button>
        </div>

        <div id="dynamic-content">
            <div id="panel-seek" class="mode-panel active">
                <div class="bar-track" id="main-track">
                    <div class="bar-fill" id="main-fill"></div>
                </div>
                <div class="time-display">
                    <span id="txt-cur">00:00</span><span id="txt-total">00:00</span>
                </div>
            </div>
            <div id="panel-url" class="mode-panel">
                <input type="text" id="input-url" placeholder="YOUTUBE URL OR ID...">
            </div>
            <div id="panel-speed" class="mode-panel">
                <div style="display:flex; justify-content:center; align-items:center; gap:40px;">
                    <button class="btn-nav" id="btn-speed-down" style="width:50px;">-</button>
                    <span id="txt-speed" style="font-size:24px; min-width:80px; text-align:center;">1.00x</span>
                    <button class="btn-nav" id="btn-speed-up" style="width:50px;">+</button>
                </div>
            </div>
        </div>

        <div class="transport-container">
            <button class="btn-circle btn-ab" id="btn-set-a">A</button>
            <button class="btn-circle btn-main-ctrl" id="btn-prev">|◀</button>
            <button class="btn-circle btn-main-ctrl" id="btn-play">▶||</button>
            <button class="btn-circle btn-ab" id="btn-set-b">B</button>
        </div>
    </div>
</div>

<script>
    const state = {
        player: null,
        isLoop: false,
        isMirror: false,
        startT: 0,
        endT: 0,
        uiTimer: null
    };

    const fmt = (s) => {
        const m = Math.floor(s/60), rs = Math.floor(s%60);
        return `${m<10?'0'+m:m}:${rs<10?'0'+rs:rs}`;
    };

    function update() {
        if (!state.player || !state.player.getCurrentTime) return;
        const now = state.player.getCurrentTime(), dur = state.player.getDuration();
        
        if (state.isLoop && state.endT > 0 && now >= state.endT) {
            state.player.seekTo(state.startT, true);
        }

        if (dur > 0) {
            const p = (now / dur) * 100;
            document.getElementById('main-fill').style.width = p + "%";
            document.getElementById('txt-cur').innerText = fmt(now);
            document.getElementById('txt-total').innerText = fmt(dur);
        }
    }

    function switchMode(m) {
        document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
        const p = document.getElementById(`panel-${m}`);
        if(p) p.classList.add('active');
        document.querySelectorAll('.btn-nav[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    }

    function initEvents() {
        // 再生・一時停止
        document.getElementById('btn-play').onclick = () => {
            const s = state.player.getPlayerState();
            s === 1 ? state.player.pauseVideo() : state.player.playVideo();
        };

        // A点指定
        document.getElementById('btn-set-a').onclick = function() {
            state.startT = state.player.getCurrentTime();
            this.classList.add('set');
        };

        // B点指定 & ループ開始
        document.getElementById('btn-set-b').onclick = function() {
            state.endT = state.player.getCurrentTime();
            this.classList.add('set');
            state.isLoop = true;
            document.getElementById('nav-loop').classList.add('active');
        };

        // 戻る（A点または先頭へ）
        document.getElementById('btn-prev').onclick = () => {
            state.player.seekTo(state.startT, true);
        };

        // ミラー
        document.getElementById('nav-mirror').onclick = () => {
            state.isMirror = !state.isMirror;
            document.getElementById('yt-player').style.transform = state.isMirror ? "scaleX(-1)" : "scaleX(1)";
            document.getElementById('nav-mirror').classList.toggle('active', state.isMirror);
        };

        // ループ切替
        document.getElementById('nav-loop').onclick = () => {
            state.isLoop = !state.isLoop;
            document.getElementById('nav-loop').classList.toggle('active', state.isLoop);
        };

        document.querySelectorAll('.btn-nav[data-mode]').forEach(btn => {
            btn.onclick = () => switchMode(btn.dataset.mode);
        });

        // シーク操作
        document.getElementById('main-track').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const p = (e.clientX - rect.left) / rect.width;
            state.player.seekTo(p * state.player.getDuration(), true);
        };
    }

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
        state.player = new YT.Player('yt-player', {
            videoId: 'ScXNbe_5Y0o',
            playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
            events: { 'onReady': () => { initEvents(); setInterval(update, 100); } }
        });
    };
</script>
</body>
</html>
