<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEFRAM VIDEO ENGINE - Deadzone Safety</title>
    <style>
        body { background: #000; color: #00f3ff; font-family: monospace; margin: 0; overflow: hidden; }
        
        /* プレーヤー領域：ここ自体へのクリックはYouTubeに届く */
        #player-wrapper { 
            position: relative; 
            width: 100vw; 
            aspect-ratio: 16/9; 
            background: #111; 
        }
        #yt-player { width: 100%; height: 100%; }

        /* 操作コンテナ：全体を pointer-events: none にしてクリックを透過させる */
        #seekbar-container {
            position: absolute;
            top: 66%; /* 指定のデッドゾーン */
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 20;
            display: flex;
            align-items: center;
            pointer-events: none; 
        }

        #seekbar-bg {
            width: 90%;
            height: 4px;
            background: rgba(0, 243, 255, 0.3);
            margin: 0 auto;
            position: relative;
            /* バー自体もクリックを透過（YouTubeのシーク操作を邪魔しないため） */
            pointer-events: none; 
        }

        /* 実際にクリックを受け取るパーツだけ pointer-events: auto に設定 */
        .ab-point {
            position: absolute;
            top: 50%;
            width: 36px;
            height: 36px;
            border: 2px solid #00f3ff;
            background: rgba(0, 0, 0, 0.8);
            color: #00f3ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            z-index: 30;
            pointer-events: auto; /* A・Bボタンは操作可能 */
            user-select: none;
        }

        #seekbar-knob {
            position: absolute;
            top: 50%;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto; /* 再生位置ノブも操作可能 */
            z-index: 25;
        }

        #seekbar-progress {
            height: 100%;
            background: #00f3ff;
            width: 0%;
        }

        /* 下部コントロール：YouTube画面に被らないよう配置 */
        .controls { 
            padding: 15px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            background: #000;
        }
        input, button { background: #222; color: #00f3ff; border: 1px solid #00f3ff; padding: 12px; font-size: 14px; cursor: pointer; }
        .playlist { height: 120px; overflow-y: auto; border: 1px solid #333; margin: 10px; padding: 5px; }
        .track-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #222; }
        .active-track { background: #004444; color: #fff; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="yt-player"></div>
    
    <div id="seekbar-container">
        <div id="seekbar-bg">
            <div id="seekbar-progress"></div>
            <div id="seekbar-knob"></div>
            <div id="point-a" class="ab-point">A</div>
            <div id="point-b" class="ab-point">B</div>
        </div>
    </div>
</div>

<div class="controls">
    <input type="text" id="url-input" placeholder="YouTube URL">
    <button onclick="addTrack()">選 曲</button>
    <button onclick="toggleMirror()">MIRROR</button>
    <button onclick="toggleABLoop()">A-B LOOP (ON/OFF)</button>
</div>

<div id="playlist" class="playlist"></div>

<script>
    let player;
    let playlist = [];
    let currentIndex = 0;
    let isABMode = false;
    let isMirror = false;
    
    let startTime = 0;
    let endTime = 0;
    const PREDICTIVE_MARGIN = 0.15; // 実験成功値

    const pointA = document.getElementById('point-a');
    const pointB = document.getElementById('point-b');
    const knob = document.getElementById('seekbar-knob');
    const progress = document.getElementById('seekbar-progress');
    const bg = document.getElementById('seekbar-bg');

    let activeTarget = null;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            // controls: 1 にして純正機能を活かしつつ、独自UIで補助する
            playerVars: { 'playsinline': 1, 'controls': 1, 'rel': 0 },
            events: { 'onReady': onPlayerReady }
        });
    }

    function onPlayerReady() {
        initDraggable();
        setInterval(monitorVideo, 50);
    }

    function monitorVideo() {
        if (!player || player.getPlayerState() !== 1) return;
        
        const now = player.getCurrentTime();
        const duration = player.getDuration();

        if (isABMode && now >= (endTime - PREDICTIVE_MARGIN)) {
            player.seekTo(startTime, true);
        }

        // ノブの位置更新（ドラッグ中でない時）
        if (!activeTarget) {
            const pct = (now / duration) * 100;
            knob.style.left = pct + "%";
            progress.style.width = pct + "%";
        }
    }

    function initDraggable() {
        const handleMove = (e) => {
            if (!activeTarget) return;
            const rect = bg.getBoundingClientRect();
            const clientX = e.clientX || e.touches?.[0].clientX;
            let pct = ((clientX - rect.left) / rect.width) * 100;
            pct = Math.max(0, Math.min(100, pct));

            activeTarget.style.left = pct + "%";

            if (activeTarget === knob) {
                const time = (pct / 100) * player.getDuration();
                player.seekTo(time, true);
                progress.style.width = pct + "%";
            }
            updateABTimes();
        };

        const startDrag = (e, target) => {
            activeTarget = target;
            e.preventDefault();
        };

        [pointA, pointB, knob].forEach(el => {
            el.addEventListener('mousedown', (e) => startDrag(e, el));
            el.addEventListener('touchstart', (e) => startDrag(e, el));
        });

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('mouseup', () => activeTarget = null);
        window.addEventListener('touchend', () => activeTarget = null);
    }

    function updateABTimes() {
        const duration = player.getDuration();
        startTime = (parseFloat(pointA.style.left || 0) / 100) * duration;
        endTime = (parseFloat(pointB.style.left || 100) / 100) * duration;
    }

    function addTrack() {
        const url = document.getElementById('url-input').value;
        const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
        if (id) {
            playlist.push({ id, title: "Track " + (playlist.length + 1) });
            updatePlaylistUI();
            if (playlist.length === 1) playTrack(0);
        }
    }

    function updatePlaylistUI() {
        const container = document.getElementById('playlist');
        container.innerHTML = playlist.map((t, i) => 
            `<div class="track-item ${i===currentIndex?'active-track':''}" onclick="playTrack(${i})">${t.title}</div>`
        ).join('');
    }

    function playTrack(index) {
        currentIndex = index;
        updatePlaylistUI();
        player.loadVideoById(playlist[index].id);
        setTimeout(updateABTimes, 1000);
    }

    function toggleMirror() {
        isMirror = !isMirror;
        document.getElementById('yt-player').style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
    }

    function toggleABLoop() {
        isABMode = !isABMode;
        updateABTimes();
    }
</script>
</body>
</html>
