<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (H-Sync Alignment)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 12vw;
            --center-ratio: 16 / 9;
            /* ホームボタンの垂直位置を同期（下からBottomの半分） */
            --sync-height: calc(var(--bottom-h) / 2);
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        /* 1. TOPコンテナ */
        #top-container {
            flex: 0 0 var(--top-h);
            background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px;
        }

        /* 2. CENTERエリア (全画面対象) */
        #center-area {
            flex: 1;
            position: relative;
            display: flex;
            background: #111;
            z-index: 50;
            overflow: hidden;
        }

        /* 全画面時のデモ背景 */
        #center-area:fullscreen {
            background: #ff0000; /* デモ用：余白を赤 */
        }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }
        #left-lane { background: rgba(0, 100, 0, 0.6); }
        #right-lane { background: rgba(139, 69, 19, 0.6); }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%;
        }
        #video-viewport-mock {
            width: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            aspect-ratio: var(--center-ratio);
            background: #222;
        }
        #center-area:fullscreen #video-viewport-mock {
            max-width: calc(100vh * (16 / 9));
        }

        /* 3. BOTTOMコンテナ */
        #bottom-container {
            flex: 0 0 var(--bottom-h);
            background: #000080; z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
        }

        .bottom-controls { display: flex; width: 100%; height: 100%; align-items: center; }
        .bottom-lane-sync { width: var(--lane-w); display: flex; justify-content: center; align-items: center; }

        /* アイコン共通設定 */
        .dummy-icon {
            width: 8vh; height: 8vh; max-width: 50px; max-height: 50px;
            background: #fff; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* 【重要】全画面復帰用ホームアイコン：右レーンのセンターかつ、元のボタンと同じ高さ */
        #exit-fullscreen-btn-sync {
            display: none;
            position: absolute;
            /* 垂直位置：画面下端からBottomコンテナの半分（ホーム画面のボタン位置と同期） */
            bottom: var(--sync-height);
            /* 水平位置：右レーンの中心 */
            right: calc(var(--lane-w) / 2);
            transform: translate(50%, 50%);
            z-index: 9999;
        }

        #center-area:fullscreen #exit-fullscreen-btn-sync {
            display: block;
        }

        /* 通常時はサイドレーンを表示、全画面時は非表示（デモ用） */
        #center-area:fullscreen .side-lane { display: none; }
    </style>
</head>
<body>

    <div id="top-container">GOOGLE ADS AREA</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="dummy-icon" style="opacity:0.5;"></div>
            <div class="dummy-icon" style="opacity:0.5;"></div>
        </div>

        <div id="video-main">
            <div id="video-viewport-mock"></div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="dummy-icon" style="opacity:0.5;"></div>
            <div class="dummy-icon" style="opacity:0.5;"></div>
        </div>

        <div id="exit-fullscreen-btn-sync" onclick="exitFull()">
            <div class="dummy-icon" style="background: var(--neon-blue); border: 3px solid #fff;">H</div>
        </div>
    </div>

    <div id="bottom-container">
        <div class="bottom-controls">
            <div class="bottom-lane-sync"></div>
            <div style="flex:1;"></div>
            <div class="bottom-lane-sync">
                <div class="dummy-icon" onclick="enterFull()" style="background: #fff; border: 2px solid var(--neon-blue);">F</div>
            </div>
        </div>
    </div>

    <script>
        const centerArea = document.getElementById('center-area');

        function enterFull() {
            if (centerArea.requestFullscreen) {
                centerArea.requestFullscreen();
            } else if (centerArea.webkitRequestFullscreen) {
                centerArea.webkitRequestFullscreen();
            }
        }

        function exitFull() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        }
    </script>
</body>
</html>
