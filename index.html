<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM PLAYER NEO - RECOVERY</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); }
        body { background: #000; color: var(--neon-blue); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; text-transform: uppercase; }

        #player-wrapper { position: relative; width: 100vw; aspect-ratio: 16/9; background: #000; }
        #yt-player { width: 100%; height: 100%; pointer-events: auto; }

        /* HOMEオーバーレイ */
        #home-overlay {
            position: absolute; top: 66%; left: 50%; transform: translate(-50%, -30%);
            width: 90%; background: rgba(20, 20, 20, 0.9); border-radius: 15px;
            padding: 20px; z-index: 1000; transition: opacity 0.5s ease;
            display: flex; flex-direction: column; gap: 15px; border: 1px solid #333;
        }

        .home-button-row { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
        #home-play-btn {
            width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent;
            border-left: 25px solid var(--neon-blue); cursor: pointer; filter: drop-shadow(var(--neon-glow));
        }

        .home-nav-btn {
            flex: 1; padding: 10px 0; background: none; border: 1.5px solid var(--neon-blue);
            color: #fff; font-size: 12px; cursor: pointer; border-radius: 4px; transition: 0.2s;
            text-align: center;
        }
        .home-nav-btn.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }

        #home-dynamic-area { width: 100%; min-height: 50px; position: relative; }
        .mode-container { display: none; width: 100%; flex-direction: column; justify-content: center; }
        .mode-container.active { display: flex; }

        /* シークバー */
        .bar-base { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); position: relative; cursor: pointer; }
        .bar-fill { height: 100%; background: var(--neon-blue); box-shadow: var(--neon-glow); width: 0%; pointer-events: none; }
        .knob-main {
            position: absolute; top: 50%; width: 16px; height: 16px;
            background: #fff; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #fff; pointer-events: none; z-index: 150;
        }

        .ab-point {
            position: absolute; top: 50%; width: 34px; height: 34px;
            border: 2px solid var(--neon-blue); background: rgba(0,0,0,0.9);
            color: var(--neon-blue); border-radius: 50%; transform: translate(-50%, -50%);
            display: none; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: var(--neon-glow); 
            z-index: 140;
        }
        .ab-point.active { display: flex; }

        /* 下部パネル */
        .neo-panel { padding: 10px 20px; background: #000; border-top: 1px solid #222; display: grid; grid-template-columns: 1fr 2fr 1.5fr; align-items: center; gap: 20px; }
        .btn-rect { width: 100%; background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px; cursor: pointer; font-size: 11px; text-align: center; }
        .btn-rect.active { background: var(--neon-blue); color: #000; }
        input[type=range] { width: 100%; accent-color: var(--neon-blue); }
        .url-in { flex:1; background:#111; border:1px solid var(--neon-blue); color:#fff; padding:8px; outline:none; }
    </style>
</head>
<body onclick="wakeUpUI()">

<div id="player-wrapper">
    <div id="yt-player"></div>
    <div id="home-overlay">
        <div class="home-button-row">
            <div id="home-play-btn" onclick="toggleGlobalPlay()"></div>
            <button class="home-nav-btn active" id="nav-home" onclick="switchMode('seek')">HOME</button>
            <button class="home-nav-btn" id="nav-url" onclick="switchMode('url')">URL</button>
            <button class="home-nav-btn" id="nav-mirror" onclick="handleMirror()">MIRROR</button>
            <button class="home-nav-btn" id="nav-loop" onclick="toggleLoopMode()">LOOP</button>
            <button class="home-nav-btn" id="nav-speed" onclick="switchMode('speed')">SPEED</button>
            <button class="home-nav-btn" id="nav-list">LIST</button>
        </div>

        <div id="home-dynamic-area">
            <div id="container-seek" class="mode-container active">
                <div class="bar-base" id="seek-bar-root">
                    <div class="bar-fill" id="seek-fill"></div>
                    <div class="knob-main" id="seek-knob" style="left: 0%;"></div>
                    <div id="point-a" class="ab-point" style="left: 0%;">A</div>
                    <div id="point-b" class="ab-point" style="left: 100%;">B</div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:10px; margin-top:10px;">
                    <span id="time-cur">00:00</span><span id="time-total">00:00</span>
                </div>
            </div>
            <div id="container-url" class="mode-container">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="url-input-field" class="url-in" placeholder="YOUTUBE URL..." onclick="event.stopPropagation()">
                    <button onclick="loadUrl()" class="home-nav-btn" style="flex:none; width:60px;">GO</button>
                </div>
            </div>
            <div id="container-speed" class="mode-container">
                <div style="display:flex; justify-content:center; align-items:center; gap:20px;">
                    <button onclick="adjSpeed(-0.05)" class="home-nav-btn" style="flex:none; width:40px;">-</button>
                    <span id="speed-display" style="min-width:60px; text-align:center; font-size:18px;">1.00x</span>
                    <button onclick="adjSpeed(0.05)" class="home-nav-btn" style="flex:none; width:40px;">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="neo-panel">
    <div><input type="range" id="p-speed" min="0.5" max="1.5" step="0.05" value="1.0" oninput="adjSpeed(this.value, true)"></div>
    <div style="display:flex; gap:5px;">
        <button class="btn-rect">SELECT TRACK</button>
        <button class="btn-rect" id="p-mirror" onclick="handleMirror()">MIRROR</button>
        <button class="btn-rect" id="p-loop" onclick="toggleLoopMode()">A-B LOOP</button>
    </div>
</div>

<script>
    let player, isLoopActive = false, isMirror = false, curMode = 'seek';
    let startT = 0, endT = 0, activeDrag = null, uiTimer;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            videoId: 'ScXNbe_5Y0o',
            playerVars: { 'rel': 0, 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
            events: { 'onReady': () => { setInterval(update, 50); initDragEvents(); wakeUpUI(); } }
        });
    }

    function switchMode(m) {
        curMode = m;
        document.querySelectorAll('.mode-container').forEach(c => c.classList.remove('active'));
        // LOOP以外の時は指定のコンテナ、LOOPの時はSEEKコンテナを表示
        const target = (m === 'loop') ? 'seek' : m;
        const container = document.getElementById(`container-${target}`);
        if(container) container.classList.add('active');

        document.querySelectorAll('.home-nav-btn').forEach(b => b.classList.remove('active'));
        const btnId = (m === 'seek') ? 'nav-home' : `nav-${m}`;
        const btn = document.getElementById(btnId);
        if(btn) btn.classList.add('active');
        wakeUpUI();
    }

    function loadUrl() {
        const val = document.getElementById('url-input-field').value;
        const id = val.split('v=')[1]?.split('&')[0] || val.split('/').pop();
        if(id) {
            player.loadVideoById(id);
            switchMode('seek');
        }
    }

    function toggleLoopMode() {
        isLoopActive = !isLoopActive;
        const dur = player.getDuration();
        if(endT === 0 || endT > dur) endT = dur;
        
        document.getElementById('p-loop').classList.toggle('active', isLoopActive);
        document.getElementById('nav-loop').classList.toggle('active', isLoopActive);
        document.getElementById('point-a').classList.toggle('active', isLoopActive);
        document.getElementById('point-b').classList.toggle('active', isLoopActive);

        if(isLoopActive) {
            switchMode('seek');
            player.seekTo(startT, true);
        }
    }

    function update() {
        if (!player || !player.getCurrentTime || activeDrag) return;
        const now = player.getCurrentTime(), dur = player.getDuration();
        
        if (isLoopActive && now >= (endT - 0.2)) player.seekTo(startT, true);

        if (dur > 0) {
            const p = (now / dur) * 100;
            document.getElementById('seek-knob').style.left = p + "%";
            document.getElementById('seek-fill').style.width = p + "%";
            document.getElementById('time-cur').innerText = fmt(now);
            document.getElementById('time-total').innerText = fmt(dur);
        }
    }

    function initDragEvents() {
        const root = document.getElementById('seek-bar-root');
        const els = { 'a': document.getElementById('point-a'), 'b': document.getElementById('point-b') };

        root.addEventListener('mousedown', (e) => {
            if(e.target.classList.contains('ab-point')) return;
            activeDrag = 'knob'; handleMove(e);
        });

        const startDrag = (type) => (e) => {
            if (!isLoopActive) return;
            activeDrag = type; e.preventDefault(); e.stopPropagation();
        };

        els.a.addEventListener('mousedown', startDrag('a'));
        els.b.addEventListener('mousedown', startDrag('b'));

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => activeDrag = null);
    }

    function handleMove(e) {
        if (!activeDrag) return;
        const rect = document.getElementById('seek-bar-root').getBoundingClientRect();
        let p = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        const d = player.getDuration() || 0;

        if (activeDrag === 'knob') {
            player.seekTo((p/100) * d, true);
        } else {
            document.getElementById('point-' + activeDrag).style.left = p + "%";
            startT = (parseFloat(document.getElementById('point-a').style.left)/100)*d;
            endT = (parseFloat(document.getElementById('point-b').style.left)/100)*d;
        }
    }

    function adjSpeed(v, d=false) {
        let s = d ? parseFloat(v) : player.getPlaybackRate() + v;
        s = Math.max(0.5, Math.min(1.5, s));
        player.setPlaybackRate(s);
        document.getElementById('speed-display').innerText = s.toFixed(2) + "x";
        document.getElementById('p-speed').value = s;
    }

    function toggleGlobalPlay() { player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); }
    function handleMirror() { isMirror = !isMirror; document.getElementById('yt-player').style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)"; }
    function fmt(s) { const m=Math.floor(s/60), rs=Math.floor(s%60); return (m<10?'0'+m:m)+":"+(rs<10?'0'+rs:rs); }
    function wakeUpUI() { document.getElementById('home-overlay').style.opacity = "1"; clearTimeout(uiTimer); uiTimer = setTimeout(()=> { if(!isLoopActive && curMode === 'seek') document.getElementById('home-overlay').style.opacity="0"; }, 5000); }
</script>
</body>
</html>
