<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Fixed Baseline)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --top-h: 50px;
            --bottom-h: 25vh;
            --lane-w: 15vw;
            --fs-status-h: 10vh; /* 新設：全画面時の操作エリア */
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        /* --- HOME LAYOUT --- */
        #top-container {
            flex: 0 0 var(--top-h); background: #000; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #333; font-size: 12px;
        }

        #center-area {
            flex: 1; position: relative; display: flex; background: #111; z-index: 50; overflow: hidden;
        }

        .side-lane {
            width: var(--lane-w); height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 2vh 0; box-sizing: border-box; z-index: 200;
        }

        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; height: 100%;
        }

        #video-viewport-mock {
            width: 100%;
            max-width: calc((100vh - var(--top-h) - var(--bottom-h)) * (16 / 9));
            aspect-ratio: 16 / 9; background: #222;
        }

        /* --- FULLSCREEN LAYOUT (10vh Baseline) --- */
        #center-area:fullscreen { 
            background: #ff0000; /* 赤いベゼル */
            display: flex; flex-direction: column; 
        }

        /* 全画面時：映像を上に寄せる（残りの90vhを使用） */
        #center-area:fullscreen #video-main {
            height: calc(100vh - var(--fs-status-h));
            flex: none; align-items: flex-start; /* 上寄せ */
        }

        #center-area:fullscreen #video-viewport-mock {
            width: 100vw; max-height: calc(100vh - var(--fs-status-h));
            max-width: calc((100vh - var(--fs-status-h)) * (16 / 9));
        }

        /* 全画面時：下部10vhステータスエリア */
        #fs-status-bar {
            display: none; height: var(--fs-status-h); width: 100%;
            align-items: center; justify-content: flex-end; padding: 0 5vw;
        }

        #center-area:fullscreen #fs-status-bar { display: flex; }
        #center-area:fullscreen .side-lane { display: none; }

        .fs-exit-txt {
            color: #fff; font-size: 4vw; cursor: pointer; font-weight: bold;
        }

        /* --- UI COMPONENTS --- */
        #bottom-container {
            flex: 0 0 var(--bottom-h); background: #000080; z-index: 100;
            display: flex; align-items: center;
        }

        .grid-icon-box {
            width: 8vh; height: 8vh; max-width: 55px; max-height: 55px;
            background: #fff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #000; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="top-container">GOOGLE ADS AREA</div>

    <div id="center-area">
        <div id="left-lane" class="side-lane">
            <div class="grid-icon-box">SPD</div><div class="grid-icon-box">LOP</div><div class="grid-icon-box">MIR</div>
        </div>

        <div id="video-main">
            <div id="video-viewport-mock"></div>
        </div>

        <div id="right-lane" class="side-lane">
            <div class="grid-icon-box">FIL</div><div class="grid-icon-box">WEB</div><div class="grid-icon-box">--</div>
        </div>

        <div id="fs-status-bar">
            <div class="fs-exit-txt" onclick="exitFull()">EXIT</div>
        </div>
    </div>

    <div id="bottom-container">
        <div style="width:var(--lane-w); display:flex; justify-content:center;"><div class="grid-icon-box">PLAY</div></div>
        <div style="flex:1; padding:0 20px;"><div style="width:100%; height:4px; background:var(--neon-blue); opacity:0.3;"></div></div>
        <div style="width:var(--lane-w); display:flex; justify-content:center;"><div class="grid-icon-box" onclick="enterFull()">FULL</div></div>
    </div>

    <script>
        const centerArea = document.getElementById('center-area');

        function enterFull() {
            if (centerArea.requestFullscreen) centerArea.requestFullscreen();
            else if (centerArea.webkitRequestFullscreen) centerArea.webkitRequestFullscreen();
        }

        function exitFull() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    </script>
</body>
</html>
