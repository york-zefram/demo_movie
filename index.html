<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO ENGINE - Click-Through Fix</title>
    <style>
        body { background: #000; color: #00f3ff; font-family: monospace; margin: 0; overflow: hidden; }
        
        /* プレーヤー：最背面に配置 */
        #player-wrapper { 
            position: relative; 
            width: 100vw; 
            aspect-ratio: 16/9; 
            background: #111; 
            z-index: 1;
        }
        #yt-player { width: 100%; height: 100%; pointer-events: auto; }

        /* 操作コンテナ：高さを最小限にし、かつ位置を66%に固定 */
        #seekbar-container {
            position: absolute;
            top: 66%; 
            left: 5%;
            width: 90%;
            height: 40px; /* 必要最小限の高さ */
            margin-top: -20px; /* 中心を66%に合わせる */
            z-index: 10;
            pointer-events: none; /* コンテナ自体はクリックを透過 */
        }

        #seekbar-bg {
            width: 100%;
            height: 4px;
            background: rgba(0, 243, 255, 0.3);
            position: absolute;
            top: 18px;
            pointer-events: none;
        }

        /* 実際にクリックが必要なパーツのみ pointer-events: auto にする */
        .ab-point {
            position: absolute;
            top: 18px;
            width: 36px;
            height: 36px;
            border: 2px solid #00f3ff;
            background: rgba(0, 0, 0, 0.8);
            color: #00f3ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto; 
            z-index: 20;
            user-select: none;
        }

        #seekbar-knob {
            position: absolute;
            top: 18px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            z-index: 15;
        }

        #seekbar-progress { height: 100%; background: #00f3ff; width: 0%; }

        .controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #000; }
        input, button { background: #222; color: #00f3ff; border: 1px solid #00f3ff; padding: 12px; cursor: pointer; }
        .playlist { height: 100px; overflow-y: auto; border: 1px solid #333; margin: 10px; }
        .track-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #222; }
        .active-track { background: #004444; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="yt-player"></div>
    <div id="seekbar-container">
        <div id="seekbar-bg">
            <div id="seekbar-progress"></div>
            <div id="seekbar-knob"></div>
            <div id="point-a" class="ab-point" style="left:0%;">A</div>
            <div id="point-b" class="ab-point" style="left:100%;">B</div>
        </div>
    </div>
</div>

<div class="controls">
    <input type="text" id="url-input" placeholder="YouTube URL">
    <button onclick="addTrack()">選 曲</button>
    <button onclick="toggleMirror()">MIRROR</button>
    <button onclick="toggleABLoop()">A-B LOOP (ON/OFF)</button>
</div>

<div id="playlist" class="playlist"></div>

<script>
    let player;
    let playlist = [];
    let currentIndex = 0;
    let isABMode = false;
    let isMirror = false;
    let startTime = 0;
    let endTime = 0;
    const PREDICTIVE_MARGIN = 0.15;

    const pointA = document.getElementById('point-a');
    const pointB = document.getElementById('point-b');
    const knob = document.getElementById('seekbar-knob');
    const progress = document.getElementById('seekbar-progress');
    const bg = document.getElementById('seekbar-bg');

    let activeTarget = null;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            playerVars: { 'playsinline': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1 },
            events: { 'onReady': () => {
                // 監視間隔を調整し、クリック処理に余裕を持たせる
                setInterval(loopEngine, 30); 
            }}
        });
    }

    function loopEngine() {
        if (!player || player.getPlayerState() !== 1) return;
        
        const now = player.getCurrentTime();
        const duration = player.getDuration();

        if (isABMode && now >= (endTime - PREDICTIVE_MARGIN)) {
            player.seekTo(startTime, true);
        }

        if (!activeTarget) {
            const pct = (now / duration) * 100;
            knob.style.left = pct + "%";
            progress.style.width = pct + "%";
        }
    }

    // ドラッグ処理の最適化
    function startDrag(e, target) {
        activeTarget = target;
    }

    [pointA, pointB, knob].forEach(el => {
        el.addEventListener('mousedown', (e) => startDrag(e, el));
        el.addEventListener('touchstart', (e) => startDrag(e, el), {passive: true});
    });

    window.addEventListener('mousemove', (e) => {
        if (!activeTarget) return;
        const rect = bg.getBoundingClientRect();
        let pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        activeTarget.style.left = pct + "%";
        if (activeTarget === knob) {
            player.seekTo((pct / 100) * player.getDuration(), true);
            progress.style.width = pct + "%";
        }
        updateTimes();
    });

    window.addEventListener('mouseup', () => activeTarget = null);

    function updateTimes() {
        const d = player.getDuration() || 0;
        startTime = (parseFloat(pointA.style.left) / 100) * d;
        endTime = (parseFloat(pointB.style.left) / 100) * d;
    }

    function addTrack() {
        const url = document.getElementById('url-input').value;
        const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
        if (id) {
            playlist.push({ id });
            updateUI();
            if (playlist.length === 1) play(0);
        }
    }

    function updateUI() {
        document.getElementById('playlist').innerHTML = playlist.map((t, i) => 
            `<div class="track-item ${i===currentIndex?'active-track':''}" onclick="play(${i})">Track ${i+1}</div>`
        ).join('');
    }

    function play(i) {
        currentIndex = i;
        updateUI();
        player.loadVideoById(playlist[i].id);
        setTimeout(updateTimes, 1000);
    }

    function toggleMirror() {
        isMirror = !isMirror;
        document.getElementById('yt-player').style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
    }

    function toggleABLoop() {
        isABMode = !isABMode;
        updateTimes();
    }
</script>
</body>
</html>
