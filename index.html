<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM PLAYER NEO - STABLE HOME EDITION</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); }
        body { background: #000; color: var(--neon-blue); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; text-transform: uppercase; }

        /* 映像エリア */
        #player-wrapper { 
            position: relative; width: 100vw; aspect-ratio: 16/9; background: #000;
        }
        #yt-player { width: 100%; height: 100%; pointer-events: auto; }

        /* --- HOME UI UNIT (Container Based) --- */
        #home-overlay {
            position: absolute; top: 66%; left: 50%; transform: translate(-50%, -30%);
            width: 90%; background: rgba(20, 20, 20, 0.9); border-radius: 15px;
            padding: 20px; z-index: 1000; transition: opacity 0.5s ease;
            display: flex; flex-direction: column; gap: 15px; border: 1px solid #333;
        }

        #home-label {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            font-size: 24px; letter-spacing: 5px; color: #fff; transition: opacity 0.5s ease;
        }

        .home-button-row { display: flex; justify-content: space-between; gap: 8px; }
        #home-play-btn {
            width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent;
            border-left: 25px solid var(--neon-blue); cursor: pointer; filter: drop-shadow(var(--neon-glow));
            margin-right: 5px;
        }

        .home-nav-btn {
            flex: 1; padding: 10px 0; background: none; border: 1.5px solid var(--neon-blue);
            color: #fff; font-size: 12px; cursor: pointer; border-radius: 4px; transition: 0.2s;
            text-align: center; white-space: nowrap;
        }
        .home-nav-btn.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }

        /* --- 各機能専用コンテナ --- */
        #home-dynamic-area { width: 100%; min-height: 50px; position: relative; }
        .mode-container { display: none; width: 100%; flex-direction: column; justify-content: center; }
        .mode-container.active { display: flex; }

        /* 共通バーデザイン */
        .bar-base { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); position: relative; cursor: pointer; }
        .bar-fill { height: 100%; background: var(--neon-blue); box-shadow: var(--neon-glow); width: 0%; pointer-events: none; }
        .knob-main {
            position: absolute; top: 50%; width: 16px; height: 16px;
            background: #fff; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #fff; pointer-events: none;
        }

        /* LOOP (AB) 専用 */
        .ab-knob {
            position: absolute; top: 50%; width: 34px; height: 34px;
            border: 2px solid var(--neon-blue); background: rgba(0,0,0,0.9);
            color: var(--neon-blue); border-radius: 50%; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: var(--neon-glow); z-index: 10;
        }
        #loop-range-highlight { position: absolute; height: 100%; background: var(--neon-blue); opacity: 0.5; pointer-events: none; }

        /* SPEED 専用 */
        .speed-ui-row { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 10px; }
        .speed-sub-btn {
            width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--neon-blue);
            background: none; color: var(--neon-blue); cursor: pointer; font-weight: bold;
        }

        /* --- 下部パネル (保持) --- */
        .neo-panel { padding: 10px 20px; background: #000; border-top: 1px solid #222; display: grid; grid-template-columns: 1fr 2fr 1.5fr; align-items: center; gap: 20px; }
        .btn-rect { width: 100%; background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px; cursor: pointer; font-size: 11px; }
        .btn-rect.active { background: var(--neon-blue); color: #000; }
        input[type=range] { width: 100%; accent-color: var(--neon-blue); }
    </style>
</head>
<body onclick="wakeUpUI()">

<div id="player-wrapper">
    <div id="yt-player"></div>
    <div id="home-overlay">
        <div id="home-label">HOME</div>
        <div class="home-button-row">
            <div id="home-play-btn" onclick="togglePlay()"></div>
            <button class="home-nav-btn" onclick="switchMode('seek')">HOME</button>
            <button class="home-nav-btn" id="nav-url" onclick="switchMode('url')">URL</button>
            <button class="home-nav-btn" id="nav-mirror" onclick="handleMirror()">MIRROR</button>
            <button class="home-nav-btn" id="nav-loop" onclick="switchMode('loop')">LOOP</button>
            <button class="home-nav-btn" id="nav-speed" onclick="switchMode('speed')">SPEED</button>
            <button class="home-nav-btn" id="nav-list">LIST</button>
        </div>

        <div id="home-dynamic-area">
            <div id="container-seek" class="mode-container active">
                <div class="bar-base" id="seek-bar-root">
                    <div class="bar-fill" id="seek-fill"></div>
                    <div class="knob-main" id="seek-knob" style="left: 0%;"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:10px; margin-top:5px;">
                    <span id="time-cur">00:00</span><span id="time-total">00:00</span>
                </div>
            </div>

            <div id="container-speed" class="mode-container">
                <div class="bar-base" id="speed-bar-root">
                    <div class="bar-fill" id="speed-fill" style="width: 50%;"></div>
                    <div class="knob-main" id="speed-knob" style="left: 50%;"></div>
                </div>
                <div class="speed-ui-row">
                    <button class="speed-sub-btn" onclick="adjSpeed(-0.05)">-</button>
                    <span id="speed-txt" style="min-width:50px; text-align:center;">1.00x</span>
                    <button class="speed-sub-btn" onclick="adjSpeed(0,true)">O</button>
                    <button class="speed-sub-btn" onclick="adjSpeed(0.05)">+</button>
                </div>
            </div>

            <div id="container-loop" class="mode-container">
                <div class="bar-base" id="loop-bar-root" style="cursor:default;">
                    <div id="loop-range-highlight" style="left: 0%; width: 100%;"></div>
                    <div id="knob-a" class="ab-knob" style="left: 0%;">A</div>
                    <div id="knob-b" class="ab-knob" style="left: 100%;">B</div>
                </div>
            </div>

            <div id="container-url" class="mode-container">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="url-in" style="flex:1; background:#111; border:1px solid var(--neon-blue); color:#fff; padding:8px;" placeholder="YOUTUBE URL..." onclick="event.stopPropagation()">
                    <button onclick="loadUrl()" style="background:var(--neon-blue); border:none; padding:0 15px; font-weight:bold;">GO</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="neo-panel">
    <div><input type="range" id="p-speed" min="0.5" max="1.5" step="0.05" value="1.0" oninput="adjSpeed(this.value, false, true)"></div>
    <div style="display:flex; gap:5px;">
        <button class="btn-rect">選 曲</button>
        <button class="btn-rect" id="p-mirror" onclick="handleMirror()">MIRROR</button>
        <button class="btn-rect" id="p-loop" onclick="toggleAB()">A-B LOOP</button>
    </div>
    <div id="playlist" style="font-size:10px; color:#666;">PLAYLIST READY...</div>
</div>

<script>
    let player, isMirror=false, isAB=false, curMode='seek', startT=0, endT=0;
    let uiTimer, activeDrag = null;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            playerVars: { 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
            events: { 'onReady': () => { setInterval(update, 50); initEvents(); wakeUpUI(); } }
        });
    }

    function switchMode(m) {
        curMode = m;
        document.querySelectorAll('.mode-container').forEach(c => c.classList.remove('active'));
        document.getElementById(`container-${curMode}`).classList.add('active');
        
        document.querySelectorAll('.home-nav-btn').forEach(b => b.classList.remove('active'));
        if(curMode !== 'seek') {
            const btn = document.getElementById(`nav-${curMode}`);
            if(btn) btn.classList.add('active');
        }
        if(isAB) document.getElementById('nav-loop').classList.add('active');
        wakeUpUI();
    }

    function initEvents() {
        const handleDrag = (e, type) => {
            const rootId = type.startsWith('knob') ? 'loop-bar-root' : `${type}-bar-root`;
            const root = document.getElementById(rootId);
            const rect = root.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            let p = Math.max(0, Math.min(100, (x / rect.width) * 100));

            if (type === 'seek') {
                player.seekTo((p/100) * player.getDuration(), true);
            } else if (type === 'speed') {
                adjSpeed(0.5 + (p/100), false, true);
            } else if (type === 'knob-a') {
                let pb = parseFloat(document.getElementById('knob-b').style.left);
                p = Math.min(p, pb - 2);
                document.getElementById('knob-a').style.left = p + "%";
                syncAB();
            } else if (type === 'knob-b') {
                let pa = parseFloat(document.getElementById('knob-a').style.left);
                p = Math.max(p, pa + 2);
                document.getElementById('knob-b').style.left = p + "%";
                syncAB();
            }
            wakeUpUI();
        };

        const addListener = (id, type) => {
            const el = document.getElementById(id);
            const start = (e) => { activeDrag = type; handleDrag(e, type); e.stopPropagation(); };
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start, {passive:false});
        };

        addListener('seek-bar-root', 'seek');
        addListener('speed-bar-root', 'speed');
        addListener('knob-a', 'knob-a');
        addListener('knob-b', 'knob-b');

        window.addEventListener('mousemove', (e) => { if(activeDrag) handleDrag(e, activeDrag); });
        window.addEventListener('touchmove', (e) => { if(activeDrag) handleDrag(e, activeDrag); }, {passive:false});
        window.addEventListener('mouseup', () => activeDrag = null);
        window.addEventListener('touchend', () => activeDrag = null);
    }

    function syncAB() {
        const pa = parseFloat(document.getElementById('knob-a').style.left);
        const pb = parseFloat(document.getElementById('knob-b').style.left);
        const high = document.getElementById('loop-range-highlight');
        high.style.left = pa + "%"; high.style.width = (pb - pa) + "%";
        const dur = player.getDuration();
        startT = (pa/100) * dur; endT = (pb/100) * dur;
    }

    function adjSpeed(val, reset=false, fromDrag=false) {
        let s = reset ? 1.0 : (fromDrag ? val : parseFloat(player.getPlaybackRate()) + val);
        s = Math.max(0.5, Math.min(1.5, s));
        player.setPlaybackRate(parseFloat(s));
        const p = (s - 0.5) * 100;
        document.getElementById('speed-knob').style.left = p + "%";
        document.getElementById('speed-fill').style.width = p + "%";
        document.getElementById('speed-txt').innerText = parseFloat(s).toFixed(2) + "x";
        document.getElementById('p-speed').value = s;
    }

    function toggleAB() {
        isAB = !isAB;
        document.getElementById('p-loop').classList.toggle('active', isAB);
        document.getElementById('nav-loop').classList.toggle('active', isAB);
        if(isAB) syncAB();
    }

    function update() {
        if(!player || !player.getCurrentTime) return;
        const now = player.getCurrentTime(), dur = player.getDuration();
        if(isAB && dur > 0 && now >= endT - 0.1) player.seekTo(startT, true);

        if(dur > 0 && !activeDrag) {
            const p = (now/dur) * 100;
            if(curMode === 'seek') {
                document.getElementById('seek-knob').style.left = p + "%";
                document.getElementById('seek-fill').style.width = p + "%";
            }
            document.getElementById('time-cur').innerText = fmt(now);
            document.getElementById('time-total').innerText = fmt(dur);
        }
    }

    function fmt(s) { 
        const m = Math.floor(s/60), rs = Math.floor(s%60);
        return (m<10?'0'+m:m)+":"+(rs<10?'0'+rs:rs);
    }

    function wakeUpUI() {
        const o = document.getElementById('home-overlay'), l = document.getElementById('home-label');
        o.style.opacity = "1"; l.style.opacity = "1";
        clearTimeout(uiTimer);
        if(!activeDrag) uiTimer = setTimeout(() => { o.style.opacity="0"; l.style.opacity="0"; }, 5000);
    }

    function togglePlay() { player.getPlayerState()===1 ? player.pauseVideo() : player.playVideo(); }
    function handleMirror() {
        isMirror = !isMirror;
        document.getElementById('yt-player').style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
        document.getElementById('p-mirror').classList.toggle('active', isMirror);
        document.getElementById('nav-mirror').classList.toggle('active', isMirror);
    }
    function loadUrl() {
        const val = document.getElementById('url-in').value;
        const id = val.split('v=')[1]?.split('&')[0] || val.split('/').pop();
        if(id) { player.loadVideoById(id); switchMode('seek'); }
    }
</script>
</body>
</html>
