<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO ENGINE - Alignment Fix</title>
    <style>
        body { background: #000; color: #00f3ff; font-family: monospace; margin: 0; overflow: hidden; }
        
        /* 16:9の標準的なプレーヤー枠 */
        #player-wrapper { 
            position: relative; 
            width: 100vw; 
            aspect-ratio: 16/9; 
            background: #000; 
        }
        #yt-player { width: 100%; height: 100%; }

        /* 操作系：上から66%のライン。クリックは透過。 */
        #seekbar-container {
            position: absolute;
            top: 66%; 
            left: 5%;
            width: 90%;
            height: 40px; 
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center; /* 縦方向の中央揃え */
        }

        /* 水色の再生バー本体 */
        #seekbar-bg {
            width: 100%;
            height: 2px;
            background: rgba(0, 243, 255, 0.3);
            position: relative;
            pointer-events: none;
        }

        /* 各種ポイント：バーの真上に配置 */
        .ab-point {
            position: absolute;
            top: 50%; /* バーの中心に合わせる */
            width: 36px;
            height: 36px;
            border: 1px solid #00f3ff;
            background: rgba(0, 0, 0, 0.8);
            color: #00f3ff;
            border-radius: 50%;
            transform: translate(-50%, -50%); /* 自身の中心を基準にする */
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto; /* ボタンのみクリック可能 */
            user-select: none;
            z-index: 30;
        }

        /* 再生位置（白い点）：バーの真上に配置 */
        #seekbar-knob {
            position: absolute;
            top: 50%;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            z-index: 25;
        }

        #seekbar-progress { height: 100%; background: #00f3ff; width: 0%; }

        /* 下部コントロール */
        .controls { padding: 10px; display: flex; gap: 8px; background: #000; }
        input { flex: 1; background: #111; color: #00f3ff; border: 1px solid #333; padding: 10px; }
        button { background: #111; color: #00f3ff; border: 1px solid #00f3ff; padding: 10px 15px; cursor: pointer; }
        .playlist { height: 120px; overflow-y: auto; background: #050505; margin: 5px; border: 1px solid #222; }
        .track-item { padding: 10px; border-bottom: 1px solid #111; font-size: 12px; cursor: pointer; }
        .active-track { color: #fff; background: #003333; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="yt-player"></div>
    <div id="seekbar-container">
        <div id="seekbar-bg">
            <div id="seekbar-progress"></div>
            <div id="seekbar-knob" style="left: 0%;"></div>
            <div id="point-a" class="ab-point" style="left: 0%;">A</div>
            <div id="point-b" class="ab-point" style="left: 100%;">B</div>
        </div>
    </div>
</div>

<div class="controls">
    <input type="text" id="url-input" placeholder="YouTube URLをここに">
    <button onclick="addTrack()">選 曲</button>
    <button onclick="toggleMirror()">MIRROR</button>
    <button onclick="toggleABLoop()">A-B LOOP (ON/OFF)</button>
</div>

<div id="playlist" class="playlist"></div>

<script>
    let player;
    let playlist = [];
    let currentIndex = 0;
    let isABMode = false;
    let isMirror = false;
    let startTime = 0;
    let endTime = 0;
    const PREDICTIVE_MARGIN = 0.15;

    const pointA = document.getElementById('point-a');
    const pointB = document.getElementById('point-b');
    const knob = document.getElementById('seekbar-knob');
    const progress = document.getElementById('seekbar-progress');
    const bg = document.getElementById('seekbar-bg');

    let activeTarget = null;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            // controls: 0 (以前の安定状態) に戻し、YouTube側を刺激しない
            playerVars: { 'rel': 0, 'modestbranding': 1, 'playsinline': 1, 'controls': 0 },
            events: { 'onReady': () => setInterval(loopEngine, 40) }
        });
    }

    function loopEngine() {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        
        const now = player.getCurrentTime();
        const duration = player.getDuration();

        if (isABMode && now >= (endTime - PREDICTIVE_MARGIN)) {
            player.seekTo(startTime, true);
        }

        if (!activeTarget && duration > 0) {
            const pct = (now / duration) * 100;
            knob.style.left = pct + "%";
            progress.style.width = pct + "%";
        }
    }

    function startDrag(e, target) {
        activeTarget = target;
        e.preventDefault();
    }

    [pointA, pointB, knob].forEach(el => {
        el.addEventListener('mousedown', (e) => startDrag(e, el));
        el.addEventListener('touchstart', (e) => startDrag(e, el), {passive: false});
    });

    window.addEventListener('mousemove', (e) => {
        if (!activeTarget) return;
        const rect = bg.getBoundingClientRect();
        const clientX = e.clientX || e.touches?.[0].clientX;
        let pct = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
        activeTarget.style.left = pct + "%";
        
        if (activeTarget === knob) {
            player.seekTo((pct / 100) * player.getDuration(), true);
            progress.style.width = pct + "%";
        }
        updateTimes();
    });

    window.addEventListener('mouseup', () => activeTarget = null);
    window.addEventListener('touchend', () => activeTarget = null);

    function updateTimes() {
        const d = player.getDuration() || 0;
        startTime = (parseFloat(pointA.style.left) / 100) * d;
        endTime = (parseFloat(pointB.style.left) / 100) * d;
    }

    function addTrack() {
        const url = document.getElementById('url-input').value;
        const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
        if (id) {
            playlist.push({ id });
            updateUI();
            if (playlist.length === 1) play(0);
        }
    }

    function updateUI() {
        document.getElementById('playlist').innerHTML = playlist.map((t, i) => 
            `<div class="track-item ${i===currentIndex?'active-track':''}" onclick="play(${i})">Track ${i+1}</div>`
        ).join('');
    }

    function play(i) {
        currentIndex = i;
        updateUI();
        player.loadVideoById(playlist[i].id);
        setTimeout(updateTimes, 1000);
    }

    function toggleMirror() {
        isMirror = !isMirror;
        document.getElementById('yt-player').style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
    }

    function toggleABLoop() {
        isABMode = !isABMode;
        updateTimes();
    }
</script>
</body>
</html>
