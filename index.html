<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM VIDEO PLAYER - NEO (Dashicons Debug)</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dashicons/2.0.0/css/dashicons.min.css">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --disabled-color: #444;
            --panel-bg: rgba(10, 10, 10, 0.85);
            --ad-height: 50px;
        }
        
        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
            display: flex; flex-direction: column;
        }

        #ad-container {
            width: 100%; height: var(--ad-height);
            background: #222; z-index: 3000;
            display: flex; align-items: center; justify-content: center;
        }

        #main-container {
            position: relative; flex: 1; width: 100vw;
            display: flex; align-items: center; justify-content: center; 
            background: #002200; /* デバッグ用：深緑 */
        }

        /* 中央の動画エリアを80vwに制限（左右10vwを露出させる） */
        #video-viewport { 
            width: 80vw; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
        }
        #yt-player, #local-video { 
            width: 100%; height: 100%; 
            max-width: 100%; max-height: 100%;
            object-fit: contain; 
        }

        /* 左サイドバー：10vwの中央にアイコンを配置 */
        #left-sidebar-debug {
            position: absolute; left: 0; top: 0; width: 10vw; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 3vh; z-index: 2500;
        }

        /* アイコンボタンの共通スタイル（10vwの中央に配置） */
        .side-btn {
            background: none; border: none; color: #fff; cursor: pointer;
            width: 6vw; height: 6vw; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; padding: 0;
        }
        .side-btn .dashicons { font-size: 4vw; width: 4vw; height: 4vw; }
        .side-btn:hover { color: var(--neon-blue); filter: drop-shadow(var(--neon-glow)); }
        .side-btn.active { color: var(--neon-blue); }

        /* 白丸（A地点用インジケーター想定） */
        .white-circle {
            width: 2.5vw; height: 2.5vw; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff;
        }

        /* 操作パネル全体：中央80vwに配置 */
        #home-overlay {
            position: absolute; bottom: 0; left: 10vw;
            width: 80vw; height: 100%;
            z-index: 1000; display: flex; flex-direction: column; 
            justify-content: flex-end;
            padding-bottom: 5vh;
            box-sizing: border-box;
            pointer-events: none; transition: opacity 0.5s ease;
        }
        .nav-row, #dynamic-content, .transport-container { pointer-events: auto; }

        /* 既存のパネル類（index5.htmlの機能を維持） */
        .nav-row { display: none; } /* サイドバーに移行するため一時的に非表示 */
        #dynamic-content { 
            min-height: 100px; display: flex; align-items: center; padding: 20px;
            background: var(--panel-bg); border-radius: 12px; border: 1px solid #333;
            margin-bottom: 20px;
        }
        .mode-panel { display: none; width: 100%; flex-direction: column; }
        .mode-panel.active { display: flex; }

        /* ボトムバー：デバッグ用濃紺 */
        .transport-container { 
            display: flex; justify-content: center; align-items: center; gap: 20px; width: 100%; 
            min-height: 15vh; background: #000033; padding: 15px 0; border-radius: 12px; border: 1px solid var(--neon-blue);
        }

        /* 既存スタイル継承 */
        .btn-circle { background: none; border: 2px solid var(--neon-blue); color: var(--neon-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-main-ctrl { width: 65px; height: 65px; font-size: 20px; }
        .hidden { opacity: 0; pointer-events: none !important; }
    </style>
</head>
<body>

<div id="ad-container"><div style="font-size: 9px; color: #555;">AD AREA</div></div>

<div id="main-container">
    <div id="left-sidebar-debug">
        <button class="side-btn" id="side-speed" data-mode="speed">
            <span class="dashicons dashicons-admin-generic"></span>
        </button>
        <button class="side-btn" id="side-loop">
            <span class="dashicons dashicons-products"></span>
        </button>
        <button class="side-btn" id="side-mirror">
            <span class="dashicons dashicons-image-flip-horizontal"></span>
        </button>
        <button class="side-btn" id="side-home" data-mode="seek">
            <span class="dashicons dashicons-admin-home"></span>
        </button>
        
        <div class="white-circle"></div>

        <button class="side-btn" id="btn-prev-side" style="color:var(--neon-blue);">
            <span style="font-size:2vw; font-family:'Michroma';">|◀</span>
        </button>
        
        <button class="side-btn" id="btn-play-side" style="color:var(--neon-blue);">
            <span style="font-size:3vw; font-family:'Michroma';">▶</span>
        </button>
    </div>

    <div id="video-viewport">
        <div id="yt-player"></div>
        <video id="local-video" playsinline></video>
    </div>
    
    <div id="home-overlay">
        <div id="dynamic-content">
            <div id="panel-seek" class="mode-panel active">
                <div id="txt-cur">00:00</div>
            </div>
            <div id="panel-speed" class="mode-panel">SPEED PANEL</div>
        </div>

        <div class="transport-container">
            <button class="btn-circle btn-main-ctrl" id="btn-play">▶</button>
        </div>
    </div>
</div>

<script>
    /* index5.html の全ロジックを継承 */
    const state = { player: null, localVid: null, isYoutube: true, isLoop: false, isMirror: false, currentMode: 'seek' };
    
    // サイドバーのアイコンに既存機能を紐付け
    function initSidebarEvents() {
        document.getElementById('side-mirror').onclick = () => document.getElementById('nav-mirror')?.click();
        document.getElementById('side-loop').onclick = () => document.getElementById('nav-loop')?.click();
        document.getElementById('btn-play-side').onclick = () => document.getElementById('btn-play')?.click();
        document.getElementById('btn-prev-side').onclick = () => document.getElementById('btn-prev')?.click();
        
        document.querySelectorAll('.side-btn[data-mode]').forEach(b => {
            b.onclick = () => {
                const mode = b.dataset.mode;
                const targetNav = document.querySelector(`.btn-nav[data-mode="${mode}"]`);
                targetNav?.click();
            };
        });
    }

    // YouTube API 等の初期化（index5.html準拠）
    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
        state.player = new YT.Player('yt-player', { videoId: 'ScXNbe_5Y0o', events: { 'onReady': () => { initSidebarEvents(); } } });
    };
</script>
</body>
</html>
