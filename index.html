<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM VIDEO PLAYER - NEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.7); 
            --top-h: 50px;
            --bottom-h: 22vh;
            --lane-w: 15vw;
            --icon-max: 55px;
            --disabled-color: #333;
        }

        body { 
            background: #000; color: var(--neon-blue); font-family: 'Michroma', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw; text-transform: uppercase;
        }

        #zefram-chassis {
            width: 100%; height: 100%; display: flex; flex-direction: column;
        }

        /* TOP HEADER */
        #top-container {
            flex: 0 0 var(--top-h); background: #000; border-bottom: 1px solid #333;
            display: flex; align-items: center; justify-content: center; font-size: 11px; z-index: 300;
        }

        /* MAIN CONTENT AREA */
        #center-area {
            flex: 1; display: flex; position: relative; overflow: hidden; background: #050505;
        }

        /* VIDEO AREA */
        #video-main {
            flex: 1; display: flex; align-items: center; justify-content: center; position: relative; z-index: 50;
        }
        #video-viewport-wrapper {
            width: 100%; aspect-ratio: 16/9; background: #000; position: relative;
        }
        #yt-player, #local-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        /* SIDE LANES (横画面時) */
        .side-lane {
            width: var(--lane-w); height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-around; z-index: 200;
        }

        /* ICONS */
        .grid-icon-box {
            width: 8vh; height: 8vh; max-width: var(--icon-max); max-height: var(--icon-max);
            border: 1px solid var(--neon-blue); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer;
        }
        .grid-icon-box.active { background: var(--neon-blue); color: #000; box-shadow: var(--neon-glow); }
        .grid-icon-box.locked { border-color: var(--disabled-color); color: var(--disabled-color); pointer-events: none; }
        #btn-lst { font-size: 9px; line-height: 1.2; text-align: center; }

        /* BOTTOM CONTROLS */
        #bottom-container {
            flex: 0 0 var(--bottom-h); background: #000; border-top: 1px solid #333;
            display: flex; align-items: center; z-index: 100;
        }

        /* --- 縦画面用レイアウト設定 --- */
        @media (orientation: portrait) {
            #center-area { flex-direction: column; }
            .side-lane { 
                width: 100%; height: auto; flex-direction: row; 
                padding: 10px 5px; justify-content: space-evenly; 
            }
            #left-lane { order: 2; border-top: 1px solid #222; }
            #video-main { order: 1; width: 100%; }
            #right-lane { order: 3; border-top: 1px solid #222; }
            
            .grid-icon-box { width: 14vw; height: 14vw; }
            #bottom-container { flex: 0 0 25vh; flex-direction: column; padding: 10px 0; }
            #dynamic-slot { width: 90%; margin: 10px 0; }
        }

        #dynamic-slot { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; padding: 0 15px; }
        .mode-panel { display: none; width: 100%; flex-direction: column; }
        .mode-panel.active { display: flex; }

        /* シークバー */
        .bar-track { width: 100%; height: 12px; background: #222; position: relative; border-radius: 6px; cursor: pointer; }
        .bar-fill { height: 100%; background: rgba(0,243,255,0.4); border-radius: 6px; position: absolute; pointer-events: none; }
        #now-knob { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; background: #fff; border-radius: 50%; }

        /* リスト */
        #list-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; }
        #list-overlay.active { display: flex; }
        #list-header { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="zefram-chassis">
        <div id="top-container">ZEFRAM PLAYER - NEO</div>

        <div id="center-area">
            <div id="left-lane" class="side-lane">
                <div class="grid-icon-box locked" id="btn-spd">SPD</div>
                <div class="grid-icon-box locked" id="btn-lop">LOP</div>
                <div class="grid-icon-box locked" id="btn-mir">MIR</div>
                <div class="grid-icon-box locked" id="btn-hom">HOM</div>
                <div class="grid-icon-box locked" id="btn-a">A</div>
                <div class="grid-icon-box locked" id="btn-top">TOP</div>
            </div>

            <div id="video-main">
                <div id="video-viewport-wrapper">
                    <div id="yt-player"></div>
                    <video id="local-video" playsinline></video>
                </div>
            </div>

            <div id="right-lane" class="side-lane">
                <div class="grid-icon-box locked" id="btn-lst">選 曲</div>
                <div class="grid-icon-box" id="btn-fil">FIL</div>
                <div class="grid-icon-box active" id="btn-web">WEB</div>
                <div class="grid-icon-box locked" id="btn-b">B</div>
                <div class="grid-icon-box">---</div>
                <div class="grid-icon-box">---</div>
            </div>
        </div>

        <div id="bottom-container">
            <div id="btn-play-pause" class="grid-icon-box locked" style="border-radius:50%; margin: 0 20px;">▶</div>
            <div id="dynamic-slot">
                <div id="panel-web" class="mode-panel active">
                    <input type="text" id="input-url" placeholder="YOUTUBE URL..." style="width:100%; background:#111; border:1px solid var(--neon-blue); color:#fff; padding:10px;">
                    <button id="btn-url-go" style="margin-top:5px; background:var(--neon-blue); border:none; padding:5px;">GO</button>
                </div>
                <div id="panel-home" class="mode-panel">
                    <div class="bar-track" id="main-track"><div class="bar-fill" id="main-fill"></div><div id="now-knob"></div></div>
                </div>
            </div>
            <div id="btn-full" class="grid-icon-box locked" onclick="enterFull()" style="margin: 0 20px;">FULL</div>
        </div>
    </div>

    <div id="list-overlay">
        <div id="list-header"><span>PLAYLIST</span><span id="list-btn-close" style="cursor:pointer;">CLOSE</span></div>
        <div id="list-content" style="flex:1; overflow-y:auto;"></div>
    </div>

    <script>
        // ロジックはYorkさんの「ベストな状態」を尊重し、基本的な動作を維持
        const state = {
            player: null, localVid: null, isYoutube: true, isInitialized: false,
            playlist: JSON.parse(localStorage.getItem('zefram_playlist') || '[]')
        };

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            state.player = new YT.Player('yt-player', {
                width: '100%', height: '100%', videoId: '',
                playerVars: { 'rel': 0, 'controls': 0, 'playsinline': 1 },
                events: { 'onReady': () => { initEvents(); render(); } }
            });
        };

        function activateApp() {
            state.isInitialized = true;
            document.querySelectorAll('.grid-icon-box').forEach(el => el.classList.remove('locked'));
            document.getElementById('panel-web').classList.remove('active');
            document.getElementById('panel-home').classList.add('active');
        }

        function initEvents() {
            document.getElementById('btn-url-go').onclick = () => {
                const id = document.getElementById('input-url').value.split('v=')[1]?.split('&')[0] || document.getElementById('input-url').value.split('/').pop();
                if(id) { state.player.loadVideoById(id); activateApp(); }
            };
            document.getElementById('list-btn-close').onclick = () => document.getElementById('list-overlay').classList.remove('active');
            // 他のイベントもYorkさんの既存ロジックに合わせて適宜結合してください
        }

        function render() {
            if (state.isInitialized && state.player) {
                const now = state.player.getCurrentTime();
                const dur = state.player.getDuration();
                if (dur > 0) {
                    const p = (now / dur) * 100;
                    document.getElementById('main-fill').style.width = p + "%";
                    document.getElementById('now-knob').style.left = p + "%";
                }
            }
            requestAnimationFrame(render);
        }

        function enterFull() {
            const el = document.getElementById('zefram-chassis');
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
